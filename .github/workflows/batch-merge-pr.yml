# 工作流名称：批量合并 PR
# 功能说明：批量合并 PR 并自动关闭关联的 Issue
# 使用方式：
#   1. 最近N个模式：自动获取最近N个open PR，支持排除指定编号
#   2. 手动模式：输入指定的PR编号列表（逗号分隔）
# 处理流程：获取PR列表 -> 过滤排除项 -> 逐个合并 -> 关闭关联Issue -> 触发歌曲清单更新

name: Batch Merge PRs

# 触发条件：手动触发
on:
  workflow_dispatch:
    inputs:
      # 合并模式选择
      mode:
        description: '合并模式'
        required: true
        default: 'recent'
        type: choice
        options:
          - recent  # 合并最近N个PR
          - manual  # 手动指定PR编号
      
      # 最近N个模式：合并数量
      count:
        description: '合并数量（recent模式下，默认5）'
        required: false
        default: '5'
        type: string
      
      # 最近N个模式：排除的PR编号
      exclude:
        description: '排除的PR编号（recent模式下，逗号分隔，如: 123,456）'
        required: false
        default: ''
        type: string
      
      # 手动模式：PR编号列表
      pr_numbers:
        description: 'PR编号列表（manual模式下，逗号分隔，如: 16,18,20）'
        required: false
        default: ''
        type: string
      
      # 是否自动关闭关联Issue
      auto_close_issue:
        description: '自动关闭关联Issue'
        required: false
        default: true
        type: boolean

jobs:
  # 任务：批量合并PR
  batch-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      # 步骤1：获取PR列表
      - name: Get PR list
        id: get-prs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MODE="${{ inputs.mode }}"
          REPO="Meowouuo/lyrics"
          API="https://api.github.com/repos/$REPO"
          
          if [ "$MODE" = "recent" ]; then
            # 最近N个模式
            COUNT="${{ inputs.count }}"
            EXCLUDE="${{ inputs.exclude }}"
            
            echo "模式: 最近 $COUNT 个PR"
            echo "排除: $EXCLUDE"
            
            # 获取所有open的PR，按创建时间倒序
            prs=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
              "$API/pulls?state=open&sort=created&direction=desc&per_page=100")
            
            # 构建排除列表
            exclude_list=""
            if [ -n "$EXCLUDE" ]; then
              exclude_list=$(echo "$EXCLUDE" | tr ',' '|')
            fi
            
            # 过滤并选择PR
            selected_prs=""
            count=0
            echo "$prs" | python3 -c "
import sys, json
data = json.load(sys.stdin)
exclude_str = '$exclude_list'
exclude_set = set(exclude_str.split('|')) if exclude_str else set()
count = 0
target = int('$COUNT')
result = []
for pr in data:
    pr_num = str(pr['number'])
    if pr_num not in exclude_set and count < target:
        result.append(pr_num)
        count += 1
print(','.join(result))
" > /tmp/pr_list.txt
            
            PR_LIST=$(cat /tmp/pr_list.txt)
            
          else
            # 手动模式
            PR_LIST="${{ inputs.pr_numbers }}"
            echo "模式: 手动指定PR"
          fi
          
          echo "将要合并的PR: $PR_LIST"
          echo "pr_list=$PR_LIST" >> $GITHUB_OUTPUT
          
          if [ -z "$PR_LIST" ]; then
            echo "没有需要合并的PR"
            exit 0
          fi

      # 步骤2：批量合并PR
      - name: Batch merge PRs
        if: steps.get-prs.outputs.pr_list != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AUTO_CLOSE: ${{ inputs.auto_close_issue }}
        run: |
          REPO="Meowouuo/lyrics"
          API="https://api.github.com/repos/$REPO"
          PRS="${{ steps.get-prs.outputs.pr_list }}"
          
          echo "开始批量合并PR: $PRS"
          echo ""
          
          # 按逗号分隔PR编号，逐个处理
          IFS=',' read -ra PR_LIST <<< "$PRS"
          for pr in "${PR_LIST[@]}"; do
            pr=$(echo "$pr" | tr -d ' ')
            if [ -z "$pr" ]; then continue; fi
            
            echo "正在处理 PR #$pr..."
            
            # 获取PR信息
            pr_info=$(curl -s -H "Authorization: token $GITHUB_TOKEN" "$API/pulls/$pr")
            pr_state=$(echo "$pr_info" | python3 -c "import sys,json; print(json.load(sys.stdin).get('state',''))" 2>/dev/null)
            pr_merged=$(echo "$pr_info" | python3 -c "import sys,json; print(json.load(sys.stdin).get('merged',False))" 2>/dev/null)
            pr_title=$(echo "$pr_info" | python3 -c "import sys,json; print(json.load(sys.stdin).get('title',''))" 2>/dev/null)
            pr_body=$(echo "$pr_info" | python3 -c "import sys,json; print(json.load(sys.stdin).get('body','') or '')" 2>/dev/null)
            pr_head=$(echo "$pr_info" | python3 -c "import sys,json; print(json.load(sys.stdin).get('head',{}).get('ref',''))" 2>/dev/null)
            pr_mergeable=$(echo "$pr_info" | python3 -c "import sys,json; print(json.load(sys.stdin).get('mergeable',False))" 2>/dev/null)
            
            # 跳过已关闭或已合并的PR
            if [ "$pr_state" = "closed" ]; then
              echo "  ⏭️ PR #$pr 已关闭，跳过"
              echo ""
              continue
            fi
            
            if [ "$pr_merged" = "True" ]; then
              echo "  ⏭️ PR #$pr 已合并，跳过"
              echo ""
              continue
            fi
            
            if [ -z "$pr_title" ]; then
              echo "  ❌ 无法获取 PR #$pr 信息，跳过"
              echo ""
              continue
            fi
            
            echo "  PR标题: $pr_title"
            echo "  可合并: $pr_mergeable"
            
            # 从PR body中提取关联的Issue编号
            issue_number=$(echo "$pr_body" | grep -oE '#[0-9]+' | head -1 | tr -d '#')
            if [ -z "$issue_number" ]; then
              issue_number=$(echo "$pr_head" | grep -oE '/[0-9]+-' | head -1 | tr -d '/-')
            fi
            
            # 合并PR
            echo "  正在合并 PR #$pr..."
            merge_result=$(curl -s -X PUT -H "Authorization: token $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "$API/pulls/$pr/merge" \
              -d '{"merge_method":"squash"}')
            
            merge_ok=$(echo "$merge_result" | python3 -c "import sys,json; print(json.load(sys.stdin).get('merged',False))" 2>/dev/null)
            
            if [ "$merge_ok" = "True" ]; then
              echo "  ✅ PR #$pr 合并成功"
              
              # 关闭关联的Issue
              if [ "$AUTO_CLOSE" = "true" ] && [ -n "$issue_number" ]; then
                echo "  正在关闭 Issue #$issue_number..."
                curl -s -X PATCH -H "Authorization: token $GITHUB_TOKEN" \
                  -H "Accept: application/vnd.github+json" \
                  "$API/issues/$issue_number" \
                  -d '{"state":"closed"}' > /dev/null 2>&1
                
                curl -s -X POST -H "Authorization: token $GITHUB_TOKEN" \
                  -H "Accept: application/vnd.github+json" \
                  "$API/issues/$issue_number/labels" \
                  -d '["已完成"]' > /dev/null 2>&1
                
                echo "  📌 Issue #$issue_number 已关闭"
              fi
            else
              merge_msg=$(echo "$merge_result" | python3 -c "import sys,json; print(json.load(sys.stdin).get('message',''))" 2>/dev/null)
              echo "  ❌ PR #$pr 合并失败: $merge_msg"
            fi
            
            echo ""
          done
          
          echo "✅ 批量处理完成"

      # 步骤3：触发歌曲清单更新
      - name: Trigger song list update
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/Meowouuo/lyrics/actions/workflows/generate-song-list.yml/dispatches" \
            -d '{"ref":"main"}'
          echo "✅ 已触发歌曲清单更新"
