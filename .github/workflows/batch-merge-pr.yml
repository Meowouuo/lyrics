name: Batch Merge PRs

on:
  workflow_dispatch:
    inputs:
      mode:
        description: '合并模式 (recent=自动最近N个, manual=手动指定)'
        required: true
        default: 'recent'
        type: choice
        options:
          - recent
          - manual
      count:
        description: '合并数量 (recent模式)'
        required: false
        default: '5'
        type: string
      exclude:
        description: '排除的PR编号 (recent模式,逗号分隔如: 123,456)'
        required: false
        default: ''
        type: string
      pr_numbers:
        description: 'PR编号列表 (manual模式,逗号分隔如: 100,101,102)'
        required: false
        default: ''
        type: string
      auto_close_issue:
        description: '自动关闭关联Issue'
        required: false
        default: true
        type: boolean

jobs:
  batch-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Batch merge PRs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MODE: ${{ inputs.mode }}
          COUNT: ${{ inputs.count }}
          EXCLUDE: ${{ inputs.exclude }}
          PR_NUMBERS: ${{ inputs.pr_numbers }}
          AUTO_CLOSE: ${{ inputs.auto_close_issue }}
        run: node scripts/batch-merge.js

      - name: Trigger song list update
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/Meowouuo/lyrics/actions/workflows/generate-song-list.yml/dispatches" \
            -d '{"ref":"main"}'
          echo "已触发歌曲清单更新"
