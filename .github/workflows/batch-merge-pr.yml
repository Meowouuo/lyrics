name: Batch Merge PRs

on:
  workflow_dispatch:
    inputs:
      pr_numbers:
        description: 'PR 编号列表（用逗号分隔，如: 16,18,20）'
        required: true
        type: string

jobs:
  batch-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Batch merge PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "将要合并的 PR: ${{ inputs.pr_numbers }}"
          echo ""
          # 用逗号分隔 PR 编号，逐个合并
          IFS=',' read -ra PRS <<< "${{ inputs.pr_numbers }}"
          for pr in "${PRS[@]}"; do
            pr=$(echo "$pr" | tr -d ' ')
            if [ -n "$pr" ]; then
              echo "正在合并 PR #$pr..."
              gh pr merge "$pr" --squash --delete-branch --auto || echo "PR #$pr 合并失败，跳过"
              echo ""
            fi
          done
          echo "✅ 批量合并完成"
