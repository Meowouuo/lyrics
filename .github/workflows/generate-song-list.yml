# 工作流名称：生成歌曲清单
# 功能说明：自动扫描 lyrics 目录下的歌曲文件，生成 songFiles.js 清单文件
# 触发条件：
#   1. 当 main 分支的 lyrics/ 目录下有文件变更时自动触发（push 事件）
#   2. 当 auto-process 工作流完成后触发（workflow_run 事件，解决 GITHUB_TOKEN push 不触发问题）
#   3. 支持手动触发（workflow_dispatch）
# 处理流程：扫描歌词文件 -> 生成清单 -> 检测变更 -> 创建 PR 并自动合并

name: Generate Songs Manifest

# 触发条件
on:
  # 方式1：当 main 分支的 lyrics 目录下有文件推送时触发
  push:
    branches: [main]
    paths: ['lyrics/**']
  
  # 方式2：当 auto-process 工作流完成后触发（解决 GITHUB_TOKEN 产生的 push 不触发问题）
  workflow_run:
    workflows: ["Auto Process Issues"]
    types: [completed]
    branches: [main]
  
  # 方式3：支持手动触发
  workflow_dispatch:

# 并发控制：同一时间只允许一个生成任务运行，新的任务不会取消正在运行的任务
concurrency:
  group: generate-manifest
  cancel-in-progress: false

jobs:
  # 任务：生成歌曲清单
  generate:
    # 运行环境：最新版 Ubuntu
    runs-on: ubuntu-latest
    # 权限设置：需要写入代码仓库和创建 PR 的权限
    permissions:
      contents: write
      pull-requests: write

    steps:
      # 步骤1：拉取代码仓库（fetch-depth: 0 表示拉取完整历史记录）
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 步骤2：扫描 lyrics 目录并生成歌曲清单文件 songFiles.js
      # 遍历 lyrics 目录下所有 .js 文件，按文件名排序后写入清单
      # 注意：使用 while read 处理包含空格的文件名
      - name: Scan lyrics directory and generate manifest
        run: |
          echo "// 歌曲清单（自动生成，请勿手动修改）" > songFiles.js
          echo "const songFiles = [" >> songFiles.js
          count=0
          while IFS= read -r f; do
              echo "    '$f'," >> songFiles.js
              count=$((count + 1))
          done < <(find lyrics -maxdepth 1 -name '*.js' -type f | sort)
          echo "];" >> songFiles.js

          echo "生成完成，共 $count 首歌曲"
          cat songFiles.js

      # 步骤3：检测清单文件是否有变更，如有变更则创建 PR 并自动合并
      # 如果 songFiles.js 没有变化则跳过，有变化则创建新分支、提交并创建 PR
      - name: Create PR if changed
        env:
          # GitHub CLI 认证令牌
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 配置 Git 用户信息（使用 github-actions 机器人身份）
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 检查 songFiles.js 是否有变更，无变更则跳过
          if git diff --quiet songFiles.js; then
            echo "无变更，跳过提交"
            exit 0
          fi

          # 创建带有时间戳的新分支
          branch="auto/update-songfiles-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$branch"
          git add songFiles.js
          git commit -m "chore: 自动更新歌曲清单"
          git push origin "$branch"

          # 创建 PR（不使用 --json）
          gh pr create \
            --title "chore: 自动更新歌曲清单" \
            --body "此 PR 由 Actions 自动生成，更新 \`songFiles.js\` 以包含最新的歌曲文件。" \
            --base main \
            --head "$branch"

          echo "PR 已创建"

          # 等待几秒后自动合并（squash 合并并删除分支）
          sleep 3
          gh pr merge --squash --delete-branch || echo "合并失败，请手动合并"
          echo "✅ 完成"
