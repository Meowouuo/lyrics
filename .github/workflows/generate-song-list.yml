name: Generate Songs Manifest

on:
  push:
    branches: [main]
    paths: ['lyrics/**']

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Scan lyrics directory and generate manifest
        run: |
          # 扫描 lyrics 目录下所有 .js 文件，生成 JSON 数组
          files=$(find lyrics -maxdepth 1 -name '*.js' -type f | sort | sed 's|^|lyrics/|')
          
          # 生成 JSON
          echo "// 歌曲清单（自动生成，请勿手动修改）" > songFiles.js
          echo "const songFiles = [" >> songFiles.js
          for f in $files; do
              echo "    '$f'," >> songFiles.js
          done
          echo "];" >> songFiles.js
          
          echo "生成完成，共 $(echo "$files" | wc -l) 首歌曲"
          cat songFiles.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet songFiles.js || (git add songFiles.js && git commit -m "chore: 自动更新歌曲清单" && git push)
