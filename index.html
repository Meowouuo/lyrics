<!DOCTYPE html>
<!--
    ========================================
    粤拼歌词 | Cantonese Lyrics with Jyutping
    ========================================
    一个支持粤语拼音对照的歌词展示应用
    功能包括：歌词浏览、粤拼显示、语音朗读(TTS)、纠错模式、歌词导入等
-->
<html lang="zh-Hant">
<head>
    <!-- ===== 基础元数据 ===== -->
    <meta charset="UTF-8">
    <!-- 视口设置：禁止缩放，适配移动端 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- iOS PWA 配置 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>粤拼歌词 | Cantonese Lyrics with Jyutping</title>
    
    <!-- ===== Favicon 图标配置 ===== -->
    <link rel="icon" type="image/png" sizes="96x96" href="favicon-96x96.png">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="shortcut icon" href="favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="manifest" href="site.webmanifest">

    <!-- ===== CSS 样式开始 ===== -->
    <style>
        /* ========================================
           CSS 变量定义（主题色彩系统）
           ======================================== */
        :root {
            /* 背景色 */
            --bg-primary: #fff;        /* 主背景色 */
            --bg-secondary: #f5f5f5;   /* 次背景色 */
            --bg-tertiary: #f0f0f0;    /* 第三背景色 */
            /* 文字色 */
            --text-primary: #333;      /* 主文字色 */
            --text-secondary: #666;    /* 次文字色 */
            --text-tertiary: #999;     /* 辅助文字色 */
            /* 边框色 */
            --border-color: #eee;      /* 边框颜色 */
            --border-dark: #e8e8e8;    /* 深色边框 */
            /* 强调色 */
            --accent: #000;            /* 强调色（黑） */
            --accent-hover: #333;      /* 悬停强调色 */
            /* 状态色 */
            --danger: #dc2626;         /* 危险/删除色 */
            --success: #4CAF50;        /* 成功色 */
            --info: #4a9eff;           /* 信息色 */
        }

        /* 全局重置样式 */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            /* 字体 */
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans SC", sans-serif;
            background: var(--bg-secondary);             /* 浅灰背景 */
            color: var(--text-primary);                  /* 主文字色 */
            /* 最小高度 */
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* ========================================
           布局系统 - 移动端：单列布局
           ======================================== */
        /* ========================================
           布局系统 - 移动端：单列布局（默认）
           移动设备下侧边栏和主内容区域堆叠显示
           ======================================== */
        .app-container {
            /* 最大宽度 */
            max-width: 100%;
            /* 外边距 */
            margin: 0 auto;
            background: var(--bg-primary);               /* 白色背景 */
            /* 最小高度 */
            min-height: 100vh;
        }

        /* ========================================
           布局系统 - 桌面端（>=1024px）：左右分栏布局
           左侧固定宽度侧边栏（歌曲列表），右侧自适应主内容区域
           ======================================== */
        @media (min-width: 1024px) {
            body { background: var(--bg-tertiary); }
            .app-container {
                display: flex;                               /* 弹性布局（水平排列子元素） */                    /* 启用 flexbox 布局 */
                max-width: 1400px;                /* 最大宽度限制 */
                min-height: 100vh;                /* 满屏高度 */
                margin: 0 auto;                   /* 居中显示 */
                /* 背景 */
                background: var(--bg-primary);
            }
        }

        /* ========================================
           侧边栏样式（左侧）
           包含：Logo、搜索框、歌手筛选、歌曲列表
           ======================================== */
        .sidebar {
            /* 背景 */
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border-color);  /* 底部分隔线 */  /* 移动端底部边框分隔 */
        }

        /* ========================================
           侧边栏响应式样式（桌面端 >=1024px）
           - 固定宽度 360px
           - 右侧显示边框
           - 固定定位，滚动时保持可见
           ======================================== */
        @media (min-width: 1024px) {
            .sidebar {
                /* 宽度 */
                width: 360px;
                min-width: 360px;                  /* 确保最小宽度 */
                border-right: 1px solid var(--border-dark);  /* 右侧边框替换底部边框 */
                border-bottom: none;               /* 移除底部边框 */
                /* 显示方式 */
                display: flex;
                flex-direction: column;                      /* 垂直排列子元素 */            /* 内部内容垂直排列 */
                height: 100vh;                     /* 满屏高度 */
                position: sticky;                  /* 滚动时固定在顶部 */
                top: 0;                                      /* 贴顶部 */
            }
        }

        /* 侧边栏头部：Logo区域 */
        .sidebar-header {
            /* 内边距 */
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-color);
        }
        @media (min-width: 1024px) {
            .sidebar-header { padding: 24px 28px; }
        }

        /* Logo 主标题 */
        .logo {
            /* 字号 */
            font-size: 22px;
            font-weight: 700;                            /* 粗体（强调标题） */
            /* 文字颜色 */
            color: var(--text-primary);
            margin-bottom: 4px;                          /* 底部间距4px */
        }
        @media (min-width: 1024px) {
            .logo { font-size: 24px; }
        }

        /* Logo 副标题 */
        .logo-sub {
            font-size: 13px;                            /* 13px字号 */
            color: var(--text-tertiary);                 /* 浅灰色（辅助信息） */
        }

        /* ========================================
           搜索框区域样式
           包含搜索图标、输入框和管理按钮
           ======================================== */
        .search-box {
            padding: 16px 24px;                          /* 上下16px，左右24px内边距 */                            /* 内边距（上下16px，左右24px） */
            border-bottom: 1px solid var(--border-color);
            /* 显示方式 */
            display: flex;
            align-items: center;                        /* 垂直居中对齐 */                         /* 垂直居中对齐 */
            gap: 8px;                                    /* 子元素之间的间距 */                              /* 输入框和管理按钮之间的间距 */
        }
        @media (min-width: 1024px) {
            .search-box { padding: 16px 28px; }
        }

        /* 搜索输入框容器（相对定位，用于放置搜索图标） */
        .search-wrapper {
            flex: 1;                                    /* 占据剩余可用空间 */                               /* 占据可用空间 */
            position: relative;                         /* 相对定位（作为子元素定位参考） */
        }

        /* ========================================
           管理按钮样式（删除模式切换）
           点击后进入删除模式，可选择删除歌曲
           ======================================== */
        .manage-btn {
            flex-shrink: 0;                              /* 不允许收缩（保持完整显示） */                        /* 不允许收缩 */
            padding: 8px 14px;                           /* 上下8px，左右14px内边距 */
            border: 1px solid var(--danger);             /* 红色边框 */
            background: transparent;                    /* 透明背景 */
            color: var(--danger);                        /* 红色（危险操作） */
            border-radius: 8px;                          /* 8px圆角 */
            cursor: pointer;                            /* 手型指针（提示可点击） */
            /* 字号 */
            font-size: 13px;
            white-space: nowrap;                         /* 禁止换行 */
            transition: all 0.15s;                       /* 0.15秒过渡动画 */                 /* 过渡动画 */
        }
        .manage-btn:hover { background: #fef2f2; } /* 悬停时显示浅红色背景，提示可点击 */
        .manage-btn.active {                        /* 激活状态（已进入删除模式，红色高亮） */
            /* 背景 */
            background: var(--danger);
            /* 文字颜色 */
            color: #fff;
        }

        /* ========================================
           搜索输入框样式
           带左侧搜索图标，内置阴影效果
           ======================================== */
        .search-input {
            /* 文字颜色 */
            color: var(--text-primary);
            width: 100%;                                /* 占满容器全宽 */
            padding: 10px 14px 10px 38px;           /* 左侧留出图标空间 */
            border: 1px solid var(--border-dark);        /* 深灰色边框 */
            /* 圆角 */
            border-radius: 8px;
            font-size: 14px;                            /* 14px字号 */
            /* 背景 */
            background: var(--bg-secondary);
            outline: none;                               /* 移除默认轮廓 */                          /* 移除默认聚焦边框 */
            transition: all 0.2s;                        /* 0.2秒过渡动画 */                  /* 过渡动画 */
        }
        .search-input:focus {                       /* 聚焦状态 */
            border-color: var(--border-dark);
            background: var(--bg-primary);         /* 聚焦时背景变亮 */
        }

        /* 搜索图标（绝对定位在输入框左侧） */
        .search-icon {
            position: absolute;                          /* 绝对定位 */
            /* 左侧偏移 */
            left: 14px;
            top: 50%;
            transform: translateY(-50%);            /* 垂直居中 */
            /* 文字颜色 */
            color: var(--text-tertiary);
        }

        .search-wrapper { position: relative; }

        /* ========================================
           歌手筛选区域样式
           横向滚动显示歌手标签，支持触摸滑动
           ======================================== */
        .artist-filter {
            /* 内边距 */
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-color);
            overflow-x: auto;                            /* 水平方向可滚动 */                       /* 移动端支持横向滚动 */
            white-space: nowrap;                    /* 标签不换行 */
        }

        /* ========================================
           歌手筛选区域响应式样式（桌面端）
           - 允许换行显示
           - 使用 flexbox 布局
           ======================================== */
        @media (min-width: 1024px) {
            .artist-filter {
                padding: 16px 28px;                          /* 上下16px，左右28px内边距 */
                overflow-x: hidden;                 /* 桌面端不显示滚动条 */
                white-space: normal;                 /* 允许换行 */
                /* 显示方式 */
                display: flex;
                flex-wrap: wrap;                             /* 允许换行 */                    /* 自动换行 */
                gap: 8px;                            /* 标签之间的间距 */
            }
        }

        /* 隐藏滚动条（兼容 Safari/Chrome） */
        .artist-filter::-webkit-scrollbar { display: none; }

        /* ========================================
           筛选标签按钮样式
           激活状态显示为黑色背景
           ======================================== */
        .filter-btn {
            /* 显示方式 */
            display: inline-block;
            padding: 6px 14px;                           /* 上下6px，左右14px内边距 */
            margin-right: 8px;                           /* 右边距8px */                       /* 标签之间的间距 */
            border-radius: 16px;                     /* 胶囊形状 */
            /* 字号 */
            font-size: 13px;
            /* 光标样式 */
            cursor: pointer;
            transition: all 0.2s;                   /* 过渡动画 */
            border: 1px solid var(--border-color);       /* 浅灰色边框 */
            /* 背景 */
            background: var(--bg-primary);
            color: var(--text-secondary);                /* 次要文字色 */
        }
        @media (min-width: 1024px) {
            .filter-btn { margin-right: 0; }         /* 桌面端使用 gap 替代 margin */
        }

        .filter-btn:hover { background: var(--bg-secondary); }  /* 悬停状态 */
        .filter-btn.active {                         /* 激活状态 */
            /* 背景 */
            background: var(--accent);
            /* 文字颜色 */
            color: var(--bg-primary);
            border-color: var(--accent);
        }

        /* ========================================
           歌曲列表区域样式
           可滚动区域，支持懒加载和无限滚动
           ======================================== */
        .song-list {
            /* 内边距 */
            padding: 8px 0;
            overflow-y: auto;                            /* 垂直方向可滚动 */                        /* 垂直方向滚动 */
            flex: 1;                                 /* 占据剩余空间 */
        }

        /* ========================================
           加载更多按钮样式
           显示在列表底部，点击加载更多歌曲
           ======================================== */
        .load-more-btn {
            /* 内边距 */
            padding: 12px 24px;
            text-align: center;                          /* 文本居中对齐 */
            color: #1890ff;                         /* 蓝色链接色 */
            /* 光标样式 */
            cursor: pointer;
            /* 字号 */
            font-size: 14px;
            border-top: 1px solid var(--border-dark);
            transition: background 0.2s;           /* 过渡动画 */
        }
        .load-more-btn:hover {
            /* 背景 */
            background: var(--bg-secondary);
        }

        /* ========================================
           歌曲列表项样式
           包含序号、歌名、歌手信息
           ======================================== */
        .song-item {
            /* 显示方式 */
            display: flex;
            align-items: center;                    /* 垂直居中 */
            padding: 14px 24px;                          /* 上下14px，左右24px内边距 */
            /* 光标样式 */
            cursor: pointer;
            transition: background 0.15s;               /* 背景色0.15秒过渡动画 */           /* 过渡动画 */
            border-left: 3px solid transparent;         /* 左侧3px透明边框（选中时显示主题色） */     /* 左侧高亮边框（默认透明） */
        }
        @media (min-width: 1024px) {
            .song-item { padding: 14px 28px; }
        }

        .song-item:hover { background: var(--bg-secondary); }    /* 悬停状态 */
        /* 当前选中歌曲（左侧主题色边框 + 浅灰背景，突出显示正在查看的歌曲） */
        .song-item.active {                                          /* 当前选中歌曲 */
            /* 背景 */
            background: var(--bg-secondary);
            border-left-color: var(--accent);                       /* 左侧黑色边框 */
        }

        /* ========================================
           删除模式样式
           删除模式下显示删除按钮，选中项高亮显示
           ======================================== */
        .song-delete-btn { display: none; }      /* 移动端暂时不支持单独删除按钮 */
        /* 删除模式下歌曲项变为可点击（进入多选模式，点击可切换选中状态） */
        .delete-mode .song-item { cursor: pointer; }
        /* 删除模式下已选中的歌曲项（浅红色背景 + 红色边框，表示将被删除） */
        .delete-mode .song-item.delete-selected {    /* 已选中的歌曲项 */
            background: #fef2f2;                       /* 浅红色背景 */
            border-left-color: var(--danger);         /* 红色边框 */
        }
        /* 删除模式下已选中歌曲的序号（红色加粗，视觉强调） */
        .delete-mode .song-item.delete-selected .song-number {   /* 序号高亮 */
            /* 文字颜色 */
            color: var(--danger);
            /* 字重 */
            font-weight: bold;
        }

        /* ========================================
           删除操作栏样式（底部固定）
           包含已选择数量和提交删除按钮
           ======================================== */
        .delete-bar {
            /* 显示方式 */
            display: flex;
            /* 交叉轴对齐 */
            align-items: center;
            justify-content: space-between;              /* 两端对齐 */           /* 两端对齐 */
            /* 内边距 */
            padding: 12px 24px;
            border-top: 1px solid var(--border-color);
            /* 背景 */
            background: var(--bg-primary);
            /* 定位方式 */
            position: sticky;
            bottom: 0;                                 /* 固定在底部 */
            /* 字号 */
            font-size: 13px;
            /* 文字颜色 */
            color: var(--text-secondary);
        }

        /* 提交删除按钮 */
        /* 提交删除按钮（红色背景，白色文字，醒目的危险操作按钮） */
        .delete-submit-btn {
            /* 内边距 */
            padding: 8px 16px;
            /* 背景 */
            background: var(--danger);
            /* 文字颜色 */
            color: #fff;
            border: none;                                /* 无边框 */
            /* 圆角 */
            border-radius: 8px;
            /* 光标样式 */
            cursor: pointer;
            /* 字号 */
            font-size: 13px;
            transition: opacity 0.15s;               /* 过渡动画 */
        }
        /* 未选中任何歌曲时禁用删除按钮（降低透明度 + 禁止点击，防止误操作） */
        .delete-submit-btn:disabled {                /* 未选中任何歌曲时禁用 */
            /* 透明度 */
            opacity: 0.4;
            /* 光标样式 */
            cursor: not-allowed;
        }
        .delete-submit-btn:not(:disabled):hover { opacity: 0.85; }  /* 悬停效果（降低透明度） */

        /* ========================================
           歌曲序号样式
           两位数字显示，颜色较浅
           ======================================== */
        .song-number {
            width: 28px;                                 /* 固定宽度28px */
            /* 字号 */
            font-size: 13px;
            /* 文字颜色 */
            color: var(--text-tertiary);
            flex-shrink: 0;                          /* 不允许收缩 */
        }

        /* ========================================
           歌曲信息样式（紧凑模式）
           歌名和歌手单行显示，超长省略
           ======================================== */
        .song-info-compact {
            /* 弹性布局 */
            flex: 1;
            min-width: 0;                                /* 允许收缩到0（配合文本溢出省略） */                             /* 允许收缩到0 */
        }

        /* 歌曲标题（紧凑模式，单行显示，超长文字显示省略号） */
        .song-title-compact {                        /* 歌曲标题 */
            font-size: 15px;                             /* 15px字号 */
            font-weight: 500;                            /* 中等字重（比常规稍粗） */
            /* 文字颜色 */
            color: var(--text-primary);
            margin-bottom: 2px;                          /* 底部间距2px */
            white-space: nowrap;                     /* 不换行 */
            overflow: hidden;                            /* 隐藏溢出内容 */                        /* 溢出隐藏 */
            text-overflow: ellipsis;                     /* 超长文字显示省略号 */                 /* 显示省略号 */
        }

        /* 歌手名称（紧凑模式，小号灰色文字，辅助信息） */
        .song-artist-compact {                       /* 歌手名称 */
            font-size: 12px;                            /* 12px小号字号 */
            /* 文字颜色 */
            color: var(--text-tertiary);
        }

        /* ========================================
           主内容区域样式（右侧）
           歌词展示区域，包含歌曲信息和工具栏
           ======================================== */
        .main-content {
            flex: 1;                                 /* 占据剩余空间 */
            min-width: 0;                            /* 允许收缩到0 */
            /* 背景 */
            background: var(--bg-primary);
        }

        /* ========================================
           主内容区域响应式样式（桌面端）
           固定高度，启用内部滚动
           ======================================== */
        @media (min-width: 1024px) {
            .main-content {
                overflow-y: auto;                   /* 垂直方向滚动 */
                height: 100vh;                       /* 满屏高度 */
            }
        }

        /* ========================================
           空状态样式（未选择歌曲时）
           居中显示提示信息，引导用户选择歌曲
           ======================================== */
        .empty-state {
            /* 显示方式 */
            display: flex;
            flex-direction: column;                  /* 垂直排列 */
            align-items: center;                     /* 水平居中 */
            justify-content: center;                     /* 水平居中对齐 */                 /* 垂直居中 */
            min-height: 60vh;                            /* 最小高度60%视口 */                        /* 最小高度60%视口 */
            padding: 40px;                               /* 四周40px内边距 */
            text-align: center;                      /* 文本居中 */
        }

        /* 空状态图标（大号 emoji，降低透明度，作为装饰性引导元素） */
        .empty-icon {
            font-size: 64px;                             /* 大号字号（装饰性图标） */                         /* 大号 emoji */
            margin-bottom: 20px;                         /* 底部间距20px */
            opacity: 0.3;                            /* 降低透明度 */
        }

        /* 空状态标题文字（引导用户进行下一步操作） */
        .empty-title {
            font-size: 20px;                             /* 20px字号 */
            font-weight: 600;                            /* 半粗体（标题强调） */
            /* 文字颜色 */
            color: var(--text-primary);
            margin-bottom: 8px;                          /* 底部间距8px */
        }

        /* 空状态描述文字（补充说明操作方式） */
        .empty-desc {
            /* 字号 */
            font-size: 14px;
            /* 文字颜色 */
            color: var(--text-tertiary);
        }

        /* ========================================
           歌词展示区域
           包含歌曲标题、元数据和歌词正文
           ======================================== */
        .lyrics-view {
            padding: 24px;                               /* 四周24px内边距 */
        }
        @media (min-width: 1024px) {

        .song-meta-item {

            height: 11px;                                /* 固定高度11px */                           /* 固定高度 */
        }

        .song-meta-label-hanzi {
            /* 字号 */
            font-size: 14px;
            /* 文字颜色 */

        }

        /* ========================================

           ======================================== */
        .meta-name-group {

            /* 交叉轴对齐 */
            align-items: center;
        }

        /* 人名粤拼 */
        .meta-name-jyutping {
            /* 字号 */
            font-size: 9px;
            /* 文字颜色 */
            color: var(--text-tertiary);
            /* 字体 */
            font-family: "SF Mono", "Fira Code", "Consolas", monospace;
            height: 11px;                           /* 固定高度 */
        }

        /* 人名汉字 */
        .meta-name-hanzi {
            /* 字号 */
            font-size: 14px;
            /* 文字颜色 */
            color: var(--text-secondary);
        }

        /* ========================================
           歌词内容样式
           主要歌词展示区域，包含行间距和底部留白
           ======================================== */
        .lyrics-content {
            line-height: 2;                              /* 行高2倍 */                          /* 行高倍数 */
            padding-bottom: 60px;                         /* 底部留白60px（避免被工具栏遮挡） */                     /* 底部留白，避免被工具栏遮挡 */
        }

        /* 段落分隔样式（双换行时显示） */
        /* 段落分隔样式（连续两个空行时显示更大的间距，区分不同段落） */
        .lyric-paragraph-break {
            height: 20px;                                /* 固定高度20px */                             /* 段落之间的大间距 */
        }

        /* ========================================
           歌词行淡入动画
           交错延迟，实现依次显示效果
           ======================================== */
        .lyric-line:nth-child(1) { animation-delay: 0.02s; }
        .lyric-line:nth-child(2) { animation-delay: 0.04s; }
        .lyric-line:nth-child(3) { animation-delay: 0.06s; }
        .lyric-line:nth-child(4) { animation-delay: 0.08s; }
        .lyric-line:nth-child(5) { animation-delay: 0.10s; }
        .lyric-line:nth-child(6) { animation-delay: 0.12s; }
        .lyric-line:nth-child(7) { animation-delay: 0.14s; }
        .lyric-line:nth-child(8) { animation-delay: 0.16s; }

        /* ========================================
           淡入动画定义
           从透明和轻微上移过渡到完全不透明和原位
           ======================================== */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }  /* 初始状态：透明、上移6px */
            to { opacity: 1; transform: translateY(0); }     /* 结束状态：完全显示、原位 */
        }

        /* ========================================
           Toast消息淡入淡出动画
           居中显示后自动消失
           ======================================== */
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
            15% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            85% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
        }

        /* ========================================
           字符组样式（汉字+粤拼上下排列）
           歌词正文中的单个字符显示
           ======================================== */
        .char-group {
            /* 显示方式 */
            display: inline-flex;
            flex-direction: column;                  /* 上下排列：粤拼在上、汉字在下 */
            align-items: center;                     /* 水平居中 */
            margin-right: 2px;                           /* 右边距2px */                        /* 字符间距 */
            vertical-align: bottom;                      /* 底部对齐 */                  /* 底部对齐 */
        }
        @media (min-width: 1024px) {
            .char-group { margin-right: 3px; }
        }

        /* 粤拼文字样式（小号灰色等宽字体） */
        .char-jyutping {
            /* 字号 */
            font-size: 13px;
            /* 文字颜色 */
            color: var(--text-tertiary);
            /* 字体 */
            font-family: "SF Mono", "Fira Code", "Consolas", monospace;
            margin-bottom: 2px;                       /* 与汉字的间距 */
            height: 16px;                            /* 固定高度，防止无粤拼时跳动 */
        }
        @media (min-width: 1024px) {
            .char-jyutping { font-size: 15px; height: 18px; }
        }

        /* 空粤拼时显示空格占位（保持高度一致） */
        .char-jyutping:empty::before { content: "\00a0"; }

        /* 汉字样式（主文字） */
        /* 汉字样式（歌词正文主文字，大号显示，是用户阅读的主要内容） */
        .char-hanzi {
            /* 字号 */
            font-size: 20px;
            /* 字重 */
            font-weight: 400;
            /* 文字颜色 */
            color: var(--text-primary);
        }
        @media (min-width: 1024px) {
            .char-hanzi { font-size: 24px; }
        }

        /* ========================================
           TTS 语音播放按钮样式
           用于播放单个字符或段落语音
           ======================================== */
        .tts-play-btn {
            /* 显示方式 */
            display: inline-flex;
            /* 交叉轴对齐 */
            align-items: center;
            /* 主轴对齐 */
            justify-content: center;
            width: 24px;                                 /* 固定宽度24px */
            height: 24px;                                /* 固定高度24px */
            margin-right: 8px;                         /* 与歌词的间距 */
            background: var(--bg-tertiary);              /* 更浅的灰色背景 */
            /* 边框 */
            border: none;
            border-radius: 50%;                        /* 圆形按钮 */
            /* 光标样式 */
            cursor: pointer;
            /* 字号 */
            font-size: 12px;
            /* 文字颜色 */
            color: var(--text-secondary);
            transition: all 0.2s;                     /* 过渡动画 */
            vertical-align: middle;                    /* 垂直居中对齐 */
        }
        .tts-play-btn:hover {                        /* 悬停状态（浅灰背景+深色文字） */
            /* 背景 */
            background: var(--bg-secondary);
            /* 文字颜色 */
            color: var(--text-primary);
        }
        .tts-play-btn:active {                       /* 点击状态（缩小效果，按下反馈） */
            transform: scale(0.95);                    /* 缩小效果 */
        }
        .tts-play-btn.playing {                        /* 播放中状态（绿色背景+脉冲动画） */
            background: var(--success);                /* 绿色背景 */
            /* 文字颜色 */
            color: #fff;
            animation: pulse 1s infinite;              /* 脉冲动画 */
        }

        /* ========================================
           脉冲动画（播放中状态）
           轻微放大缩小，表示正在播放
           ======================================== */
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }            /* 放大10% */
            100% { transform: scale(1); }
        }

        /* ========================================
           TTS 播放模式下的字符样式
           点击字符可单独播放该字发音
           ======================================== */
        .tts-mode .char-group {
            cursor: pointer;                           /* 显示可点击指针 */
            border-radius: 4px;                          /* 4px轻微圆角 */                        /* 轻微圆角 */
            transition: background 0.15s;              /* 过渡动画 */
        }
        .tts-mode .char-group:hover {                /* 悬停状态 */
            background: rgba(76, 175, 80, 0.1);       /* 浅绿色背景 */
        }

        /* 正在播放的字符高亮 */
        .tts-mode .char-group.tts-char-playing {
            background: rgba(76, 175, 80, 0.2);        /* 稍深的绿色背景 */
        }
        .tts-mode .char-group.tts-char-playing .char-hanzi {
            color: #4CAF50;                            /* 绿色文字 */
        }

        /* TTS激活状态下的工具栏按钮 */
        .toolbar-btn.tts-active {
            background: var(--success);                /* 绿色背景 */
            /* 文字颜色 */
            color: #fff;
            border-color: var(--success);
        }
        .toolbar-btn.tts-active:hover {
            background: #43a047;                        /* 稍深的绿色 */
        }

        /* ========================================
           TTS 加载动画样式
           语音加载中时显示旋转动画
           ======================================== */
        .tts-loading {
            position: relative;                        /* 相对定位 */
        }
        .tts-loading::after {                          /* 伪元素显示加载动画 */
            content: "";
            /* 定位方式 */
            position: absolute;
            top: 50%;
            /* 左侧偏移 */
            left: 50%;
            /* 宽度 */
            width: 16px;
            /* 高度 */
            height: 16px;
            margin: -8px 0 0 -8px;                    /* 居中偏移 */
            /* 边框 */
            border: 2px solid #4CAF50;
            border-top-color: transparent;            /* 顶部边框透明，形成旋转效果 */
            /* 圆角 */
            border-radius: 50%;
            animation: tts-spin 0.8s linear infinite;  /* 旋转动画 */
        }

        /* 旋转动画定义 */
        @keyframes tts-spin {
            to { transform: rotate(360deg); }          /* 旋转一周 */
        }

        .tts-mode .char-group.tts-loading {
            background: rgba(76, 175, 80, 0.05);       /* 非常浅的绿色背景 */
        }

        /* ========================================
           歌词行容器样式
           包含播放按钮和歌词内容
           ======================================== */
        .lyric-line {
            /* 显示方式 */
            display: flex;
            align-items: center;                      /* 垂直居中 */
            margin-bottom: 12px;
            line-height: 1.6;                            /* 行高1.6倍 */
            animation: fadeIn 0.3s ease forwards;      /* 淡入动画 */
            opacity: 0;                                  /* 初始透明（配合淡入动画） */                               /* 初始隐藏，配合动画显示 */
        }
        /* 歌词行内容容器（包裹所有字符组，占据播放按钮以外的剩余空间） */
        .lyric-line-content {
            flex: 1;                                  /* 占据剩余空间 */
        }

        /* ========================================
           底部工具栏样式
           固定在页面底部，包含多个操作按钮
           ======================================== */
        .toolbar {
            position: fixed;                             /* 固定定位（滚动时不移动） */                            /* 固定定位（相对于视口） */
            /* 底部偏移 */
            bottom: 0;
            /* 左侧偏移 */
            left: 0;
            /* 右侧偏移 */
            right: 0;
            /* 背景 */
            background: var(--bg-primary);
            border-top: 1px solid var(--border-color);
            /* 内边距 */
            padding: 12px 24px;
            /* 显示方式 */
            display: flex;
            justify-content: space-between;             /* 两端对齐 */
            /* 交叉轴对齐 */
            align-items: center;
        }

        /* ========================================
           底部工具栏响应式样式（桌面端）
           居中显示，最大宽度限制
           ======================================== */
        @media (min-width: 1024px) {
            .toolbar {
                position: sticky;                       /* 粘性定位 */
                /* 底部偏移 */
                bottom: 0;
                /* 内边距 */
                padding: 12px 48px;
                max-width: 800px;                      /* 与歌词区域对齐 */
                margin: 0 auto;                         /* 居中 */
            }
        }

        /* ========================================
           工具栏左侧按钮组
           包含 TTS、字号调整、纠错等功能按钮
           ======================================== */
        .toolbar-left {
            /* 显示方式 */
            display: flex;
            gap: 4px;                                   /* 按钮间距 */
            flex: 1;                                    /* 占据左侧空间 */
        }

        /* ========================================
           工具栏按钮组响应式样式（移动端 <1024px）
           允许换行显示
           ======================================== */
        @media (max-width: 1023px) {
            .toolbar-left {
                flex-wrap: wrap;                        /* 允许换行 */
            }
        }

        /* ========================================
           工具栏按钮样式
           包含图标和文字（文字在宽屏显示）
           ======================================== */
        .toolbar-btn {
            background: none;                            /* 透明背景 */                          /* 透明背景 */
            /* 边框 */
            border: none;
            /* 文字颜色 */
            color: var(--text-secondary);
            /* 字号 */
            font-size: 13px;
            /* 光标样式 */
            cursor: pointer;
            /* 显示方式 */
            display: flex;
            align-items: center;                       /* 垂直居中 */
            gap: 6px;                                   /* 图标与文字间距 */
            padding: 8px 10px;                           /* 上下8px，左右10px内边距 */
            border-radius: 6px;                          /* 6px圆角 */                        /* 轻微圆角 */
            transition: all 0.2s;                     /* 过渡动画 */
            white-space: nowrap;                        /* 不换行 */
        }

        .toolbar-btn:hover {                           /* 悬停状态（浅灰背景+深色文字） */
            /* 背景 */
            background: var(--bg-secondary);
            /* 文字颜色 */
            color: var(--text-primary);
        }

        /* 按钮内的图标样式 */
        .toolbar-btn .icon {
            /* 字号 */
            font-size: 13px;
        }

        /* 按钮内的文字（默认隐藏，移动端以上显示） */
        .toolbar-btn span:not(.icon) {
            /* 显示方式 */
            display: none;
        }
        @media (min-width: 768px) {
            .toolbar-btn span:not(.icon) {
                display: inline;                        /* 768px以上显示文字 */
            }

        /* 主要操作按钮样式（高亮显示） */
        /* 主要操作按钮样式（主题色高亮显示，如纠错、修改歌词等核心功能按钮） */
        .toolbar-btn.primary {
            /* 背景 */
            background: var(--accent);
            /* 文字颜色 */
            color: var(--bg-primary);
        }
        .toolbar-btn.primary:hover {
            /* 背景 */
            background: var(--accent-hover);
        }

        /* ========================================
           工具栏下拉选择样式
           字号、字距、行距调整下拉框
           ======================================== */
        .toolbar-select {
            /* 背景 */
            background: none;
            /* 边框 */
            border: none;
            /* 文字颜色 */
            color: var(--text-secondary);
            /* 字号 */
            font-size: 13px;
            /* 光标样式 */
            cursor: pointer;
            /* 内边距 */

            text-align: center;

           ======================================== */
        .toolbar-toggle {

            /* 边框 */
            border: none;
            /* 字号 */

        @media (max-width: 1023px) {

            .toolbar.expanded .toolbar-btn:not(.toolbar-toggle) {

            border-radius: 8px;                        /* 圆角 */
            /* 边框 */
            border: none;
            /* 光标样式 */
            cursor: pointer;
            /* 字号 */
            font-size: 14px;

            font-weight: 500;

           设置菜单样式

        /* 下拉菜单样式 */

    <!-- ========================================

    <script>
    // ========================================
    // 歌曲数据加载函数
    // ========================================
    
    /**
     * 异步加载所有歌曲数据
     * 通过动态创建 script 标签加载分散在各个文件中的歌曲数据
     * @returns {Promise<Array>} 返回包含所有歌曲数据的数组
     */
    async function loadAllSongs() {
        // 初始化全局临时歌曲数组（各歌曲文件加载时会向此数组 push 数据）
        window.__songs = [];
        // 遍历歌曲文件清单，为每个文件创建一个加载 Promise
        // songFiles 数组由 songFiles.js 提供，包含所有歌曲文件的相对路径
        const loadPromises = songFiles.map(file => {
            return new Promise((resolve) => {
                // 使用 Promise 包装动态 script 标签的加载过程
                // 动态创建 script 元素，用于加载单个歌曲数据文件
                const script = document.createElement('script');
                script.src = file;                   // 设置脚本源地址（如 'lyrics/song1.js'）
                script.onload = resolve;              // 加载成功时 resolve
                script.onerror = () => {              // 加载失败时打印警告并 resolve（不阻塞）
                    console.warn('加载歌曲文件失败:', file);
                    resolve();
                };
                // 将 script 标签添加到文档头部，浏览器会自动开始加载
                document.head.appendChild(script);
            });
        });
        // 等待所有歌曲文件并行加载完成（Promise.all 并发执行）
        await Promise.all(loadPromises);
        // 返回收集到的所有歌曲数据（各歌曲文件通过 window.__songs.push() 注册数据）
        return window.__songs;
    }
    </script>

    <script>
    // ========================================
    // 全局状态变量
    // ========================================
    
    /** @type {Array} 所有歌曲数据 */
    let songs = [];
    window.songs = [];
    
    /** @type {Array} 所有歌手列表（去重后） */
    let artists = [];
    
    /** @type {Object|null} 当前选中的歌曲 */
    let currentSong = null;
    window.currentSong = null;
    
    /** @type {string} 当前筛选条件（歌手名或'all'） */
    let currentFilter = 'all';
    
    /** @type {number} 当前字体大小（px） */
    let fontSize = 20;
    
    /** @type {number} 懒加载显示的歌曲数量，0表示自动计算 */
    /** @type {number} 懒加载显示的歌曲数量，0表示尚未计算（首次渲染时自动根据容器高度计算） */
    let displayedSongs = 0;
    
    /** @type {number} 每个歌曲项的大致高度（px），用于懒加载计算 */
    /** @type {number} 每个歌曲项的大致高度（px），用于懒加载计算初始显示数量 */
    const SONG_ITEM_HEIGHT = 56;
    
    /** @type {number} 字间距（px），范围 0-10 */
    /** @type {number} 字间距（px），范围 0-10，默认0（无额外间距） */
    let letterSpacing = 0;
    
    /** @type {number} 行高倍数，范围 1.0-2.0 */
    /** @type {number} 行高倍数，范围 1.0-2.0，默认1.6（1.6倍行高） */
    let lineHeight = 1.6;
    
    /** @type {number} 最小字体大小 */
    /** @type {number} 最小字体大小（px），用户缩放的下限 */
    const MIN_FONT_SIZE = 12;
    
    /** @type {number} 最大字体大小 */
    /** @type {number} 最大字体大小（px），用户缩放的上限 */
    const MAX_FONT_SIZE = 24;

    // ========================================
    // 筛选和过滤函数
    // ========================================

    /**
     * 设置歌手筛选条件
     * @param {string} artist - 歌手名或'all'表示全部
     */
    function setFilter(artist) {
        // 更新当前筛选条件为指定的歌手名（或 'all' 表示显示全部）
        currentFilter = artist;
        // 遍历所有筛选按钮，更新激活状态样式
        // 使用 dataset.filter 属性匹配当前选中的歌手，匹配的按钮添加 active 类
        document.querySelectorAll(".filter-btn").forEach(btn => {
            btn.classList.toggle("active", btn.dataset.filter === artist);
        });
        // 筛选条件变化后重新渲染歌曲列表（应用新的筛选条件）
        renderSongList();
    }

    // ========================================
    // 初始化函数
    // ========================================

    /**
     * 应用初始化函数
     * 加载歌曲数据、初始化各模块、渲染界面
     */
    async function init() {
        // 初始化主题模块（根据用户偏好/系统设置加载主题）
        ThemeModule.init();

        // 加载所有歌曲数据
        songs = await loadAllSongs();
        window.songs = songs;

        // 加载 TTS 语音数据清单（预加载语音资源）
        await TTSModule.init();

        // 提取所有歌手（处理合唱歌曲如"古巨基/梁咏琪"）
        const artistSet = new Set();                   // 使用 Set 去重
        songs.forEach(s => {
            // 按 / 、、,，& 等分隔符拆分歌手名
            s.artist.split(/[\/、,，&]/).forEach(a => {
                const trimmed = a.trim();              // 去除首尾空格
                if (trimmed) artistSet.add(trimmed);   // 非空则添加到 Set
            });
        });
        artists = [...artistSet];                      // Set 转为数组

        // 渲染界面
        renderArtistFilter();                          // 渲染歌手筛选标签
        renderSongList();                              // 渲染歌曲列表
    }

    // ========================================
    // 歌手筛选渲染
    // ========================================

    /**
     * 渲染歌手筛选标签
     * 按歌曲数量排序，默认显示前5个，可展开显示全部
     */
    function renderArtistFilter() {
        const container = document.getElementById('artistFilter');
        const MAX_VISIBLE = 5;                          // 默认最多显示5个标签

        // 统计每个歌手的歌曲数量
        const artistCounts = {};
        songs.forEach(s => {
            // 同样处理合唱歌曲，按分隔符拆分统计
            s.artist.split(/[\/、,，&]/).forEach(a => {
                const trimmed = a.trim();
                if (trimmed) {
                    artistCounts[trimmed] = (artistCounts[trimmed] || 0) + 1;
                }
            });
        });

        // 按歌曲数量降序排序（歌曲多的排前面）
        const sortedArtists = Object.keys(artistCounts).sort((a, b) => artistCounts[b] - artistCounts[a]);
        const isExpanded = window.artistFilterExpanded || false;  // 获取展开状态
        // 根据展开状态决定显示全部还是只显示前5个
        const visibleArtists = isExpanded ? sortedArtists : sortedArtists.slice(0, MAX_VISIBLE);
        const hasMore = sortedArtists.length > MAX_VISIBLE;  // 是否有更多可显示

        // 生成 HTML：从"全部"按钮开始
        let html = '<span class="filter-btn active" data-filter="all" onclick="setFilter(\'all\')">全部</span>';
        visibleArtists.forEach(artist => {
            // 为每个歌手生成筛选按钮，显示歌手名
            html += `<span class="filter-btn" data-filter="${artist}" onclick="setFilter('${artist}')">${artist}</span>`;
        });

        // 添加展开/收起按钮（如果歌手数量超过默认值）
        if (hasMore) {
            if (isExpanded) {
                html += `<span class="filter-btn expand-btn" onclick="toggleArtistFilter()">收起 ▲</span>`;
            } else {
                html += `<span class="filter-btn expand-btn" onclick="toggleArtistFilter()">展开 ▼</span>`;
            }
        }
        // 将生成的 HTML 写入容器，完成歌曲列表的渲染
        container.innerHTML = html;
    }

    /**
     * 切换歌手筛选的展开/收起状态
     */
    function toggleArtistFilter() {
        window.artistFilterExpanded = !window.artistFilterExpanded;
        renderArtistFilter();
    }

    // ========================================
    // 歌曲列表渲染
    // ========================================

    /**
     * 渲染歌曲列表
     * 支持筛选、搜索、懒加载
     */
    function renderSongList() {
        const container = document.getElementById('songList');
        let filtered = songs;                            // 从所有歌曲开始筛选

        // 1. 按歌手筛选
        if (currentFilter !== 'all') {
            filtered = filtered.filter(s => {
                // 将歌手字段按分隔符拆分为数组，查找是否包含当前筛选的歌手
                const songArtists = s.artist.split(/[\/、,，&]/).map(a => a.trim());
                return songArtists.includes(currentFilter);
            });
        }

        // 2. 搜索过滤（歌名、歌手、填词、作曲、歌词内容）
        const searchQuery = document.getElementById('searchInput').value.trim().toLowerCase();
        if (searchQuery) {
            filtered = filtered.filter(s => {
                // 搜索歌名
                if (s.title.toLowerCase().includes(searchQuery)) return true;
                // 搜索歌手
                if (s.artist.toLowerCase().includes(searchQuery)) return true;
                // 搜索填词
                if (s.lyricist && s.lyricist.toLowerCase().includes(searchQuery)) return true;
                // 搜索作曲
                if (s.composer && s.composer.toLowerCase().includes(searchQuery)) return true;
                // 搜索歌词内容（将所有字符连接成字符串后搜索）
                const lyricsText = s.lyrics
                    .filter(l => l.chars)               // 过滤出有字符的行
                    .map(l => l.chars.join(''))         // 提取字符数组并连接
                    .join('');
                if (lyricsText.toLowerCase().includes(searchQuery)) return true;
                return false;
            });
        }

        // 3. 懒加载：动态计算初始显示数量（基于容器高度）
        if (displayedSongs === 0) {
            const containerHeight = container.clientHeight || 400;  // 默认高度400px
            // 计算能显示的歌曲数量：容器高度 / 每项高度，至少显示5首
            displayedSongs = Math.max(Math.ceil(containerHeight / SONG_ITEM_HEIGHT), 5);
        }

        // 4. 截取需要显示的歌曲
        const songsToShow = filtered.slice(0, displayedSongs);
        let html = '';

        // 5. 渲染歌曲项
        songsToShow.forEach((song, index) => {
            const isActive = currentSong && currentSong.id === song.id;  // 是否为当前选中歌曲
            // 删除模式下点击切换选择，正常模式下点击选择歌曲
            const clickAction = DeleteModule.isActive()
                ? `DeleteModule.toggleSelect(${song.id}, event)`
                : `selectSong(${song.id})`;
            // 生成歌曲项 HTML 结构
            // 包含：序号（两位数补零）、歌曲标题、歌手名
            html += `
                <div class="song-item ${isActive ? 'active' : ''}" onclick="${clickAction}">
                    <span class="song-number">${String(index + 1).padStart(2, '0')}</span>
                    <div class="song-info-compact">
                        <div class="song-title-compact">${song.title}</div>
                        <div class="song-artist-compact">${song.artist}</div>
                    </div>
                </div>
            `;
        });

        // 6. 显示"加载更多"按钮（如果还有更多歌曲未显示）
        if (filtered.length > displayedSongs) {
            html += `
                <div class="load-more-btn" onclick="loadMoreSongs()">
                    加载更多 (${filtered.length - displayedSongs} 首)
                </div>
            `;
        }

        container.innerHTML = html;                      // 更新 DOM
    }

    /**
     * 加载更多歌曲（懒加载）
     * 每次增加10首歌曲
     */
    function loadMoreSongs() {
        // 每次点击"加载更多"时增加10首歌曲的显示数量
        displayedSongs += 10;
        // 重新渲染歌曲列表（会根据新的 displayedSongs 值显示更多歌曲）
        renderSongList();
    }

    /**
     * 重置懒加载计数器
     * 筛选或搜索条件变化时调用，重新计算初始显示数量
     */
    function resetLazyLoad() {
        // 重置为 0，触发下次渲染时重新计算
        displayedSongs = 0;
    }

    /**
     * 搜索过滤函数（输入框事件处理）
     * 每次输入时调用，重新渲染列表
     */
    function filterSongs() {
        // 先重置懒加载计数器（搜索结果可能比之前少，需要重新计算显示数量）
        resetLazyLoad();
        // 重新渲染歌曲列表（应用新的搜索关键词）
        renderSongList();
    }

    // ========================================
    // 歌曲选择和视图切换
    // ========================================

    /**
     * 选择歌曲并显示歌词
     * @param {number} id - 歌曲ID
     */
    function selectSong(id) {
        // 如果处于纠错模式，先退出（避免状态混乱）
        if (CorrectionModule.isActive()) {
            CorrectionModule.toggle();
        }

        // 根据ID查找并设置当前歌曲
        currentSong = songs.find(s => s.id === id);
        window.currentSong = currentSong;                  // 同步到全局变量

        // 重新渲染歌曲列表（更新选中状态高亮）和歌词
        renderSongList();
        renderLyrics();

        // 滚动歌词到顶部
        const mainContent = document.querySelector('.main-content');
        if (mainContent) {
            mainContent.scrollTop = 0;                    // 重置滚动位置
        }

        // 移动端：切换到歌词视图（隐藏侧边栏，显示歌词）
        if (window.innerWidth < 1024) {
            document.getElementById('appContainer').classList.add('view-lyrics');  // 添加类名切换布局
            document.getElementById('mobileHeader').style.display = 'flex';         // 显示返回按钮
        }
    }

    /**
     * 返回歌曲列表（移动端）
     * 点击返回按钮时调用，恢复侧边栏显示
     */
    function showSongList() {
        // 移除歌词视图样式，恢复侧边栏显示
        document.getElementById('appContainer').classList.remove('view-lyrics');
        document.getElementById('mobileHeader').style.display = 'none';  // 隐藏返回按钮

        // 清除当前歌曲，恢复空状态
        currentSong = null;
        window.currentSong = null;

        // 重新渲染（显示空状态）
        renderLyrics();
        renderSongList();
    }

    // ========================================
    // 歌词渲染
    // ========================================

    /**
     * 渲染歌词内容
     * 包括：标题、歌手信息、歌词正文
     */
    function renderLyrics() {
        // 没有选中歌曲时显示空状态
        if (!currentSong) {
            document.getElementById('emptyState').style.display = 'flex';
            document.getElementById('lyricsView').style.display = 'none';
            return;
        }

        // 显示歌词视图，隐藏空状态
        document.getElementById('emptyState').style.display = 'none';
        document.getElementById('lyricsView').style.display = 'block';
        document.getElementById('mobileTitle').textContent = currentSong.title;  // 移动端标题

        // ========== 渲染标题（带粤拼） ==========
        // 将标题拆分为字符数组，为每个字符生成带粤拼的 HTML
        const titleHtml = currentSong.title.split('').map((char, i) => {
            const jp = currentSong.titleJyutping[i] || '';  // 获取对应粤拼，无则空
            return `
                <span class="title-char-group">
                    <span class="title-char-jyutping">${jp}</span>
                    <span class="title-char-hanzi">${char}</span>
                </span>
            `;
        }).join('');
        document.getElementById('songTitle').innerHTML = titleHtml;

        // ========== 渲染元数据（歌手、填词、作曲） ==========
        document.getElementById('songArtist').innerHTML = renderMetaName(currentSong.artist, currentSong.artistJyutping);
        document.getElementById('songLyricist').innerHTML = renderMetaName(currentSong.lyricist, currentSong.lyricistJyutping);
        document.getElementById('songComposer').innerHTML = renderMetaName(currentSong.composer, currentSong.composerJyutping);

        // ========== 渲染歌词正文 ==========
        let lyricsHtml = '';
        let displayLineIndex = 0;                      // 用户可见的行号（不含段落分隔）

        currentSong.lyrics.forEach((line, index) => {
            // 段落分隔：连续两个空行会产生 paragraphBreak 标记
            if (line.paragraphBreak) {
                lyricsHtml += '<div class="lyric-paragraph-break"></div>';
                return;
            }

            // 将同一行的所有字符放入一个 segment（处理括号内跨行情况）
            const segments = [];
            const currentSegment = [];
            let inBrackets = 0;                        // 括号嵌套层级计数

            // 遍历当前行的每个字符
            line.chars.forEach((char, i) => {
                // 跟踪书名号和括号的嵌套层级（用于跨行合并）
                if (char === '《' || char === '(' || char === '（') inBrackets++;
                if (char === '》' || char === ')' || char === '）') inBrackets = Math.max(0, inBrackets - 1);
                // 将字符及其粤拼、原始索引存入当前 segment
                // 所有字符都放入同一个 segment（括号内的跨行内容会合并显示）
                currentSegment.push({ char, jp: line.jp[i] || '', index: i });
            });

            // 如果有字符，添加到 segments
            if (currentSegment.length > 0) {
                segments.push(currentSegment);
            }

            // 渲染每个分段
            segments.forEach((segment, segIdx) => {
                // ========== 渲染每个字符 ==========
                const segmentHtml = segment.map(({ char, jp, index: charIndex }) => {
                    // 空格字符：保留间距但不创建 char-group（不可点击）
                    if (char === ' ' || char === '\u3000') {
                        return '<span style="display:inline-block;width:1em;">&nbsp;</span>';
                    }
                    // 非空格字符：创建可点击的 char-group
                    return `
                    <span class="char-group"
                          data-line="${displayLineIndex}"
                          data-song-index="${index}"
                          data-char="${charIndex}"
                          data-original-jp="${jp}"
                          onclick="onCharClick(event, ${displayLineIndex}, ${charIndex})"
                          style="margin-right:${letterSpacing}px">
                        <span class="char-jyutping">${jp}</span>
                        <span class="char-hanzi" style="font-size:${fontSize}px">${char}</span>
                    </span>`;
                }).join('');

                // ========== 生成播放按钮 ==========
                // 收集该 segment 中所有粤拼，生成 TTS 播放调用
                const segJp = segment
                    .map(s => s.jp)
                    .filter(j => j)                           // 过滤空粤拼
                    .map(j => "'" + j.replace(/'/g, "\\'") + "'")  // 转义单引号
                    .join(',');
                // 播放按钮 HTML，点击时调用 TTSModule 播放该段落
                const playBtn = `<button class="tts-play-btn"
                    onclick="event.stopPropagation(); TTSModule.playSegment([${segJp}], this)"
                    title="播放语音">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="6 3 20 12 6 21 6 3"/></svg>
                </button>`;

                // 生成歌词行 HTML
                lyricsHtml += `<div class="lyric-line"
                    data-line="${displayLineIndex}"
                    data-song-index="${index}"
                    style="line-height:${lineHeight}"
                    onclick="onLyricLineClick(event, ${displayLineIndex})">
                    ${playBtn}
                    <div class="lyric-line-content">${segmentHtml}</div>
                </div>`;

                displayLineIndex++;                         // 行号递增
            });
        });

        // 将生成的完整歌词 HTML 写入歌词内容容器，完成渲染
        document.getElementById('lyricsContent').innerHTML = lyricsHtml;
    }

    /**
     * 渲染带粤拼的人名
     * @param {string} name - 人名
     * @param {Array} jyutpingArr - 粤拼音节数组
     * @returns {string} HTML字符串
     */
    function renderMetaName(name, jyutpingArr) {
        if (!jyutpingArr || jyutpingArr.length === 0) return name;  // 无粤拼时直接返回原名
        // 将人名拆分为字符数组，为每个字符生成带粤拼的 HTML
        return name.split('').map((char, i) => {
            const jp = jyutpingArr[i] || '';           // 获取对应粤拼
            return `
                <span class="meta-name-group">
                    <span class="meta-name-jyutping">${jp}</span>
                    <span class="meta-name-hanzi">${char}</span>
                </span>
            `;
        }).join('');
    }

    // ========================================
    // 字体和布局调整
    // ========================================

    /**
     * 调整字体大小
     * @param {number} delta - 变化量（正数放大，负数缩小）
     */
    function adjustFontSize(delta) {
        // 计算新的字号值（当前字号 + 变化量）
        const newSize = fontSize + delta;
        // 边界检查：最小12px，最大24px
        if (newSize < MIN_FONT_SIZE) {
            showToast('已是最小字号');
            return;
        }
        if (newSize > MAX_FONT_SIZE) {
            showToast('已是最大字号');
            return;
        }
        fontSize = newSize;                           // 更新全局变量
        renderLyrics();                               // 重新渲染歌词（应用新字号）
    }

    /**
     * 调整字间距
     * @param {number} delta - 变化量（px）
     */
    function adjustLetterSpacing(delta) {
        // 计算新的字间距值（当前字间距 + 变化量）
        const newSpacing = letterSpacing + delta;
        // 边界检查：最小0px，最大10px
        if (newSpacing < 0) {
            showToast('已是最小字间距');
            return;
        }
        if (newSpacing > 10) {
            showToast('已是最大字间距');
            return;
        }
        letterSpacing = newSpacing;                   // 更新全局变量
        renderLyrics();                               // 重新渲染歌词
    }

    /**
     * 调整行高
     * @param {number} delta - 变化量
     */
    function adjustLineHeight(delta) {
        // 计算新行高并四舍五入到一位小数
        const newHeight = Math.round((lineHeight + delta) * 10) / 10;
        // 边界检查：最小1.0，最大2.0
        if (newHeight < 1.0) {
            showToast('已是最小行间距');
            return;
        }
        if (newHeight > 2.0) {
            showToast('已是最大行间距');
            return;
        }
        lineHeight = newHeight;                       // 更新全局变量
        renderLyrics();                               // 重新渲染歌词
    }

    // ========================================
    // 工具函数
    // ========================================

    /**
     * 显示提示消息（Toast）
     * 在屏幕中央显示短暂的消息提示，1.5秒后自动消失
     * @param {string} message - 消息内容
     */
    function showToast(message) {
        // 移除已存在的 toast（防止重复显示）
        const existingToast = document.querySelector('.toast-message');
        if (existingToast) {
            existingToast.remove();
        }

        // 创建 toast 元素
        const toast = document.createElement('div');
        toast.className = 'toast-message';
        toast.textContent = message;
        // 使用内联样式确保立即生效
        toast.style.cssText = `
            /* 定位方式 */
            position: fixed;
            top: 50%;
            /* 左侧偏移 */
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);             /* 半透明黑色背景 */
            /* 文字颜色 */
            color: #fff;
            /* 内边距 */
            padding: 12px 24px;
            /* 圆角 */
            border-radius: 8px;
            /* 字号 */
            font-size: 14px;
            z-index: 10000;                              /* 最高层级 */
            animation: fadeInOut 1.5s ease forwards;   /* 淡入淡出动画 */
        `;
        document.body.appendChild(toast);              // 添加到页面

        // 1.5秒后自动移除
        setTimeout(() => toast.remove(), 1500);
    }

    /**
     * 切换工具栏展开/收起状态（移动端）
     * 点击展开按钮时切换工具栏按钮的显示/隐藏
     */
    function toggleToolbar() {
        const toolbar = document.getElementById('toolbar');
        const toggle = document.getElementById('toolbarToggle');
        toolbar.classList.toggle('expanded');          // 切换展开状态类

        // 切换箭头图标方向（向下/向上）
        const chevronDown = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>';
        const chevronUp = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6"/></svg>';
        // 根据展开状态选择箭头图标
        toggle.innerHTML = toolbar.classList.contains('expanded') ? chevronDown : chevronUp;
    }

    /**
     * 分享当前歌曲（复制链接到剪贴板）
     * 生成包含歌曲ID的URL并复制到剪贴板
     */
    function shareSong() {
        // 安全检查：如果没有选中歌曲，直接返回（无法分享）
        if (!currentSong) return;
        const url = `${window.location.origin}${window.location.pathname}#${currentSong.id}`;  // 生成带锚点的URL

        if (navigator.clipboard) {
            // 优先使用 Clipboard API
            navigator.clipboard.writeText(url).then(() => showToast('链接已复制'));
        } else {
            // 降级处理：显示URL
            showToast('链接: ' + url);
        }
    }

    /**
     * 打开投稿表单
     * @param {string} type - 投稿类型
     */
    function openSubmitForm(type) {
        if (!currentSong) {
            showToast('请先选择一首歌曲');
            return;
        }
        const songName = encodeURIComponent(currentSong.title);
        // 在新窗口打开投稿表单页面，携带投稿类型和歌曲名参数
        // type 参数标识投稿类型（如 'correction' 纠错投稿）
        window.open(`submit.html?type=${type}&song=${songName}`, '_blank');
    }

    // ========================================
    // 事件处理函数
    // ========================================

    /**
     * 字符点击事件处理
     * 根据当前模式处理：
     * - TTS播放模式：播放该字符的语音
     * - 纠错模式：弹出编辑粤拼的弹窗
     * @param {Event} event - 点击事件
     * @param {number} lineIndex - 行索引
     * @param {number} charIndex - 字符索引
     */
    function onCharClick(event, lineIndex, charIndex) {
        // ========== TTS播放模式 ==========
        if (TTSModule.isModeActive()) {
            event.stopPropagation();                      // 阻止事件冒泡
            const charGroup = event.currentTarget;        // 获取被点击的字符元素
            const jp = charGroup.dataset.originalJp;      // 获取原始粤拼
            TTSModule.playChar(jp, charGroup);           // 播放该字符语音
            return;
        }

        // ========== 纠错模式 ==========
        // 尝试让纠错模块处理点击事件
        if (CorrectionModule.handleCharClick(event, lineIndex, charIndex)) {
            return;                                       // 已处理则返回
        }
    }

    /**
     * 歌词行点击事件处理
     * 用于修改歌词模式：点击行后弹出编辑歌词的弹窗
     * @param {Event} event - 点击事件
     * @param {number} lineIndex - 行索引
     */
    function onLyricLineClick(event, lineIndex) {
        // 让修改歌词模块处理
        if (EditLyricsModule.handleLineClick(event, lineIndex)) {
            return;
        }
    }

    // ========================================
    // 主题相关函数
    // ========================================

    /**
     * 循环切换主题模式
     * 顺序：日间 -> 夜间 -> 跟随系统 -> 日间
     */
    function cycleThemeMode() {
        // 获取当前主题模式（返回 'light'、'dark' 或 'auto'）
        const mode = ThemeModule.getMode();
        // 根据当前模式确定下一个模式
        const nextMode = mode === 'light' ? 'dark' : mode === 'dark' ? 'auto' : 'light';
        ThemeModule.set(nextMode);                      // 应用新主题
        updateThemeToggleButton();                       // 更新按钮显示
    }

    /**
     * 更新主题切换按钮的显示
     * 根据当前主题模式显示不同的图标和文字
     */
    function updateThemeToggleButton() {
        const btn = document.getElementById('themeToggleBtn');
        if (!btn) return;
        const mode = ThemeModule.getMode();              // 获取当前模式

        // 根据模式更新按钮内容和图标
        if (mode === 'light') {
            // 日间模式：显示太阳图标
            btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg> 日间模式';
        } else if (mode === 'dark') {
            // 夜间模式：显示月亮图标 + "夜间模式"文字
            btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg> 夜间模式';
        } else {
            // 自动模式（跟随系统）：显示月亮+加号图标 + "跟随系统"文字
            btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/><path d="M19 3v4"/><path d="M21 5h-4"/></svg> 跟随系统';
        }
    }

    /**
     * 切换设置菜单的显示/隐藏
     */
    function toggleSettings() {
        const dropdown = document.getElementById('settingsDropdown');
        // 切换显示/隐藏状态
        dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
        // 显示时更新主题按钮状态
        if (dropdown.style.display === 'block') updateThemeToggleButton();
    }

    // 点击页面其他地方关闭设置菜单
    document.addEventListener('click', function(e) {
        const dropdown = document.getElementById('settingsDropdown');
        const settingsBtn = document.getElementById('settingsBtn');
        // 如果点击的不是下拉菜单也不是设置按钮，则关闭菜单
        if (dropdown && settingsBtn && !dropdown.contains(e.target) && !settingsBtn.contains(e.target)) {
            dropdown.style.display = 'none';
        }
    });
    </script>

    <!-- ========================================
         导入歌词模态框
         ======================================== -->
    <div class="import-modal" id="importModal" style="display:none;">
        <div class="import-modal-content">
            <div class="import-modal-title"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-right: 6px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>导入新歌词</div>
            
            <div class="import-form-group">
                <label>歌曲名称 *</label>
                <input type="text" id="importTitle" placeholder="输入歌曲名称">
            </div>
            
            <div class="import-form-group">
                <label>歌手 *</label>
                <input type="text" id="importArtist" placeholder="输入歌手名称（合唱用 / 分隔）">
            </div>
            
            <div class="import-form-group">
                <label>填词</label>
                <input type="text" id="importLyricist" placeholder="填词人">
            </div>
            
            <div class="import-form-group">
                <label>作曲</label>
                <input type="text" id="importComposer" placeholder="作曲人">
            </div>
            
            <div class="import-form-group">
                <label>歌词内容 *</label>
                <textarea id="importLyrics" placeholder="粘贴歌词内容，换行表示新的一句，连续两个空行表示段落分隔" oninput="ImportModule.preview()"></textarea>
                <div class="import-tip"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-right: 4px;"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></svg> 单换行 = 新的一句歌词 &nbsp;|&nbsp; 双换行 = 段落分隔（更大间距）</div>
            </div>
            
            <div class="import-preview" id="importPreview" style="display:none;">
                <div class="import-preview-title">预览（粤拼自动匹配）</div>
                <div id="importPreviewContent"></div>
            </div>
            
            <div class="import-actions">
                <button class="import-btn cancel" onclick="ImportModule.hide()">取消</button>
                <button class="import-btn confirm" onclick="ImportModule.generate()">生成歌曲文件</button>
            </div>
        </div>
    </div>

    <!-- ========================================
         生成代码模态框（导入结果）
         ======================================== -->
    <div class="import-modal" id="codeModal" style="display:none;">
        <div class="import-modal-content" style="max-width: 700px;">
            <div class="import-modal-title"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-right: 6px;"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></svg>生成的歌曲文件代码</div>
            <div class="import-form-group">
                <label>复制以下代码，保存为 .js 文件到 lyrics 文件夹</label>
                <textarea id="generatedCode" style="min-height: 300px; font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; font-size: 12px;" readonly></textarea>
            </div>
            <div class="import-actions">
                <button class="import-btn cancel" onclick="ImportModule.hideCode()">关闭</button>
                <button class="import-btn confirm" onclick="ImportModule.copyCode()">复制代码</button>
            </div>
        </div>
    </div>

    <!-- ========================================
         应用启动
         ======================================== -->
    <script>
    init();
    </script>
</body>
</html>
