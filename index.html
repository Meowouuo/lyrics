<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>粤拼歌词 | Cantonese Lyrics with Jyutping</title>
    <link rel="icon" type="image/png" href="icon.png">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans SC", sans-serif;
            background: #f5f5f5;
            color: #333;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* ===== Mobile: Single Column Layout ===== */
        .app-container {
            max-width: 100%;
            margin: 0 auto;
            background: #fff;
            min-height: 100vh;
        }

        /* ===== Desktop: Split Layout ===== */
        @media (min-width: 1024px) {
            body { background: #f0f0f0; }
            .app-container {
                display: flex;
                max-width: 1400px;
                min-height: 100vh;
                margin: 0 auto;
                background: #fff;
            }
        }

        /* ===== Sidebar (Left) ===== */
        .sidebar {
            background: #fff;
            border-bottom: 1px solid #eee;
        }
        @media (min-width: 1024px) {
            .sidebar {
                width: 360px;
                min-width: 360px;
                border-right: 1px solid #e8e8e8;
                border-bottom: none;
                display: flex;
                flex-direction: column;
                height: 100vh;
                position: sticky;
                top: 0;
            }
        }

        .sidebar-header {
            padding: 20px 24px;
            border-bottom: 1px solid #f0f0f0;
        }
        @media (min-width: 1024px) {
            .sidebar-header { padding: 24px 28px; }
        }

        .logo {
            font-size: 22px;
            font-weight: 700;
            color: #000;
            margin-bottom: 4px;
        }
        @media (min-width: 1024px) {
            .logo { font-size: 24px; }
        }

        .logo-sub {
            font-size: 13px;
            color: #999;
        }

        .search-box {
            padding: 16px 24px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        @media (min-width: 1024px) {
            .search-box { padding: 16px 28px; }
        }

        .search-wrapper {
            flex: 1;
            position: relative;
        }

        .manage-btn {
            flex-shrink: 0;
            padding: 8px 14px;
            border: 1px solid #dc2626;
            background: transparent;
            color: #dc2626;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            white-space: nowrap;
            transition: all 0.15s;
        }
        .manage-btn:hover { background: #fef2f2; }
        .manage-btn.active {
            background: #dc2626;
            color: #fff;
        }

        .search-input {
            width: 100%;
            padding: 10px 14px 10px 38px;
            border: 1px solid #e8e8e8;
            border-radius: 8px;
            font-size: 14px;
            background: #fafafa;
            outline: none;
            transition: all 0.2s;
        }
        .search-input:focus {
            border-color: #ccc;
            background: #fff;
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #bbb;
        }

        .search-wrapper { position: relative; }

        /* Artist Filter */
        .artist-filter {
            padding: 16px 24px;
            border-bottom: 1px solid #f0f0f0;
            overflow-x: auto;
            white-space: nowrap;
        }
        @media (min-width: 1024px) {
            .artist-filter {
                padding: 16px 28px;
                overflow-x: hidden;
                white-space: normal;
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
            }
        }

        .artist-filter::-webkit-scrollbar { display: none; }

        .filter-btn {
            display: inline-block;
            padding: 6px 14px;
            margin-right: 8px;
            border-radius: 16px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #e8e8e8;
            background: #fff;
            color: #666;
        }
        @media (min-width: 1024px) {
            .filter-btn { margin-right: 0; }
        }

        .filter-btn:hover { background: #f5f5f5; }
        .filter-btn.active {
            background: #000;
            color: #fff;
            border-color: #000;
        }

        /* Song List */
        .song-list {
            padding: 8px 0;
            overflow-y: auto;
            flex: 1;
        }
        
        .load-more-btn {
            padding: 12px 24px;
            text-align: center;
            color: #1890ff;
            cursor: pointer;
            font-size: 14px;
            border-top: 1px solid #e8e8e8;
            transition: background 0.2s;
        }
        .load-more-btn:hover {
            background: #f5f5f5;
        }

        .song-item {
            display: flex;
            align-items: center;
            padding: 14px 24px;
            cursor: pointer;
            transition: background 0.15s;
            border-left: 3px solid transparent;
        }
        @media (min-width: 1024px) {
            .song-item { padding: 14px 28px; }
        }

        .song-item:hover { background: #f8f8f8; }
        .song-item.active {
            background: #f5f5f5;
            border-left-color: #000;
        }

        .song-delete-btn { display: none; }
        .delete-mode .song-item { cursor: pointer; }
        .delete-mode .song-item.delete-selected {
            background: #fef2f2;
            border-left-color: #dc2626;
        }
        .delete-mode .song-item.delete-selected .song-number {
            color: #dc2626;
            font-weight: bold;
        }

        .delete-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 24px;
            border-top: 1px solid #f0f0f0;
            background: #fff;
            position: sticky;
            bottom: 0;
            font-size: 13px;
            color: #666;
        }
        .delete-submit-btn {
            padding: 8px 16px;
            background: #dc2626;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: opacity 0.15s;
        }
        .delete-submit-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .delete-submit-btn:not(:disabled):hover { opacity: 0.85; }

        .song-number {
            width: 28px;
            font-size: 13px;
            color: #bbb;
            flex-shrink: 0;
        }

        .song-info-compact {
            flex: 1;
            min-width: 0;
        }

        .song-title-compact {
            font-size: 15px;
            font-weight: 500;
            color: #000;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .song-artist-compact {
            font-size: 12px;
            color: #999;
        }

        /* ===== Main Content (Right) ===== */
        .main-content {
            flex: 1;
            min-width: 0;
            background: #fff;
        }
        @media (min-width: 1024px) {
            .main-content {
                overflow-y: auto;
                height: 100vh;
            }
        }

        /* Empty State */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            padding: 40px;
            text-align: center;
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        .empty-title {
            font-size: 20px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .empty-desc {
            font-size: 14px;
            color: #999;
        }

        /* Lyrics View */
        .lyrics-view {
            padding: 24px;
        }
        @media (min-width: 1024px) {
            .lyrics-view {
                padding: 40px 48px;
                max-width: 800px;
                margin: 0 auto;
            }
        }

        /* Song Header */
        .song-header {
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid #f0f0f0;
        }

        .song-title-row {
            display: flex;
            align-items: flex-end;
            gap: 16px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .song-title-main {
            display: flex;
            align-items: flex-end;
            gap: 4px;
        }
        @media (min-width: 1024px) {
            .song-title-main { gap: 6px; }
        }

        .title-char-group {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
        }

        .title-char-jyutping {
            font-size: 11px;
            color: #999;
            font-family: "SF Mono", "Fira Code", "Consolas", monospace;
            margin-bottom: 2px;
            height: 14px;
        }
        @media (min-width: 1024px) {
            .title-char-jyutping { font-size: 13px; height: 16px; }
        }

        .title-char-hanzi {
            font-size: 28px;
            font-weight: 700;
            color: #000;
            line-height: 1.2;
        }
        @media (min-width: 1024px) {
            .title-char-hanzi { font-size: 36px; }
        }

        .song-meta-row {
            display: flex;
            flex-direction: column;
            gap: 8px;
            font-size: 14px;
            color: #666;
        }

        .song-meta-row-inner {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
        }

        .song-meta-item {
            display: flex;
            align-items: flex-end;
            gap: 6px;
        }

        .song-meta-label {
            color: #999;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
        }

        .song-meta-label-jyutping {
            font-size: 9px;
            color: #bbb;
            font-family: "SF Mono", "Fira Code", "Consolas", monospace;
            height: 11px;
        }

        .song-meta-label-hanzi {
            font-size: 14px;
            color: #999;
        }

        .meta-name-group {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
        }

        .meta-name-jyutping {
            font-size: 9px;
            color: #bbb;
            font-family: "SF Mono", "Fira Code", "Consolas", monospace;
            height: 11px;
        }

        .meta-name-hanzi {
            font-size: 14px;
            color: #666;
        }

        /* Lyrics Content */
        .lyrics-content {
            line-height: 2;
        }

        .lyric-paragraph-break {
            height: 16px;
        }

        .lyric-line:nth-child(1) { animation-delay: 0.02s; }
        .lyric-line:nth-child(2) { animation-delay: 0.04s; }
        .lyric-line:nth-child(3) { animation-delay: 0.06s; }
        .lyric-line:nth-child(4) { animation-delay: 0.08s; }
        .lyric-line:nth-child(5) { animation-delay: 0.10s; }
        .lyric-line:nth-child(6) { animation-delay: 0.12s; }
        .lyric-line:nth-child(7) { animation-delay: 0.14s; }
        .lyric-line:nth-child(8) { animation-delay: 0.16s; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
            15% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            85% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
        }

        .char-group {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            margin-right: 2px;
            vertical-align: bottom;
        }
        @media (min-width: 1024px) {
            .char-group { margin-right: 3px; }
        }

        .char-jyutping {
            font-size: 13px;
            color: #888;
            font-family: "SF Mono", "Fira Code", "Consolas", monospace;
            margin-bottom: 2px;
            height: 16px;
        }
        @media (min-width: 1024px) {
            .char-jyutping { font-size: 15px; height: 18px; }
        }

        .char-jyutping:empty::before { content: "\00a0"; }

        .char-hanzi {
            font-size: 20px;
            font-weight: 400;
            color: #000;
        }
        @media (min-width: 1024px) {
            .char-hanzi { font-size: 24px; }
        }

        /* TTS Play Button */
        .tts-play-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            margin-right: 8px;
            background: #f0f0f0;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 12px;
            color: #666;
            transition: all 0.2s;
            vertical-align: middle;
        }
        .tts-play-btn:hover {
            background: #e0e0e0;
            color: #333;
        }
        .tts-play-btn:active {
            transform: scale(0.95);
        }
        .tts-play-btn.playing {
            background: #4CAF50;
            color: #fff;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        /* 播放模式样式 */
        .tts-mode .char-group {
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.15s;
        }
        .tts-mode .char-group:hover {
            background: rgba(76, 175, 80, 0.1);
        }
        .tts-mode .char-group.tts-char-playing {
            background: rgba(76, 175, 80, 0.2);
        }
        .tts-mode .char-group.tts-char-playing .char-hanzi {
            color: #4CAF50;
        }
        .toolbar-btn.tts-active {
            background: #4CAF50;
            color: #fff;
            border-color: #4CAF50;
        }
        .toolbar-btn.tts-active:hover {
            background: #43a047;
        }
        /* TTS 加载动画 */
        .tts-loading {
            position: relative;
        }
        .tts-loading::after {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            width: 16px;
            height: 16px;
            margin: -8px 0 0 -8px;
            border: 2px solid #4CAF50;
            border-top-color: transparent;
            border-radius: 50%;
            animation: tts-spin 0.8s linear infinite;
        }
        @keyframes tts-spin {
            to { transform: rotate(360deg); }
        }
        .tts-mode .char-group.tts-loading {
            background: rgba(76, 175, 80, 0.05);
        }
        .lyric-line {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            line-height: 1.6;
            animation: fadeIn 0.3s ease forwards;
            opacity: 0;
        }
        .lyric-line-content {
            flex: 1;
        }

        /* Toolbar */
        .toolbar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #fff;
            border-top: 1px solid #eee;
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        @media (min-width: 1024px) {
            .toolbar {
                position: sticky;
                bottom: 0;
                padding: 12px 48px;
                max-width: 800px;
                margin: 0 auto;
            }
        }

        .toolbar-left {
            display: flex;
            gap: 4px;
            flex: 1;
        }
        @media (max-width: 1023px) {
            .toolbar-left {
                flex-wrap: wrap;
            }
        }

        .toolbar-btn {
            background: none;
            border: none;
            color: #666;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 10px;
            border-radius: 6px;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .toolbar-btn:hover {
            background: #f5f5f5;
            color: #000;
        }

        .toolbar-btn .icon {
            font-size: 16px;
        }
        .toolbar-btn span:not(.icon) {
            display: none;
        }
        @media (min-width: 768px) {
            .toolbar-btn span:not(.icon) {
                display: inline;
            }
        }

        .toolbar-btn.primary {
            background: #000;
            color: #fff;
        }

        .toolbar-btn.primary:hover {
            background: #333;
        }

        .toolbar-select {
            background: none;
            border: none;
            color: #666;
            font-size: 16px;
            cursor: pointer;
            padding: 8px 2px;
            margin: 0;
            appearance: none;
            -webkit-appearance: none;
            text-align: center;
            min-width: 28px;
        }
        .toolbar-select:focus { outline: none; }

        .toolbar-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 16px;
            color: #666;
            cursor: pointer;
            padding: 8px;
        }
        @media (max-width: 1023px) {
            .toolbar-toggle {
                display: block;
            }
            /* 手机端默认收起 */
            .toolbar {
                padding: 8px 16px;
            }
            .toolbar .toolbar-left,
            .toolbar .toolbar-btn:not(.toolbar-toggle) {
                display: none;
            }
            /* 展开状态 */
            .toolbar.expanded {
                padding: 12px 24px;
            }
            .toolbar.expanded .toolbar-left,
            .toolbar.expanded .toolbar-btn:not(.toolbar-toggle) {
                display: flex;
            }
        }

        /* Mobile Header (only on mobile) */
        .mobile-header {
            display: flex;
            align-items: center;
            padding: 14px 24px;
            border-bottom: 1px solid #eee;
            background: #fff;
        }
        @media (min-width: 1024px) {
            .mobile-header { display: none; }
        }

        .mobile-header-title {
            font-size: 17px;
            font-weight: 600;
            flex: 1;
            text-align: center;
        }

        .mobile-back-btn {
            background: none;
            border: none;
            font-size: 20px;
            color: #333;
            cursor: pointer;
            padding: 4px;
        }

        /* Mobile View Toggle */
        .mobile-only { display: block; }
        .desktop-only { display: none; }

        @media (min-width: 1024px) {
            .mobile-only { display: none; }
            .desktop-only { display: block; }
        }

        /* View States */
        .view-lyrics .sidebar {
            display: none;
        }
        @media (min-width: 1024px) {
            .view-lyrics .sidebar { display: flex; }
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #ccc; }

        /* ===== Correction Mode ===== */
        .correction-mode .char-group {
            cursor: pointer;
            border-radius: 4px;
            padding: 2px;
            margin-right: 2px;
            transition: all 0.15s;
            position: relative;
        }
        @media (min-width: 1024px) {
            .correction-mode .char-group { margin-right: 4px; }
        }
        .correction-mode .char-group:hover {
            background: #e8f4fd;
        }
        .correction-mode .char-group.selected {
            background: #d0e8ff;
            outline: 2px solid #4a9eff;
            outline-offset: -1px;
        }
        .correction-mode .char-group.corrected {
            background: #fff3cd;
            outline: 2px solid #ffc107;
            outline-offset: -1px;
        }
        .correction-mode .char-group.corrected .char-jyutping {
            color: #d48806;
            font-weight: 600;
        }

        /* Correction banner */
        .correction-banner {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: #fff3cd;
            border-bottom: 2px solid #ffc107;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            z-index: 100;
            font-size: 14px;
            color: #856404;
            animation: slideDown 0.2s ease;
        }
        @keyframes slideDown {
            from { transform: translateY(-100%); }
            to { transform: translateY(0); }
        }
        .correction-banner-btn {
            padding: 6px 16px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.15s;
        }
        .correction-banner-btn.submit {
            background: #28a745;
            color: #fff;
        }
        .correction-banner-btn.submit:hover { background: #218838; }
        .correction-banner-btn.submit:disabled { background: #ccc; cursor: not-allowed; }
        .correction-banner-btn.cancel {
            background: #fff;
            color: #666;
            border: 1px solid #ddd;
        }
        .correction-banner-btn.cancel:hover { background: #f5f5f5; }

        /* Edit popup */
        .edit-popup {
            position: fixed;
            z-index: 200;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15), 0 0 0 1px rgba(0,0,0,0.05);
            padding: 16px;
            min-width: 200px;
            animation: popIn 0.15s ease;
        }
        @keyframes popIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        .edit-popup-title {
            font-size: 12px;
            color: #999;
            margin-bottom: 8px;
        }
        .edit-popup-chars {
            font-size: 18px;
            font-weight: 600;
            color: #000;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }
        .edit-popup-input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            font-family: "SF Mono", "Fira Code", "Consolas", monospace;
            outline: none;
            transition: border-color 0.15s;
        }
        .edit-popup-input:focus {
            border-color: #4a9eff;
        }
        .edit-popup-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            justify-content: flex-end;
        }
        .edit-popup-btn {
            padding: 5px 14px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.15s;
        }
        .edit-popup-btn.confirm {
            background: #4a9eff;
            color: #fff;
        }
        .edit-popup-btn.confirm:hover { background: #3a8bee; }
        .edit-popup-btn.dismiss {

    <script>
    // 全局筛选函数（必须在HTML调用之前定义）

    async function loadAllSongs() {
        window.__songs = [];
        const loadPromises = songFiles.map(file => {
            return new Promise((resolve) => {
                const script = document.createElement('script');
                script.src = file;
                script.onload = resolve;
                script.onerror = () => {
                    console.warn('加载歌曲文件失败:', file);
                    resolve();
                };
                document.head.appendChild(script);
            });
        });
        await Promise.all(loadPromises);
        return window.__songs;
    }
    </script>
    <script>
    // 应用状态
    let songs = [];
    window.songs = [];
    let artists = [];
    let currentSong = null;
    window.currentSong = null;
    let currentFilter = 'all';
    function setFilter(artist) {
        currentFilter = artist;
        document.querySelectorAll(".filter-btn").forEach(btn => {
            btn.classList.toggle("active", btn.dataset.filter === artist);
        });
        renderSongList();
    }
    let fontSize = 20;
    // 懒加载状态：初始显示数量根据容器高度动态计算
    let displayedSongs = 0;  // 0 表示自动计算
    const SONG_ITEM_HEIGHT = 56;  // 每个歌曲项的大致高度(px)
    let letterSpacing = 0;  // 字间距，范围 0-10px，默认 0
    let lineHeight = 1.6;   // 行间距，范围 1.0-2.0，默认 1.6
    const MIN_FONT_SIZE = 12;
    const MAX_FONT_SIZE = 24;

    // 异步初始化：先加载歌曲数据，再渲染页面
    async function init() {
        songs = await loadAllSongs();
        window.songs = songs;

        // 加载 TTS manifest
        await TTSModule.init();

        // 拆分合唱歌手，如"古巨基/梁咏琪" → ["古巨基", "梁咏琪"]
        const artistSet = new Set();
        songs.forEach(s => {
            s.artist.split(/[\/、,，&]/).forEach(a => {
                const trimmed = a.trim();
                if (trimmed) artistSet.add(trimmed);
            });
        });
        artists = [...artistSet];
        renderArtistFilter();
        renderSongList();
    }

    function renderArtistFilter() {
        const container = document.getElementById('artistFilter');
        let html = '<span class="filter-btn active" data-filter="all" onclick="setFilter(\'all\')">全部</span>';
        artists.forEach(artist => {
            html += `<span class="filter-btn" data-filter="${artist}" onclick="setFilter('${artist}')">${artist}</span>`;
        });
        container.innerHTML = html;
    }

    function renderSongList() {
        const container = document.getElementById('songList');
        let filtered = songs;
        if (currentFilter !== 'all') {
            // 合唱歌曲：歌手字段包含筛选的歌手名即可匹配
            filtered = filtered.filter(s => {
                const songArtists = s.artist.split(/[\/、,，&]/).map(a => a.trim());
                return songArtists.includes(currentFilter);
            });
        }
        const searchQuery = document.getElementById('searchInput').value.trim().toLowerCase();
        if (searchQuery) {
            filtered = filtered.filter(s => {
                // 搜索歌名、歌手、填词、作曲
                if (s.title.toLowerCase().includes(searchQuery)) return true;
                if (s.artist.toLowerCase().includes(searchQuery)) return true;
                if (s.lyricist && s.lyricist.toLowerCase().includes(searchQuery)) return true;
                if (s.composer && s.composer.toLowerCase().includes(searchQuery)) return true;
                // 搜索歌词内容
                const lyricsText = s.lyrics
                    .filter(l => l.chars)
                    .map(l => l.chars.join(''))
                    .join('');
                if (lyricsText.toLowerCase().includes(searchQuery)) return true;
                return false;
            });
        }

        // 懒加载：动态计算初始显示数量（填满容器可视高度）
        if (displayedSongs === 0) {
            const containerHeight = container.clientHeight || 400;
            displayedSongs = Math.max(Math.ceil(containerHeight / SONG_ITEM_HEIGHT), 5);
        }
        const songsToShow = filtered.slice(0, displayedSongs);
        let html = '';
        songsToShow.forEach((song, index) => {
            const isActive = currentSong && currentSong.id === song.id;
            const clickAction = DeleteModule.isActive() ? `DeleteModule.toggleSelect(${song.id}, event)` : `selectSong(${song.id})`;
            html += `
                <div class="song-item ${isActive ? 'active' : ''}" onclick="${clickAction}">
                    <span class="song-number">${String(index + 1).padStart(2, '0')}</span>
                    <div class="song-info-compact">
                        <div class="song-title-compact">${song.title}</div>
                        <div class="song-artist-compact">${song.artist}</div>
                    </div>
                </div>
            `;
        });
        
        // 如果还有更多歌曲，显示"加载更多"按钮
        if (filtered.length > displayedSongs) {
            html += `
                <div class="load-more-btn" onclick="loadMoreSongs()">
                    加载更多 (${filtered.length - displayedSongs} 首)
                </div>
            `;
        }
        
        container.innerHTML = html;
    }
    
    // 加载更多歌曲
    function loadMoreSongs() {
        displayedSongs += 10;
        renderSongList();
    }
    
    // 重置懒加载计数器（切换筛选时重新计算）
    function resetLazyLoad() {
        displayedSongs = 0;
    }

    function filterSongs() {
        renderSongList();
    }

    function selectSong(id) {
        // Exit correction mode if active
        if (CorrectionModule.isActive()) {
            CorrectionModule.toggle();
        }
        currentSong = songs.find(s => s.id === id);
        window.currentSong = currentSong;
        renderSongList();
        renderLyrics();

        // Mobile: switch to lyrics view
        if (window.innerWidth < 1024) {
            document.getElementById('appContainer').classList.add('view-lyrics');
            document.getElementById('mobileHeader').style.display = 'flex';
        }
    }

    function showSongList() {
        document.getElementById('appContainer').classList.remove('view-lyrics');
        document.getElementById('mobileHeader').style.display = 'none';
        // 清除当前歌曲，返回首页时不显示歌词
        currentSong = null;
        window.currentSong = null;
        renderLyrics();
        renderSongList();
    }

    function renderLyrics() {
        if (!currentSong) {
            // 没有选中歌曲时显示空状态
            document.getElementById('emptyState').style.display = 'flex';
            document.getElementById('lyricsView').style.display = 'none';
            return;
        }

        document.getElementById('emptyState').style.display = 'none';
        document.getElementById('lyricsView').style.display = 'block';
        document.getElementById('mobileTitle').textContent = currentSong.title;

        // Render title with jyutping
        const titleHtml = currentSong.title.split('').map((char, i) => {
            const jp = currentSong.titleJyutping[i] || '';
            return `
                <span class="title-char-group">
                    <span class="title-char-jyutping">${jp}</span>
                    <span class="title-char-hanzi">${char}</span>
                </span>
            `;
        }).join('');
        document.getElementById('songTitle').innerHTML = titleHtml;

        // Render metadata with jyutping
        document.getElementById('songArtist').innerHTML = renderMetaName(currentSong.artist, currentSong.artistJyutping);
        document.getElementById('songLyricist').innerHTML = renderMetaName(currentSong.lyricist, currentSong.lyricistJyutping);
        document.getElementById('songComposer').innerHTML = renderMetaName(currentSong.composer, currentSong.composerJyutping);

        // Render lyrics with font size, letter spacing and line height
        let lyricsHtml = '';
        currentSong.lyrics.forEach((line, index) => {
            if (line.paragraphBreak) {
                lyricsHtml += '<div class="lyric-paragraph-break"></div>';
                return;
            }
            // 按空格分割成多行，确保每行行高一致
            const segments = [];
            let currentSegment = [];
            line.chars.forEach((char, i) => {
                if (char === ' ') {
                    if (currentSegment.length > 0) {
                        segments.push(currentSegment);
                        currentSegment = [];
                    }
                } else {
                    currentSegment.push({ char, jp: line.jp[i] || '', index: i });
                }
            });
            if (currentSegment.length > 0) {
                segments.push(currentSegment);
            }
            // 渲染每个分段为一个独立的 lyric-line
            segments.forEach((segment, segIdx) => {
                const segmentHtml = segment.map(({ char, jp, index: charIndex }) => `
                    <span class="char-group" data-line="${index}" data-char="${charIndex}" data-original-jp="${jp}" onclick="onCharClick(event, ${index}, ${charIndex})" style="margin-right:${letterSpacing}px">
                        <span class="char-jyutping">${jp}</span>
                        <span class="char-hanzi" style="font-size:${fontSize}px">${char}</span>
                    </span>
                `).join('');
                // 每个分段都添加播放按钮（只播放该分段的语音）
                const segJp = segment.map(s => s.jp).filter(j => j).map(j => "'" + j.replace(/'/g, "\\'") + "'").join(',');
                const playBtn = `<button class="tts-play-btn" onclick="event.stopPropagation(); TTSModule.playSegment([${segJp}], this)" title="播放语音"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="6 3 20 12 6 21 6 3"/></svg></button>`;
                lyricsHtml += `<div class="lyric-line" style="line-height:${lineHeight}" onclick="onLyricLineClick(event, ${index})">${playBtn}<div class="lyric-line-content">${segmentHtml}</div></div>`;
            });
        });
        document.getElementById('lyricsContent').innerHTML = lyricsHtml;
    }

    function renderMetaName(name, jyutpingArr) {
        if (!jyutpingArr || jyutpingArr.length === 0) return name;
        return name.split('').map((char, i) => {
            const jp = jyutpingArr[i] || '';
            return `
                <span class="meta-name-group">
                    <span class="meta-name-jyutping">${jp}</span>
                    <span class="meta-name-hanzi">${char}</span>
                </span>
            `;
        }).join('');
    }

    function adjustFontSize(delta) {
        const newSize = fontSize + delta;
        if (newSize < MIN_FONT_SIZE) {
            showToast('已是最小字号');
            return;
        }
        if (newSize > MAX_FONT_SIZE) {
            showToast('已是最大字号');
            return;
        }
        fontSize = newSize;
        renderLyrics();
    }

    function adjustLetterSpacing(delta) {
        const newSpacing = letterSpacing + delta;
        if (newSpacing < 0) {
            showToast('已是最小字间距');
            return;
        }
        if (newSpacing > 10) {
            showToast('已是最大字间距');
            return;
        }
        letterSpacing = newSpacing;
        renderLyrics();
    }

    function adjustLineHeight(delta) {
        const newHeight = Math.round((lineHeight + delta) * 10) / 10;
        if (newHeight < 1.0) {
            showToast('已是最小行间距');
            return;
        }
        if (newHeight > 2.0) {
            showToast('已是最大行间距');
            return;
        }
        lineHeight = newHeight;
        renderLyrics();
    }

    function showToast(message) {
        const existingToast = document.querySelector('.toast-message');
        if (existingToast) {
            existingToast.remove();
        }
        const toast = document.createElement('div');
        toast.className = 'toast-message';
        toast.textContent = message;
        toast.style.cssText = `
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 10000;
            animation: fadeInOut 1.5s ease forwards;
        `;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 1500);
    }

    function toggleToolbar() {
        const toolbar = document.getElementById('toolbar');
        const toggle = document.getElementById('toolbarToggle');
        toolbar.classList.toggle('expanded');
        const chevronDown = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>';
        const chevronUp = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6"/></svg>';
        toggle.innerHTML = toolbar.classList.contains('expanded') ? chevronDown : chevronUp;
    }

    function shareSong() {
        if (!currentSong) return;
        const url = `${window.location.origin}${window.location.pathname}#${currentSong.id}`;
        if (navigator.clipboard) {
            navigator.clipboard.writeText(url).then(() => showToast('链接已复制'));
        } else {
            showToast('链接: ' + url);
        }
    }

    // 跳转到投稿表单并自动填入歌曲名称
    function openSubmitForm(type) {
        if (!currentSong) {
            showToast('请先选择一首歌曲');
            return;
        }
        const songName = encodeURIComponent(currentSong.title);
        window.open(`submit.html?type=${type}&song=${songName}`, '_blank');
    }

    function onCharClick(event, lineIndex, charIndex) {
        // 播放模式下，点击单字播放语音
        if (TTSModule.isModeActive()) {
            event.stopPropagation();
            const charGroup = event.currentTarget;
            const jp = charGroup.dataset.originalJp;
            TTSModule.playChar(jp, charGroup);
            return;
        }

        // 纠错模式下，处理字点击
        if (CorrectionModule.handleCharClick(event, lineIndex, charIndex)) {
            return;
        }
    }

    function onLyricLineClick(event, lineIndex) {
        if (EditLyricsModule.handleLineClick(event, lineIndex)) {
            return;
        }
    }

    </script>

    <!-- 导入歌词模态框 -->
    <div class="import-modal" id="importModal" style="display:none;">
        <div class="import-modal-content">
            <div class="import-modal-title"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-right: 6px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>导入新歌词</div>
            
            <div class="import-form-group">
                <label>歌曲名称 *</label>
                <input type="text" id="importTitle" placeholder="输入歌曲名称">
            </div>
            
            <div class="import-form-group">
                <label>歌手 *</label>
                <input type="text" id="importArtist" placeholder="输入歌手名称（合唱用 / 分隔）">
            </div>
            
            <div class="import-form-group">
                <label>填词</label>
                <input type="text" id="importLyricist" placeholder="填词人">
            </div>
            
            <div class="import-form-group">
                <label>作曲</label>
                <input type="text" id="importComposer" placeholder="作曲人">
            </div>
            
            <div class="import-form-group">
                <label>歌词内容 *</label>
                <textarea id="importLyrics" placeholder="粘贴歌词内容，换行表示新的一句，连续两个空行表示段落分隔" oninput="ImportModule.preview()"></textarea>
                <div class="import-tip"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-right: 4px;"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></svg> 单换行 = 新的一句歌词 &nbsp;|&nbsp; 双换行 = 段落分隔（更大间距）</div>
            </div>
            
            <div class="import-preview" id="importPreview" style="display:none;">
                <div class="import-preview-title">预览（粤拼自动匹配）</div>
                <div id="importPreviewContent"></div>
            </div>
            
            <div class="import-actions">
                <button class="import-btn cancel" onclick="ImportModule.hide()">取消</button>
                <button class="import-btn confirm" onclick="ImportModule.generate()">生成歌曲文件</button>
            </div>
        </div>
    </div>

    <!-- 生成的代码模态框 -->
    <div class="import-modal" id="codeModal" style="display:none;">
        <div class="import-modal-content" style="max-width: 700px;">
            <div class="import-modal-title"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-right: 6px;"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></svg>生成的歌曲文件代码</div>
            <div class="import-form-group">
                <label>复制以下代码，保存为 .js 文件到 lyrics 文件夹</label>
                <textarea id="generatedCode" style="min-height: 300px; font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; font-size: 12px;" readonly></textarea>
            </div>
            <div class="import-actions">
                <button class="import-btn cancel" onclick="ImportModule.hideCode()">关闭</button>
                <button class="import-btn confirm" onclick="ImportModule.copyCode()">复制代码</button>
            </div>
        </div>
    </div>

    <!-- Init -->
    <script>
    init();
    </script>
