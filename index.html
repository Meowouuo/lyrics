<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>粤拼歌词 | Cantonese Lyrics with Jyutping</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans SC", sans-serif;
            background: #f5f5f5;
            color: #333;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* ===== Mobile: Single Column Layout ===== */
        .app-container {
            max-width: 100%;
            margin: 0 auto;
            background: #fff;
            min-height: 100vh;
        }

        /* ===== Desktop: Split Layout ===== */
        @media (min-width: 1024px) {
            body { background: #f0f0f0; }
            .app-container {
                display: flex;
                max-width: 1400px;
                min-height: 100vh;
                margin: 0 auto;
                background: #fff;
            }
        }

        /* ===== Sidebar (Left) ===== */
        .sidebar {
            background: #fff;
            border-bottom: 1px solid #eee;
        }
        @media (min-width: 1024px) {
            .sidebar {
                width: 360px;
                min-width: 360px;
                border-right: 1px solid #e8e8e8;
                border-bottom: none;
                display: flex;
                flex-direction: column;
                height: 100vh;
                position: sticky;
                top: 0;
            }
        }

        .sidebar-header {
            padding: 20px 24px;
            border-bottom: 1px solid #f0f0f0;
        }
        @media (min-width: 1024px) {
            .sidebar-header { padding: 24px 28px; }
        }

        .logo {
            font-size: 22px;
            font-weight: 700;
            color: #000;
            margin-bottom: 4px;
        }
        @media (min-width: 1024px) {
            .logo { font-size: 24px; }
        }

        .logo-sub {
            font-size: 13px;
            color: #999;
        }

        .search-box {
            padding: 16px 24px;
            border-bottom: 1px solid #f0f0f0;
        }
        @media (min-width: 1024px) {
            .search-box { padding: 16px 28px; }
        }

        .search-input {
            width: 100%;
            padding: 10px 14px 10px 38px;
            border: 1px solid #e8e8e8;
            border-radius: 8px;
            font-size: 14px;
            background: #fafafa;
            outline: none;
            transition: all 0.2s;
        }
        .search-input:focus {
            border-color: #ccc;
            background: #fff;
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #bbb;
        }

        .search-wrapper { position: relative; }

        /* Artist Filter */
        .artist-filter {
            padding: 16px 24px;
            border-bottom: 1px solid #f0f0f0;
            overflow-x: auto;
            white-space: nowrap;
        }
        @media (min-width: 1024px) {
            .artist-filter {
                padding: 16px 28px;
                overflow-x: hidden;
                white-space: normal;
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
            }
        }

        .artist-filter::-webkit-scrollbar { display: none; }

        .filter-btn {
            display: inline-block;
            padding: 6px 14px;
            margin-right: 8px;
            border-radius: 16px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #e8e8e8;
            background: #fff;
            color: #666;
        }
        @media (min-width: 1024px) {
            .filter-btn { margin-right: 0; }
        }

        .filter-btn:hover { background: #f5f5f5; }
        .filter-btn.active {
            background: #000;
            color: #fff;
            border-color: #000;
        }

        /* Song List */
        .song-list {
            padding: 8px 0;
            overflow-y: auto;
            flex: 1;
        }

        .song-item {
            display: flex;
            align-items: center;
            padding: 14px 24px;
            cursor: pointer;
            transition: background 0.15s;
            border-left: 3px solid transparent;
        }
        @media (min-width: 1024px) {
            .song-item { padding: 14px 28px; }
        }

        .song-item:hover { background: #f8f8f8; }
        .song-item.active {
            background: #f5f5f5;
            border-left-color: #000;
        }

        .song-number {
            width: 28px;
            font-size: 13px;
            color: #bbb;
            flex-shrink: 0;
        }

        .song-info-compact {
            flex: 1;
            min-width: 0;
        }

        .song-title-compact {
            font-size: 15px;
            font-weight: 500;
            color: #000;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .song-artist-compact {
            font-size: 12px;
            color: #999;
        }

        /* ===== Main Content (Right) ===== */
        .main-content {
            flex: 1;
            min-width: 0;
            background: #fff;
        }
        @media (min-width: 1024px) {
            .main-content {
                overflow-y: auto;
                height: 100vh;
            }
        }

        /* Empty State */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            padding: 40px;
            text-align: center;
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        .empty-title {
            font-size: 20px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .empty-desc {
            font-size: 14px;
            color: #999;
        }

        /* Lyrics View */
        .lyrics-view {
            padding: 24px;
        }
        @media (min-width: 1024px) {
            .lyrics-view {
                padding: 40px 48px;
                max-width: 800px;
                margin: 0 auto;
            }
        }

        /* Song Header */
        .song-header {
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid #f0f0f0;
        }

        .song-title-row {
            display: flex;
            align-items: flex-end;
            gap: 16px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .song-title-main {
            display: flex;
            align-items: flex-end;
            gap: 4px;
        }
        @media (min-width: 1024px) {
            .song-title-main { gap: 6px; }
        }

        .title-char-group {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
        }

        .title-char-jyutping {
            font-size: 11px;
            color: #999;
            font-family: "SF Mono", "Fira Code", "Consolas", monospace;
            margin-bottom: 2px;
            height: 14px;
        }
        @media (min-width: 1024px) {
            .title-char-jyutping { font-size: 13px; height: 16px; }
        }

        .title-char-hanzi {
            font-size: 28px;
            font-weight: 700;
            color: #000;
            line-height: 1.2;
        }
        @media (min-width: 1024px) {
            .title-char-hanzi { font-size: 36px; }
        }

        .song-meta-row {
            display: flex;
            flex-direction: column;
            gap: 8px;
            font-size: 14px;
            color: #666;
        }

        .song-meta-row-inner {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
        }

        .song-meta-item {
            display: flex;
            align-items: flex-end;
            gap: 6px;
        }

        .song-meta-label {
            color: #999;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
        }

        .song-meta-label-jyutping {
            font-size: 9px;
            color: #bbb;
            font-family: "SF Mono", "Fira Code", "Consolas", monospace;
            height: 11px;
        }

        .song-meta-label-hanzi {
            font-size: 14px;
            color: #999;
        }

        .meta-name-group {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
        }

        .meta-name-jyutping {
            font-size: 9px;
            color: #bbb;
            font-family: "SF Mono", "Fira Code", "Consolas", monospace;
            height: 11px;
        }

        .meta-name-hanzi {
            font-size: 14px;
            color: #666;
        }

        /* Lyrics Content */
        .lyrics-content {
            line-height: 2.2;
        }

        .lyric-line {
            margin-bottom: 20px;
            animation: fadeIn 0.3s ease forwards;
            opacity: 0;
        }

        .lyric-paragraph-break {
            height: 24px;
        }

        .lyric-line:nth-child(1) { animation-delay: 0.02s; }
        .lyric-line:nth-child(2) { animation-delay: 0.04s; }
        .lyric-line:nth-child(3) { animation-delay: 0.06s; }
        .lyric-line:nth-child(4) { animation-delay: 0.08s; }
        .lyric-line:nth-child(5) { animation-delay: 0.10s; }
        .lyric-line:nth-child(6) { animation-delay: 0.12s; }
        .lyric-line:nth-child(7) { animation-delay: 0.14s; }
        .lyric-line:nth-child(8) { animation-delay: 0.16s; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .char-group {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            margin-right: 4px;
            vertical-align: bottom;
        }
        @media (min-width: 1024px) {
            .char-group { margin-right: 6px; }
        }

        .char-jyutping {
            font-size: 10px;
            color: #aaa;
            font-family: "SF Mono", "Fira Code", "Consolas", monospace;
            margin-bottom: 1px;
            height: 12px;
        }
        @media (min-width: 1024px) {
            .char-jyutping { font-size: 11px; height: 14px; }
        }

        .char-jyutping:empty::before { content: "\00a0"; }

        .char-hanzi {
            font-size: 20px;
            font-weight: 500;
            color: #000;
        }
        @media (min-width: 1024px) {
            .char-hanzi { font-size: 24px; }
        }

        /* Toolbar */
        .toolbar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #fff;
            border-top: 1px solid #eee;
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        @media (min-width: 1024px) {
            .toolbar {
                position: sticky;
                bottom: 0;
                padding: 12px 48px;
                max-width: 800px;
                margin: 0 auto;
            }
        }

        .toolbar-left {
            display: flex;
            gap: 16px;
        }

        .toolbar-btn {
            background: none;
            border: none;
            color: #666;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 12px;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .toolbar-btn:hover {
            background: #f5f5f5;
            color: #000;
        }

        .toolbar-btn .icon {
            font-size: 18px;
        }

        .toolbar-btn.primary {
            background: #000;
            color: #fff;
        }

        .toolbar-btn.primary:hover {
            background: #333;
        }

        /* Mobile Header (only on mobile) */
        .mobile-header {
            display: flex;
            align-items: center;
            padding: 14px 24px;
            border-bottom: 1px solid #eee;
            background: #fff;
        }
        @media (min-width: 1024px) {
            .mobile-header { display: none; }
        }

        .mobile-header-title {
            font-size: 17px;
            font-weight: 600;
            flex: 1;
            text-align: center;
        }

        .mobile-back-btn {
            background: none;
            border: none;
            font-size: 20px;
            color: #333;
            cursor: pointer;
            padding: 4px;
        }

        /* Mobile View Toggle */
        .mobile-only { display: block; }
        .desktop-only { display: none; }

        @media (min-width: 1024px) {
            .mobile-only { display: none; }
            .desktop-only { display: block; }
        }

        /* View States */
        .view-lyrics .sidebar {
            display: none;
        }
        @media (min-width: 1024px) {
            .view-lyrics .sidebar { display: flex; }
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #ccc; }
    </style>
</head>
<body>
    <div class="app-container" id="appContainer">
        <!-- Sidebar: Song List -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">🎵 粤拼歌词</div>
                <div class="logo-sub">粤语歌词 · 粤拼对照</div>
            </div>

            <div class="search-box">
                <div class="search-wrapper">
                    <span class="search-icon">🔍</span>
                    <input type="text" class="search-input" id="searchInput" placeholder="搜索歌曲..." oninput="filterSongs()">
                </div>
            </div>

            <div class="artist-filter" id="artistFilter">
                <span class="filter-btn active" data-filter="all" onclick="setFilter('all')">全部</span>
            </div>

            <div class="song-list" id="songList"></div>
        </aside>

        <!-- Main Content: Lyrics -->
        <main class="main-content">
            <!-- Mobile Header -->
            <div class="mobile-header" id="mobileHeader" style="display:none;">
                <button class="mobile-back-btn" onclick="showSongList()">←</button>
                <span class="mobile-header-title" id="mobileTitle">粤拼歌词</span>
                <span style="width:28px;"></span>
            </div>

            <!-- Empty State -->
            <div class="empty-state" id="emptyState">
                <div class="empty-icon">🎵</div>
                <div class="empty-title">选择一首歌</div>
                <div class="empty-desc">从左侧列表选择歌曲查看歌词</div>
            </div>

            <!-- Lyrics View -->
            <div class="lyrics-view" id="lyricsView" style="display:none;">
                <div class="song-header">
                    <div class="song-title-row">
                        <h1 class="song-title-main" id="songTitle"></h1>
                    </div>
                    <div class="song-meta-row">
                        <div class="song-meta-row-inner">
                            <div class="song-meta-item">
                                <span class="song-meta-label">
                                    <span class="song-meta-label-jyutping">go1 sau2</span>
                                    <span class="song-meta-label-hanzi">歌手：</span>
                                </span>
                                <span id="songArtist"></span>
                            </div>
                        </div>
                        <div class="song-meta-row-inner">
                            <div class="song-meta-item">
                                <span class="song-meta-label">
                                    <span class="song-meta-label-jyutping">tin4 ci4</span>
                                    <span class="song-meta-label-hanzi">填词：</span>
                                </span>
                                <span id="songLyricist"></span>
                            </div>
                            <div class="song-meta-item">
                                <span class="song-meta-label">
                                    <span class="song-meta-label-jyutping">zok3 kuk1</span>
                                    <span class="song-meta-label-hanzi">作曲：</span>
                                </span>
                                <span id="songComposer"></span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="lyrics-content" id="lyricsContent"></div>

                <div class="toolbar">
                    <div class="toolbar-left">
                        <button class="toolbar-btn" onclick="toggleFavorite()">
                            <span class="icon" id="favIcon">☆</span>
                            <span>收藏</span>
                        </button>
                        <button class="toolbar-btn" onclick="adjustFontSize(-1)">
                            <span class="icon">A-</span>
                        </button>
                        <button class="toolbar-btn" onclick="adjustFontSize(1)">
                            <span class="icon">A+</span>
                        </button>
                        <button class="toolbar-btn" onclick="submitFeedback()">
                            <span class="icon">✏️</span>
                            <span>纠错</span>
                        </button>
                        <button class="toolbar-btn" onclick="submitNewSong()">
                            <span class="icon">➕</span>
                            <span>投稿</span>
                        </button>
                    </div>
                    <button class="toolbar-btn primary" onclick="shareSong()">
                        <span>分享</span>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <!-- 歌曲清单（内联，避免缓存问题。新增歌曲时在此数组添加一行） -->
    <script>
    const songFiles = [
        'lyrics/重复犯错.js',
        'lyrics/喜欢你.js',
        'lyrics/海阔天空.js',
        'lyrics/富士山下.js',
        'lyrics/明年今日.js',
        'lyrics/千千阙歌.js',
    ];

    async function loadAllSongs() {
        window.__songs = [];
        const loadPromises = songFiles.map(file => {
            return new Promise((resolve) => {
                const script = document.createElement('script');
                script.src = file;
                script.onload = resolve;
                script.onerror = () => {
                    console.warn('加载歌曲文件失败:', file);
                    resolve();
                };
                document.head.appendChild(script);
            });
        });
        await Promise.all(loadPromises);
        return window.__songs;
    }
    </script>
    <script>
    // 应用状态
    let songs = [];
    let artists = [];
    let currentSong = null;
    let currentFilter = 'all';
    let favorites = JSON.parse(localStorage.getItem('jyutping_favs') || '[]');
    let fontSize = 20;

    // 异步初始化：先加载歌曲数据，再渲染页面
    async function init() {
        songs = await loadAllSongs();
        artists = [...new Set(songs.map(s => s.artist))];
        renderArtistFilter();
        renderSongList();
    }

    function renderArtistFilter() {
        const container = document.getElementById('artistFilter');
        let html = '<span class="filter-btn active" data-filter="all" onclick="setFilter(\'all\')">全部</span>';
        artists.forEach(artist => {
            html += `<span class="filter-btn" data-filter="${artist}" onclick="setFilter('${artist}')">${artist}</span>`;
        });
        container.innerHTML = html;
    }

    function setFilter(artist) {
        currentFilter = artist;
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.filter === artist);
        });
        renderSongList();
    }

    function renderSongList() {
        const container = document.getElementById('songList');
        let filtered = songs;
        if (currentFilter !== 'all') {
            filtered = filtered.filter(s => s.artist === currentFilter);
        }
        const searchQuery = document.getElementById('searchInput').value.trim();
        if (searchQuery) {
            filtered = filtered.filter(s => s.title.includes(searchQuery));
        }

        let html = '';
        filtered.forEach((song, index) => {
            const isActive = currentSong && currentSong.id === song.id;
            html += `
                <div class="song-item ${isActive ? 'active' : ''}" onclick="selectSong(${song.id})">
                    <span class="song-number">${String(index + 1).padStart(2, '0')}</span>
                    <div class="song-info-compact">
                        <div class="song-title-compact">${song.title}</div>
                        <div class="song-artist-compact">${song.artist}</div>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    function filterSongs() {
        renderSongList();
    }

    function selectSong(id) {
        currentSong = songs.find(s => s.id === id);
        renderSongList();
        renderLyrics();

        // Mobile: switch to lyrics view
        if (window.innerWidth < 1024) {
            document.getElementById('appContainer').classList.add('view-lyrics');
            document.getElementById('mobileHeader').style.display = 'flex';
        }
    }

    function showSongList() {
        document.getElementById('appContainer').classList.remove('view-lyrics');
        document.getElementById('mobileHeader').style.display = 'none';
    }

    function renderLyrics() {
        if (!currentSong) return;

        document.getElementById('emptyState').style.display = 'none';
        document.getElementById('lyricsView').style.display = 'block';
        document.getElementById('mobileTitle').textContent = currentSong.title;

        // Render title with jyutping
        const titleHtml = currentSong.title.split('').map((char, i) => {
            const jp = currentSong.titleJyutping[i] || '';
            return `
                <span class="title-char-group">
                    <span class="title-char-jyutping">${jp}</span>
                    <span class="title-char-hanzi">${char}</span>
                </span>
            `;
        }).join('');
        document.getElementById('songTitle').innerHTML = titleHtml;

        // Render metadata with jyutping
        document.getElementById('songArtist').innerHTML = renderMetaName(currentSong.artist, currentSong.artistJyutping);
        document.getElementById('songLyricist').innerHTML = renderMetaName(currentSong.lyricist, currentSong.lyricistJyutping);
        document.getElementById('songComposer').innerHTML = renderMetaName(currentSong.composer, currentSong.composerJyutping);

        // Render lyrics
        let lyricsHtml = '';
        currentSong.lyrics.forEach((line, index) => {
            if (line.paragraphBreak) {
                lyricsHtml += '<div class="lyric-paragraph-break"></div>';
                return;
            }
            const lineHtml = line.chars.map((char, i) => {
                const jp = line.jp[i] || '';
                if (char === ' ') {
                    return '<br>';
                }
                return `
                    <span class="char-group">
                        <span class="char-jyutping">${jp}</span>
                        <span class="char-hanzi" style="font-size:${fontSize}px">${char}</span>
                    </span>
                `;
            }).join('');
            lyricsHtml += `<div class="lyric-line">${lineHtml}</div>`;
        });
        document.getElementById('lyricsContent').innerHTML = lyricsHtml;

        updateFavIcon();
    }

    function renderMetaName(name, jyutpingArr) {
        if (!jyutpingArr || jyutpingArr.length === 0) return name;
        return name.split('').map((char, i) => {
            const jp = jyutpingArr[i] || '';
            return `
                <span class="meta-name-group">
                    <span class="meta-name-jyutping">${jp}</span>
                    <span class="meta-name-hanzi">${char}</span>
                </span>
            `;
        }).join('');
    }

    function adjustFontSize(delta) {
        fontSize = Math.max(16, Math.min(28, fontSize + delta));
        renderLyrics();
    }

    function toggleFavorite() {
        if (!currentSong) return;
        const idx = favorites.indexOf(currentSong.id);
        if (idx > -1) favorites.splice(idx, 1);
        else favorites.push(currentSong.id);
        localStorage.setItem('jyutping_favs', JSON.stringify(favorites));
        updateFavIcon();
    }

    function updateFavIcon() {
        if (!currentSong) return;
        const icon = document.getElementById('favIcon');
        const isFav = favorites.includes(currentSong.id);
        icon.textContent = isFav ? '★' : '☆';
    }

    function shareSong() {
        if (!currentSong) return;
        const text = `🎵 ${currentSong.title} - ${currentSong.artist}`;
        if (navigator.clipboard) {
            navigator.clipboard.writeText(text).then(() => alert('已复制到剪贴板'));
        }
    }

    // 纠错：跳转到 GitHub Issues
    function submitFeedback() {
        const song = currentSong ? `${currentSong.title} - ${currentSong.artist}` : '';
        const title = encodeURIComponent(`[粤拼纠错] ${song}`);
        const body = encodeURIComponent(`## 纠错内容\n\n**歌曲：** ${song}\n\n**错误描述：**\n请描述哪一行的粤拼有误，以及正确的粤拼是什么。\n\n**错误行：**\n> 在这里粘贴歌词行\n\n**正确粤拼：**\n> 在这里提供正确的粤拼\n\n---\n\n请尽量提供完整信息，方便快速修正，谢谢！`);
        window.open(`https://github.com/Meowouuo/lyrics/issues/new?title=${title}&body=${body}&labels=纠错`, '_blank');
    }

    // 投稿：跳转到 GitHub Issues
    function submitNewSong() {
        const title = encodeURIComponent('[新歌投稿]');
        const body = encodeURIComponent(`## 投稿新歌\n\n**歌曲名称：**\n\n**歌手：**\n\n**填词：**\n\n**作曲：**\n\n**完整歌词：**\n\`\`\`\n请在这里粘贴完整歌词\n\`\`\`\n\n---\n\n请尽量提供完整歌词，粤拼会由我们添加，谢谢投稿！`);
        window.open(`https://github.com/Meowouuo/lyrics/issues/new?title=${title}&body=${body}&labels=投稿`, '_blank');
    }

    // Init
    init();
    </script>
</body>
