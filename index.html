    const artists = [...new Set(songs.map(s => s.artist))];
    let currentSong = null;
    let currentFilter = 'all';
    let favorites = JSON.parse(localStorage.getItem('jyutping_favs') || '[]');
    let fontSize = 20;

    // Initialize
    function init() {
        renderArtistFilter();
        renderSongList();
    }

    function renderArtistFilter() {
        const container = document.getElementById('artistFilter');
        let html = '<span class="filter-btn active" data-filter="all" onclick="setFilter(\'all\')">全部</span>';
        artists.forEach(artist => {
            html += `<span class="filter-btn" data-filter="${artist}" onclick="setFilter('${artist}')">${artist}</span>`;
        });
        container.innerHTML = html;
    }

    function setFilter(artist) {
        currentFilter = artist;
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.filter === artist);
        });
        renderSongList();
    }

    function renderSongList() {
        const container = document.getElementById('songList');
        let filtered = songs;
        if (currentFilter !== 'all') {
            filtered = filtered.filter(s => s.artist === currentFilter);
        }
        const searchQuery = document.getElementById('searchInput').value.trim();
        if (searchQuery) {
            filtered = filtered.filter(s => s.title.includes(searchQuery));
        }

        let html = '';
        filtered.forEach((song, index) => {
            const isActive = currentSong && currentSong.id === song.id;
            html += `
                <div class="song-item ${isActive ? 'active' : ''}" onclick="selectSong(${song.id})">
                    <span class="song-number">${String(index + 1).padStart(2, '0')}</span>
                    <div class="song-info-compact">
                        <div class="song-title-compact">${song.title}</div>
                        <div class="song-artist-compact">${song.artist}</div>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    function filterSongs() {
        renderSongList();
    }

    function selectSong(id) {
        currentSong = songs.find(s => s.id === id);
        if (!currentSong) return;

        // Update UI
        document.getElementById('emptyState').style.display = 'none';
        document.getElementById('lyricsView').style.display = 'block';
        document.getElementById('mobileHeader').style.display = 'flex';
        document.getElementById('mobileTitle').textContent = currentSong.title;
        document.getElementById('appContainer').classList.add('view-lyrics');

        // Update song info - 歌名也使用逐字粤拼显示
        const titleContainer = document.getElementById('songTitle');
        let titleHtml = '';
        for (let i = 0; i < currentSong.title.length; i++) {
            const char = currentSong.title[i];
            const jp = currentSong.titleJyutping[i] || '';
            titleHtml += `
                <span class="title-char-group">
                    <span class="title-char-jyutping">${jp}</span>
                    <span class="title-char-hanzi">${char}</span>
                </span>
            `;
        }
        titleContainer.innerHTML = titleHtml;

        // 歌手、作词、作曲也使用逐字粤拼显示
        document.getElementById('songArtist').innerHTML = renderNameWithJyutping(currentSong.artist, currentSong.artistJyutping);
        document.getElementById('songLyricist').innerHTML = renderNameWithJyutping(currentSong.lyricist, currentSong.lyricistJyutping);
        document.getElementById('songComposer').innerHTML = renderNameWithJyutping(currentSong.composer, currentSong.composerJyutping);

        // Render lyrics
        renderLyrics();
        updateFavIcon();
        renderSongList(); // Update active state
    }

    function renderLyrics() {
        if (!currentSong) return;
        const container = document.getElementById('lyricsContent');
        let html = '';
        currentSong.lyrics.forEach((line, idx) => {
            if (line.paragraphBreak) {
                html += '<div class="lyric-paragraph-break"></div>';
                return;
            }
            html += '<div class="lyric-line">';
            for (let i = 0; i < line.chars.length; i++) {
                const char = line.chars[i];
                const jp = line.jp[i] || '';
                if (char === ' ') {
                    html += '<span style="display:inline-block;width:12px;"></span>';
                } else {
                    html += `
                        <span class="char-group">
                            <span class="char-jyutping" style="font-size:${fontSize * 0.5}px">${jp}</span>
                            <span class="char-hanzi" style="font-size:${fontSize}px">${char}</span>
                        </span>
                    `;
                }
            }
            html += '</div>';
        });
        container.innerHTML = html;
    }

    function showSongList() {
        document.getElementById('appContainer').classList.remove('view-lyrics');
        document.getElementById('mobileHeader').style.display = 'none';
    }

    // 渲染侧边栏歌手名字（简化版粤拼）
    function renderCompactArtistWithJyutping(name, jyutpingArray) {
        if (!jyutpingArray || jyutpingArray.length === 0) {
            return `<span class="song-artist-hanzi">${name}</span>`;
        }
        let html = '';
        for (let i = 0; i < name.length; i++) {
            const char = name[i];
            const jp = jyutpingArray[i] || '';
            html += `
                <span class="song-artist-char-group">
                    <span class="song-artist-jyutping">${jp}</span>
                    <span class="song-artist-hanzi">${char}</span>
                </span>
            `;
        }
        return html;
    }

    // 渲染带粤拼的名字（歌手、作词、作曲）
    function renderNameWithJyutping(name, jyutpingArray) {
        if (!jyutpingArray || jyutpingArray.length === 0) {
            return `<span class="meta-name-hanzi">${name}</span>`;
        }
        let html = '';
        for (let i = 0; i < name.length; i++) {
            const char = name[i];
            const jp = jyutpingArray[i] || '';
            if (char === ' ') {
                html += '<span style="display:inline-block;width:4px;"></span>';
            } else {
                html += `
                    <span class="meta-name-group">
                        <span class="meta-name-jyutping">${jp}</span>
                        <span class="meta-name-hanzi">${char}</span>
                    </span>
                `;
            }
        }
        return html;
    }

    function adjustFontSize(delta) {
        fontSize = Math.max(16, Math.min(32, fontSize + delta * 2));
        renderLyrics();
    }

    function toggleFavorite() {
        if (!currentSong) return;
        const idx = favorites.indexOf(currentSong.id);
        if (idx > -1) favorites.splice(idx, 1);
        else favorites.push(currentSong.id);
        localStorage.setItem('jyutping_favs', JSON.stringify(favorites));
        updateFavIcon();
    }

    function updateFavIcon() {
        if (!currentSong) return;
        const icon = document.getElementById('favIcon');
        const isFav = favorites.includes(currentSong.id);
        icon.textContent = isFav ? '★' : '☆';
    }

    function shareSong() {
        if (!currentSong) return;
        const text = `🎵 ${currentSong.title} - ${currentSong.artist}`;
        if (navigator.clipboard) {
            navigator.clipboard.writeText(text).then(() => alert('已复制到剪贴板'));
        }
    }

    // Init
    init();
    </script>
