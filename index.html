<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>粤拼歌词 | Cantonese Lyrics with Jyutping</title>
    <link rel="icon" type="image/png" href="icon.png">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans SC", sans-serif;
            background: #f5f5f5;
            color: #333;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* ===== Mobile: Single Column Layout ===== */
        .app-container {
            max-width: 100%;
            margin: 0 auto;
            background: #fff;
            min-height: 100vh;
        }

        /* ===== Desktop: Split Layout ===== */
        @media (min-width: 1024px) {
            body { background: #f0f0f0; }
            .app-container {
                display: flex;
                max-width: 1400px;
                min-height: 100vh;
                margin: 0 auto;
                background: #fff;
            }
        }

        /* ===== Sidebar (Left) ===== */
        .sidebar {
            background: #fff;
            border-bottom: 1px solid #eee;
        }
        @media (min-width: 1024px) {
            .sidebar {
                width: 360px;
                min-width: 360px;
                border-right: 1px solid #e8e8e8;
                border-bottom: none;
                display: flex;
                flex-direction: column;
                height: 100vh;
                position: sticky;
                top: 0;
            }
        }

        .sidebar-header {
            padding: 20px 24px;
            border-bottom: 1px solid #f0f0f0;
        }
        @media (min-width: 1024px) {
            .sidebar-header { padding: 24px 28px; }
        }

        .logo {
            font-size: 22px;
            font-weight: 700;
            color: #000;
            margin-bottom: 4px;
        }
        @media (min-width: 1024px) {
            .logo { font-size: 24px; }
        }

        .logo-sub {
            font-size: 13px;
            color: #999;
        }

        .search-box {
            padding: 16px 24px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        @media (min-width: 1024px) {
            .search-box { padding: 16px 28px; }
        }

        .search-wrapper {
            flex: 1;
            position: relative;
        }

        .manage-btn {
            flex-shrink: 0;
            padding: 8px 14px;
            border: 1px solid #dc2626;
            background: transparent;
            color: #dc2626;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            white-space: nowrap;
            transition: all 0.15s;
        }
        .manage-btn:hover { background: #fef2f2; }
        .manage-btn.active {
            background: #dc2626;
            color: #fff;
        }

        .search-input {
            width: 100%;
            padding: 10px 14px 10px 38px;
            border: 1px solid #e8e8e8;
            border-radius: 8px;
            font-size: 14px;
            background: #fafafa;
            outline: none;
            transition: all 0.2s;
        }
        .search-input:focus {
            border-color: #ccc;
            background: #fff;
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #bbb;
        }

        .search-wrapper { position: relative; }

        /* Artist Filter */
        .artist-filter {
            padding: 16px 24px;
            border-bottom: 1px solid #f0f0f0;
            overflow-x: auto;
            white-space: nowrap;
        }
        @media (min-width: 1024px) {
            .artist-filter {
                padding: 16px 28px;
                overflow-x: hidden;
                white-space: normal;
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
            }
        }

        .artist-filter::-webkit-scrollbar { display: none; }

        .filter-btn {
            display: inline-block;
            padding: 6px 14px;
            margin-right: 8px;
            border-radius: 16px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #e8e8e8;
            background: #fff;
            color: #666;
        }
        @media (min-width: 1024px) {
            .filter-btn { margin-right: 0; }
        }

        .filter-btn:hover { background: #f5f5f5; }
        .filter-btn.active {
            background: #000;
            color: #fff;
            border-color: #000;
        }

        /* Song List */
        .song-list {
            padding: 8px 0;
            overflow-y: auto;
            flex: 1;
        }

        .song-item {
            display: flex;
            align-items: center;
            padding: 14px 24px;
            cursor: pointer;
            transition: background 0.15s;
            border-left: 3px solid transparent;
        }
        @media (min-width: 1024px) {
            .song-item { padding: 14px 28px; }
        }

        .song-item:hover { background: #f8f8f8; }
        .song-item.active {
            background: #f5f5f5;
            border-left-color: #000;
        }

        .song-delete-btn { display: none; }
        .delete-mode .song-item { cursor: pointer; }
        .delete-mode .song-item.delete-selected {
            background: #fef2f2;
            border-left-color: #dc2626;
        }
        .delete-mode .song-item.delete-selected .song-number {
            color: #dc2626;
            font-weight: bold;
        }

        .delete-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 24px;
            border-top: 1px solid #f0f0f0;
            background: #fff;
            position: sticky;
            bottom: 0;
            font-size: 13px;
            color: #666;
        }
        .delete-submit-btn {
            padding: 8px 16px;
            background: #dc2626;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: opacity 0.15s;
        }
        .delete-submit-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .delete-submit-btn:not(:disabled):hover { opacity: 0.85; }

        .song-number {
            width: 28px;
            font-size: 13px;
            color: #bbb;
            flex-shrink: 0;
        }

        .song-info-compact {
            flex: 1;
            min-width: 0;
        }

        .song-title-compact {
            font-size: 15px;
            font-weight: 500;
            color: #000;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .song-artist-compact {
            font-size: 12px;
            color: #999;
        }

        /* ===== Main Content (Right) ===== */
        .main-content {
            flex: 1;
            min-width: 0;
            background: #fff;
        }
        @media (min-width: 1024px) {
            .main-content {
                overflow-y: auto;
                height: 100vh;
            }
        }

        /* Empty State */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            padding: 40px;
            text-align: center;
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        .empty-title {
            font-size: 20px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .empty-desc {
            font-size: 14px;
            color: #999;
        }

        /* Lyrics View */
        .lyrics-view {
            padding: 24px;
        }
        @media (min-width: 1024px) {
            .lyrics-view {
                padding: 40px 48px;
                max-width: 800px;
                margin: 0 auto;
            }
        }

        /* Song Header */
        .song-header {
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid #f0f0f0;
        }

        .song-title-row {
            display: flex;
            align-items: flex-end;
            gap: 16px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .song-title-main {
            display: flex;
            align-items: flex-end;
            gap: 4px;
        }
        @media (min-width: 1024px) {
            .song-title-main { gap: 6px; }
        }

        .title-char-group {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
        }

        .title-char-jyutping {
            font-size: 11px;
            color: #999;
            font-family: "SF Mono", "Fira Code", "Consolas", monospace;
            margin-bottom: 2px;
            height: 14px;
        }
        @media (min-width: 1024px) {
            .title-char-jyutping { font-size: 13px; height: 16px; }
        }

        .title-char-hanzi {
            font-size: 28px;
            font-weight: 700;
            color: #000;
            line-height: 1.2;
        }
        @media (min-width: 1024px) {
            .title-char-hanzi { font-size: 36px; }
        }

        .song-meta-row {
            display: flex;
            flex-direction: column;
            gap: 8px;
            font-size: 14px;
            color: #666;
        }

        .song-meta-row-inner {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
        }

        .song-meta-item {
            display: flex;
            align-items: flex-end;
            gap: 6px;
        }

        .song-meta-label {
            color: #999;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
        }

        .song-meta-label-jyutping {
            font-size: 9px;
            color: #bbb;
            font-family: "SF Mono", "Fira Code", "Consolas", monospace;
            height: 11px;
        }

        .song-meta-label-hanzi {
            font-size: 14px;
            color: #999;
        }

        .meta-name-group {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
        }

        .meta-name-jyutping {
            font-size: 9px;
            color: #bbb;
            font-family: "SF Mono", "Fira Code", "Consolas", monospace;
            height: 11px;
        }

        .meta-name-hanzi {
            font-size: 14px;
            color: #666;
        }

        /* Lyrics Content */
        .lyrics-content {
            line-height: 2;
        }

        .lyric-line {
            margin-bottom: 12px;
            line-height: 1.6;
            animation: fadeIn 0.3s ease forwards;
            opacity: 0;
        }

        .lyric-paragraph-break {
            height: 16px;
        }

        .lyric-line:nth-child(1) { animation-delay: 0.02s; }
        .lyric-line:nth-child(2) { animation-delay: 0.04s; }
        .lyric-line:nth-child(3) { animation-delay: 0.06s; }
        .lyric-line:nth-child(4) { animation-delay: 0.08s; }
        .lyric-line:nth-child(5) { animation-delay: 0.10s; }
        .lyric-line:nth-child(6) { animation-delay: 0.12s; }
        .lyric-line:nth-child(7) { animation-delay: 0.14s; }
        .lyric-line:nth-child(8) { animation-delay: 0.16s; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
            15% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            85% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
        }

        .char-group {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            margin-right: 2px;
            vertical-align: bottom;
        }
        @media (min-width: 1024px) {
            .char-group { margin-right: 3px; }
        }

        .char-jyutping {
            font-size: 13px;
            color: #888;
            font-family: "SF Mono", "Fira Code", "Consolas", monospace;
            margin-bottom: 2px;
            height: 16px;
        }
        @media (min-width: 1024px) {
            .char-jyutping { font-size: 15px; height: 18px; }
        }

        .char-jyutping:empty::before { content: "\00a0"; }

        .char-hanzi {
            font-size: 20px;
            font-weight: 400;
            color: #000;
        }
        @media (min-width: 1024px) {
            .char-hanzi { font-size: 24px; }
        }

        /* Toolbar */
        .toolbar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #fff;
            border-top: 1px solid #eee;
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        @media (min-width: 1024px) {
            .toolbar {
                position: sticky;
                bottom: 0;
                padding: 12px 48px;
                max-width: 800px;
                margin: 0 auto;
            }
        }

        .toolbar-left {
            display: flex;
            gap: 4px;
            flex: 1;
        }
        @media (max-width: 1023px) {
            .toolbar-left {
                flex-wrap: wrap;
            }
        }

        .toolbar-btn {
            background: none;
            border: none;
            color: #666;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 10px;
            border-radius: 6px;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .toolbar-btn:hover {
            background: #f5f5f5;
            color: #000;
        }

        .toolbar-btn .icon {
            font-size: 16px;
        }
        .toolbar-btn span:not(.icon) {
            display: none;
        }
        @media (min-width: 768px) {
            .toolbar-btn span:not(.icon) {
                display: inline;
            }
        }

        .toolbar-btn.primary {
            background: #000;
            color: #fff;
        }

        .toolbar-btn.primary:hover {
            background: #333;
        }

        .toolbar-select {
            background: none;
            border: none;
            color: #666;
            font-size: 16px;
            cursor: pointer;
            padding: 8px 4px;
            appearance: none;
            -webkit-appearance: none;
            text-align: center;
            min-width: 32px;
        }
        .toolbar-select:focus { outline: none; }

        .toolbar-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 16px;
            color: #666;
            cursor: pointer;
            padding: 8px;
        }
        @media (max-width: 1023px) {
            .toolbar-toggle {
                display: block;
            }
            /* 手机端默认收起 */
            .toolbar {
                padding: 8px 16px;
            }
            .toolbar .toolbar-left,
            .toolbar .toolbar-btn:not(.toolbar-toggle) {
                display: none;
            }
            /* 展开状态 */
            .toolbar.expanded {
                padding: 12px 24px;
            }
            .toolbar.expanded .toolbar-left,
            .toolbar.expanded .toolbar-btn:not(.toolbar-toggle) {
                display: flex;
            }
        }

        /* Mobile Header (only on mobile) */
        .mobile-header {
            display: flex;
            align-items: center;
            padding: 14px 24px;
            border-bottom: 1px solid #eee;
            background: #fff;
        }
        @media (min-width: 1024px) {
            .mobile-header { display: none; }
        }

        .mobile-header-title {
            font-size: 17px;
            font-weight: 600;
            flex: 1;
            text-align: center;
        }

        .mobile-back-btn {
            background: none;
            border: none;
            font-size: 20px;
            color: #333;
            cursor: pointer;
            padding: 4px;
        }

        /* Mobile View Toggle */
        .mobile-only { display: block; }
        .desktop-only { display: none; }

        @media (min-width: 1024px) {
            .mobile-only { display: none; }
            .desktop-only { display: block; }
        }

        /* View States */
        .view-lyrics .sidebar {
            display: none;
        }
        @media (min-width: 1024px) {
            .view-lyrics .sidebar { display: flex; }
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #ccc; }

        /* ===== Correction Mode ===== */
        .correction-mode .char-group {
            cursor: pointer;
            border-radius: 4px;
            padding: 2px;
            margin-right: 2px;
            transition: all 0.15s;
            position: relative;
        }
        @media (min-width: 1024px) {
            .correction-mode .char-group { margin-right: 4px; }
        }
        .correction-mode .char-group:hover {
            background: #e8f4fd;
        }
        .correction-mode .char-group.selected {
            background: #d0e8ff;
            outline: 2px solid #4a9eff;
            outline-offset: -1px;
        }
        .correction-mode .char-group.corrected {
            background: #fff3cd;
            outline: 2px solid #ffc107;
            outline-offset: -1px;
        }
        .correction-mode .char-group.corrected .char-jyutping {
            color: #d48806;
            font-weight: 600;
        }

        /* Correction banner */
        .correction-banner {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: #fff3cd;
            border-bottom: 2px solid #ffc107;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            z-index: 100;
            font-size: 14px;
            color: #856404;
            animation: slideDown 0.2s ease;
        }
        @keyframes slideDown {
            from { transform: translateY(-100%); }
            to { transform: translateY(0); }
        }
        .correction-banner-btn {
            padding: 6px 16px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.15s;
        }
        .correction-banner-btn.submit {
            background: #28a745;
            color: #fff;
        }
        .correction-banner-btn.submit:hover { background: #218838; }
        .correction-banner-btn.submit:disabled { background: #ccc; cursor: not-allowed; }
        .correction-banner-btn.cancel {
            background: #fff;
            color: #666;
            border: 1px solid #ddd;
        }
        .correction-banner-btn.cancel:hover { background: #f5f5f5; }

        /* Edit popup */
        .edit-popup {
            position: fixed;
            z-index: 200;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15), 0 0 0 1px rgba(0,0,0,0.05);
            padding: 16px;
            min-width: 200px;
            animation: popIn 0.15s ease;
        }
        @keyframes popIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        .edit-popup-title {
            font-size: 12px;
            color: #999;
            margin-bottom: 8px;
        }
        .edit-popup-chars {
            font-size: 18px;
            font-weight: 600;
            color: #000;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }
        .edit-popup-input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            font-family: "SF Mono", "Fira Code", "Consolas", monospace;
            outline: none;
            transition: border-color 0.15s;
        }
        .edit-popup-input:focus {
            border-color: #4a9eff;
        }
        .edit-popup-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            justify-content: flex-end;
        }
        .edit-popup-btn {
            padding: 5px 14px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.15s;
        }
        .edit-popup-btn.confirm {
            background: #4a9eff;
            color: #fff;
        }
        .edit-popup-btn.confirm:hover { background: #3a8bee; }
        .edit-popup-btn.dismiss {
            background: #f5f5f5;
            color: #666;
        }
        .edit-popup-btn.dismiss:hover { background: #eee; }

        /* Overlay */
        .edit-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 150;
        }

        /* Correction count badge */
        .correction-count {
            background: #dc3545;
            color: #fff;
            font-size: 11px;
            font-weight: 600;
            padding: 1px 6px;
            border-radius: 10px;
            margin-left: 4px;
        }

        /* ===== 修改歌词模式 ===== */
        .edit-lyrics-mode .lyric-line {
            cursor: pointer;
            border-radius: 4px;
            padding: 4px 8px;
            margin-left: -8px;
            transition: all 0.15s;
            position: relative;
        }
        .edit-lyrics-mode .lyric-line:hover {
            background: #e8f4fd;
        }
        .edit-lyrics-mode .lyric-line.selected {
            background: #d0e8ff;
            outline: 2px solid #4a9eff;
        }

        /* Edit lyrics popup */
        .edit-lyrics-popup {
            position: fixed;
            z-index: 200;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15), 0 0 0 1px rgba(0,0,0,0.05);
            padding: 16px;
            min-width: 320px;
            max-width: 90vw;
            animation: popIn 0.15s ease;
        }
        .edit-lyrics-popup-title {
            font-size: 12px;
            color: #999;
            margin-bottom: 8px;
        }
        .edit-lyrics-popup-line-num {
            font-size: 13px;
            color: #666;
            margin-bottom: 8px;
        }
        .edit-lyrics-popup-original {
            font-size: 14px;
            color: #666;
            background: #f5f5f5;
            padding: 8px 12px;
            border-radius: 6px;
            margin-bottom: 12px;
            word-break: break-all;
        }
        .edit-lyrics-popup-input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.15s;
            margin-bottom: 12px;
        }
        .edit-lyrics-popup-input:focus {
            border-color: #4a9eff;
        }
        .edit-lyrics-popup-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }
        .edit-lyrics-popup-btn {
            padding: 6px 16px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.15s;
        }
        .edit-lyrics-popup-btn.confirm {
            background: #28a745;
            color: #fff;
        }
        .edit-lyrics-popup-btn.confirm:hover { background: #218838; }
        .edit-lyrics-popup-btn.dismiss {
            background: #f5f5f5;
            color: #666;
        }

    <!-- 歌曲清单（内联，避免缓存问题。新增歌曲时在此数组添加一行） -->
    <script>
    const songFiles = [
        'lyrics/重复犯错.js',
        'lyrics/喜欢你.js',
        'lyrics/海阔天空.js',
        'lyrics/富士山下.js',
        'lyrics/明年今日.js',
        'lyrics/千千阙歌.js',
        'lyrics/必杀技.js',
        'lyrics/爱与诚.js',
        'lyrics/爱得太迟.js',
        'lyrics/友共情.js',
        'lyrics/欢乐今宵.js',
        'lyrics/时代.js',
        'lyrics/告别我的恋人们.js',
        'lyrics/心跳回忆.js',
        'lyrics/第二最爱.js',
        'lyrics/罗马假期.js',
        'lyrics/致少年时代.js',
    ];

    async function loadAllSongs() {
        window.__songs = [];
        const loadPromises = songFiles.map(file => {
            return new Promise((resolve) => {
                const script = document.createElement('script');
                script.src = file;
                script.onload = resolve;
                script.onerror = () => {
                    console.warn('加载歌曲文件失败:', file);
                    resolve();
                };
                document.head.appendChild(script);
            });
        });
        await Promise.all(loadPromises);
        return window.__songs;
    }
    </script>
    <script>
    // 应用状态
    let songs = [];
    let artists = [];
    let currentSong = null;
    let currentFilter = 'all';
    let favorites = JSON.parse(localStorage.getItem('jyutping_favs') || '[]');
    let fontSize = 20;
    let letterSpacing = 0;  // 字间距，范围 0-10px，默认 0
    let lineHeight = 1.6;   // 行间距，范围 1.0-2.0，默认 1.6
    const MIN_FONT_SIZE = 12;
    const MAX_FONT_SIZE = 24;

    // 异步初始化：先加载歌曲数据，再渲染页面
    async function init() {
        songs = await loadAllSongs();

        // 恢复用户导入的歌曲（localStorage）
        const importedSongs = JSON.parse(localStorage.getItem('jyutping_imported') || '[]');
        if (importedSongs.length > 0) {
            importedSongs.forEach(s => window.__songs.push(s));
            songs = window.__songs;
        }

        // 拆分合唱歌手，如"古巨基/梁咏琪" → ["古巨基", "梁咏琪"]
        const artistSet = new Set();
        songs.forEach(s => {
            s.artist.split(/[\/、,，&]/).forEach(a => {
                const trimmed = a.trim();
                if (trimmed) artistSet.add(trimmed);
            });
        });
        artists = [...artistSet];
        renderArtistFilter();
        renderSongList();
    }

    function renderArtistFilter() {
        const container = document.getElementById('artistFilter');
        let html = '<span class="filter-btn active" data-filter="all" onclick="setFilter(\'all\')">全部</span>';
        artists.forEach(artist => {
            html += `<span class="filter-btn" data-filter="${artist}" onclick="setFilter('${artist}')">${artist}</span>`;
        });
        container.innerHTML = html;
    }

    function setFilter(artist) {
        currentFilter = artist;
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.filter === artist);
        });
        renderSongList();
    }

    function renderSongList() {
        const container = document.getElementById('songList');
        let filtered = songs;
        if (currentFilter !== 'all') {
            // 合唱歌曲：歌手字段包含筛选的歌手名即可匹配
            filtered = filtered.filter(s => {
                const songArtists = s.artist.split(/[\/、,，&]/).map(a => a.trim());
                return songArtists.includes(currentFilter);
            });
        }
        const searchQuery = document.getElementById('searchInput').value.trim().toLowerCase();
        if (searchQuery) {
            filtered = filtered.filter(s => {
                // 搜索歌名、歌手、填词、作曲
                if (s.title.toLowerCase().includes(searchQuery)) return true;
                if (s.artist.toLowerCase().includes(searchQuery)) return true;
                if (s.lyricist && s.lyricist.toLowerCase().includes(searchQuery)) return true;
                if (s.composer && s.composer.toLowerCase().includes(searchQuery)) return true;
                // 搜索歌词内容
                const lyricsText = s.lyrics
                    .filter(l => l.chars)
                    .map(l => l.chars.join(''))
                    .join('');
                if (lyricsText.toLowerCase().includes(searchQuery)) return true;
                return false;
            });
        }

        let html = '';
        filtered.forEach((song, index) => {
            const isActive = currentSong && currentSong.id === song.id;
            const clickAction = deleteMode ? `toggleDeleteSelect(${song.id}, event)` : `selectSong(${song.id})`;
            html += `
                <div class="song-item ${isActive ? 'active' : ''}" onclick="${clickAction}">
                    <span class="song-number">${String(index + 1).padStart(2, '0')}</span>
                    <div class="song-info-compact">
                        <div class="song-title-compact">${song.title}</div>
                        <div class="song-artist-compact">${song.artist}</div>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    function filterSongs() {
        renderSongList();
    }

    function selectSong(id) {
        // Exit correction mode if active
        if (correctionMode) {
            toggleCorrectionMode();
        }
        currentSong = songs.find(s => s.id === id);
        renderSongList();
        renderLyrics();

        // Mobile: switch to lyrics view
        if (window.innerWidth < 1024) {
            document.getElementById('appContainer').classList.add('view-lyrics');
            document.getElementById('mobileHeader').style.display = 'flex';
        }
    }

    function showSongList() {
        document.getElementById('appContainer').classList.remove('view-lyrics');
        document.getElementById('mobileHeader').style.display = 'none';
    }

    function renderLyrics() {
        if (!currentSong) return;

        document.getElementById('emptyState').style.display = 'none';
        document.getElementById('lyricsView').style.display = 'block';
        document.getElementById('mobileTitle').textContent = currentSong.title;

        // Render title with jyutping
        const titleHtml = currentSong.title.split('').map((char, i) => {
            const jp = currentSong.titleJyutping[i] || '';
            return `
                <span class="title-char-group">
                    <span class="title-char-jyutping">${jp}</span>
                    <span class="title-char-hanzi">${char}</span>
                </span>
            `;
        }).join('');
        document.getElementById('songTitle').innerHTML = titleHtml;

        // Render metadata with jyutping
        document.getElementById('songArtist').innerHTML = renderMetaName(currentSong.artist, currentSong.artistJyutping);
        document.getElementById('songLyricist').innerHTML = renderMetaName(currentSong.lyricist, currentSong.lyricistJyutping);
        document.getElementById('songComposer').innerHTML = renderMetaName(currentSong.composer, currentSong.composerJyutping);

        // Render lyrics with font size, letter spacing and line height
        let lyricsHtml = '';
        currentSong.lyrics.forEach((line, index) => {
            if (line.paragraphBreak) {
                lyricsHtml += '<div class="lyric-paragraph-break"></div>';
                return;
            }
            // 按空格分割成多行，确保每行行高一致
            const segments = [];
            let currentSegment = [];
            line.chars.forEach((char, i) => {
                if (char === ' ') {
                    if (currentSegment.length > 0) {
                        segments.push(currentSegment);
                        currentSegment = [];
                    }
                } else {
                    currentSegment.push({ char, jp: line.jp[i] || '', index: i });
                }
            });
            if (currentSegment.length > 0) {
                segments.push(currentSegment);
            }
            // 渲染每个分段为一个独立的 lyric-line
            segments.forEach((segment, segIdx) => {
                const segmentHtml = segment.map(({ char, jp, index: charIndex }) => `
                    <span class="char-group" data-line="${index}" data-char="${charIndex}" data-original-jp="${jp}" onclick="onCharClick(event, ${index}, ${charIndex})" style="margin-right:${letterSpacing}px">
                        <span class="char-jyutping">${jp}</span>
                        <span class="char-hanzi" style="font-size:${fontSize}px">${char}</span>
                    </span>
                `).join('');
                lyricsHtml += `<div class="lyric-line" style="line-height:${lineHeight}" onclick="onLyricLineClick(event, ${index})">${segmentHtml}</div>`;
            });
        });
        document.getElementById('lyricsContent').innerHTML = lyricsHtml;

        updateFavIcon();
    }

    function renderMetaName(name, jyutpingArr) {
        if (!jyutpingArr || jyutpingArr.length === 0) return name;
        return name.split('').map((char, i) => {
            const jp = jyutpingArr[i] || '';
            return `
                <span class="meta-name-group">
                    <span class="meta-name-jyutping">${jp}</span>
                    <span class="meta-name-hanzi">${char}</span>
                </span>
            `;
        }).join('');
    }

    function adjustFontSize(delta) {
        const newSize = fontSize + delta;
        if (newSize < MIN_FONT_SIZE) {
            showToast('已是最小字号');
            return;
        }
        if (newSize > MAX_FONT_SIZE) {
            showToast('已是最大字号');
            return;
        }
        fontSize = newSize;
        renderLyrics();
    }

    function adjustLetterSpacing(delta) {
        const newSpacing = letterSpacing + delta;
        if (newSpacing < 0) {
            showToast('已是最小字间距');
            return;
        }
        if (newSpacing > 10) {
            showToast('已是最大字间距');
            return;
        }
        letterSpacing = newSpacing;
        renderLyrics();
    }

    function adjustLineHeight(delta) {
        const newHeight = Math.round((lineHeight + delta) * 10) / 10;
        if (newHeight < 1.0) {
            showToast('已是最小行间距');
            return;
        }
        if (newHeight > 2.0) {
            showToast('已是最大行间距');
            return;
        }
        lineHeight = newHeight;
        renderLyrics();
    }

    function showToast(message) {
        const existingToast = document.querySelector('.toast-message');
        if (existingToast) {
            existingToast.remove();
        }
        const toast = document.createElement('div');
        toast.className = 'toast-message';
        toast.textContent = message;
        toast.style.cssText = `
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 10000;
            animation: fadeInOut 1.5s ease forwards;
        `;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 1500);
    }

    function toggleToolbar() {
        const toolbar = document.getElementById('toolbar');
        const toggle = document.getElementById('toolbarToggle');
        toolbar.classList.toggle('expanded');
        toggle.textContent = toolbar.classList.contains('expanded') ? '▼' : '▲';
    }

    function toggleFavorite() {
        if (!currentSong) return;
        const idx = favorites.indexOf(currentSong.id);
        if (idx > -1) favorites.splice(idx, 1);
        else favorites.push(currentSong.id);
        localStorage.setItem('jyutping_favs', JSON.stringify(favorites));
        updateFavIcon();
    }

    function updateFavIcon() {
        if (!currentSong) return;
        const icon = document.getElementById('favIcon');
        const isFav = favorites.includes(currentSong.id);
        icon.textContent = isFav ? '★' : '☆';
    }

    function shareSong() {
        if (!currentSong) return;
        const url = `${window.location.origin}${window.location.pathname}#${currentSong.id}`;
        if (navigator.clipboard) {
            navigator.clipboard.writeText(url).then(() => showToast('链接已复制'));
        } else {
            showToast('链接: ' + url);
        }
    }

    // ===== 纠错模式 =====
    let correctionMode = false;
    let corrections = []; // { lineIndex, charIndex, originalJp, newJp, char }
    let selectedChars = []; // [{ lineIndex, charIndex }]

    function toggleCorrectionMode() {
        correctionMode = !correctionMode;
        const lyricsContent = document.getElementById('lyricsContent');
        const toolbar = document.querySelector('.toolbar');

        if (correctionMode) {
            lyricsContent.classList.add('correction-mode');
            corrections = [];
            selectedChars = [];
            showCorrectionBanner();
            updateCorrectionBtn();
        } else {
            lyricsContent.classList.remove('correction-mode');
            hideCorrectionBanner();
            clearSelection();
            clearCorrections();
            updateCorrectionBtn();
        }
    }

    function updateCorrectionBtn() {
        const btn = document.querySelector('.toolbar-btn[onclick="submitFeedback()"]');
        if (!btn) return;
        if (correctionMode) {
            btn.innerHTML = '<span class="icon">✏️</span><span>退出纠错</span>';
            btn.style.color = '#d48806';
        } else {
            btn.innerHTML = '<span class="icon">✏️</span><span>纠错</span>';
            btn.style.color = '';
        }
    }

    function showCorrectionBanner() {
        // Remove existing banner
        hideCorrectionBanner();
        const banner = document.createElement('div');
        banner.className = 'correction-banner';
        banner.id = 'correctionBanner';
        banner.innerHTML = `
            <span>✏️ 纠错模式：点击字即可修改粤拼</span>
            <span id="correctionCountText" style="font-weight:600;"></span>
            <button class="correction-banner-btn submit" id="submitCorrectionsBtn" onclick="submitCorrections()" disabled>提交反馈</button>
            <button class="correction-banner-btn cancel" onclick="toggleCorrectionMode()">退出</button>
        `;
        document.body.appendChild(banner);
    }

    function hideCorrectionBanner() {
        const existing = document.getElementById('correctionBanner');
        if (existing) existing.remove();
    }

    function updateCorrectionCount() {
        const text = document.getElementById('correctionCountText');
        const btn = document.getElementById('submitCorrectionsBtn');
        if (!text || !btn) return;
        if (corrections.length > 0) {
            text.innerHTML = `<span class="correction-count">${corrections.length}</span> 处修改`;
            btn.disabled = false;
        } else {
            text.textContent = '';
            btn.disabled = true;
        }
    }

    function onCharClick(event, lineIndex, charIndex) {
        if (!correctionMode) return;
        event.stopPropagation();

        const charGroup = event.currentTarget;

        // If already corrected, allow re-edit
        if (charGroup.classList.contains('corrected')) {
            showEditPopup(charGroup, lineIndex, charIndex);
            return;
        }

        // Toggle selection
        const idx = selectedChars.findIndex(s => s.lineIndex === lineIndex && s.charIndex === charIndex);
        if (idx > -1) {
            selectedChars.splice(idx, 1);
            charGroup.classList.remove('selected');
        } else {
            selectedChars.push({ lineIndex, charIndex });
            charGroup.classList.add('selected');
        }

        // If we have selection, show edit popup
        if (selectedChars.length > 0) {
            // Use the last clicked char's position for popup
            showEditPopup(charGroup, lineIndex, charIndex);
        }
    }

    function showEditPopup(charGroup, lineIndex, charIndex) {

        }

    function confirmEdit() {
        const input = document.getElementById('editJpInput');
        if (!input) return;
        const newJp = input.value.trim();
        if (!newJp) return;

        if (selectedChars.length > 0) {
            const sorted = [...selectedChars].sort((a, b) => a.lineIndex - b.lineIndex || a.charIndex - b.charIndex);
            const newJpArr = newJp.split(/\s+/);

            sorted.forEach((s, i) => {
                const line = currentSong.lyrics[s.lineIndex];
                const originalJp = line.jp[s.charIndex];
                const correctedJp = newJpArr[i] || newJpArr[newJpArr.length - 1] || newJp;
                const char = line.chars[s.charIndex];

                // Update or add correction
                const existingIdx = corrections.findIndex(c => c.lineIndex === s.lineIndex && c.charIndex === s.charIndex);
                if (existingIdx > -1) {
                    corrections[existingIdx].newJp = correctedJp;
                } else {
                    corrections.push({
                        lineIndex: s.lineIndex,
                        charIndex: s.charIndex,
                        char: char,
                        originalJp: originalJp,
                        newJp: correctedJp
                    });
                }

                // Update DOM
                const charEl = document.querySelector(`.char-group[data-line="${s.lineIndex}"][data-char="${s.charIndex}"]`);
                if (charEl) {
                    charEl.classList.remove('selected');
                    charEl.classList.add('corrected');
                    charEl.querySelector('.char-jyutping').textContent = correctedJp;
                }

                // 同步：识别被修改字所在的词汇，同步相同词汇中同一位置的字的粤拼
                // 提取词汇：取修改字前后各1个字，组成2-3字的词
                const line_chars = line.chars;
                const line_jp = line.jp;
                const ci = s.charIndex;
                // 构建词汇（前后各扩展1字）
                let wordChars = [char];
                let wordStart = ci;
                let wordEnd = ci;
                if (ci > 0 && line_chars[ci - 1] && line_chars[ci - 1] !== ' ') {
                    wordChars.unshift(line_chars[ci - 1]);
                    wordStart = ci - 1;
                }
                if (ci < line_chars.length - 1 && line_chars[ci + 1] && line_chars[ci + 1] !== ' ') {
                    wordChars.push(line_chars[ci + 1]);
                    wordEnd = ci + 1;
                }
                // 被修改字在词汇中的偏移位置
                const charOffsetInWord = ci - wordStart;
                // 词汇对应的粤拼序列
                const wordJp = line_jp.slice(wordStart, wordEnd + 1);

                // 在全歌中查找相同词汇（相同字序列+相同粤拼序列），同步修改
                currentSong.lyrics.forEach((l, li) => {
                    if (!l.chars || !l.jp) return;
                    for (let wi = 0; wi <= l.chars.length - wordChars.length; wi++) {
                        // 检查从wi开始的字是否匹配词汇
                        let match = true;
                        for (let k = 0; k < wordChars.length; k++) {
                            if (l.chars[wi + k] !== wordChars[k] || l.jp[wi + k] !== wordJp[k]) {
                                match = false;
                                break;
                            }
                        }
                        if (!match) continue;
                        // 找到匹配词汇，同步修改对应位置的字
                        const syncCi = wi + charOffsetInWord;
                        // 跳过已选中的位置
                        if (sorted.some(sel => sel.lineIndex === li && sel.charIndex === syncCi)) continue;
                        // 跳过已有相同纠错的位置
                        if (corrections.some(ex => ex.lineIndex === li && ex.charIndex === syncCi && ex.newJp === correctedJp)) continue;
                        // 添加同步纠错
                        corrections.push({
                            lineIndex: li,
                            charIndex: syncCi,
                            char: l.chars[syncCi],
                            originalJp: l.jp[syncCi],
                            newJp: correctedJp
                        });
                        // 更新DOM
                        const syncEl = document.querySelector(`.char-group[data-line="${li}"][data-char="${syncCi}"]`);
                        if (syncEl) {
                            syncEl.classList.add('corrected');
                            syncEl.querySelector('.char-jyutping').textContent = correctedJp;
                        }
                    }
                });
            });
        }

        selectedChars = [];
        closeEditPopup();
        updateCorrectionCount();
    }

    function showImportModal() {

    function previewImport() {
        const lyricsText = document.getElementById('importLyrics').value.trim();
        if (!lyricsText) {
            document.getElementById('importPreview').style.display = 'none';
            importedLyricsData = null;
            return;
        }

        // 解析歌词：按双换行分段（连续两个或以上换行符表示段落分隔）
        // 单换行表示正常换行（新的一句）
        const normalizedText = lyricsText.replace(/\r\n/g, '\n');
        const paragraphs = normalizedText.split(/\n{2,}/);
        const lyrics = [];
        let previewHtml = '';

        paragraphs.forEach((para, pIdx) => {
            // 段落内按单换行分割成多行，每行是一句歌词
            const lines = para.split('\n').filter(l => l.trim());
            lines.forEach((line, lIdx) => {
                const matched = matchJyutping(line.trim());
                lyrics.push({
                    chars: matched.map(m => m.char),
                    jp: matched.map(m => m.jp)
                });

                // 生成预览HTML（只显示前几行）
                if (pIdx < 2 && lIdx < 3) {
                    previewHtml += '<div class="import-preview-line">';
                    matched.forEach(m => {
                        const jpClass = m.jp ? '' : 'style="color:#dc3545;"'; // 没有匹配到的字显示红色
                        previewHtml += `<span class="import-preview-char">
                            <span class="import-preview-jp" ${jpClass}>${m.jp || '?'}</span>
                            <span class="import-preview-hanzi">${m.char}</span>
                        </span>`;
                    });
                    previewHtml += '</div>';
                }
            });
            // 段落结束后添加段落分隔（双换行产生的段落）
            if (lines.length > 0) {
                lyrics.push({ paragraphBreak: true });
            }
        });

        // 移除最后一个多余的段落分隔
        if (lyrics.length > 0 && lyrics[lyrics.length - 1].paragraphBreak) {
            lyrics.pop();
        }

        importedLyricsData = lyrics;

        // 显示预览
        document.getElementById('importPreview').style.display = 'block';
        document.getElementById('importPreviewContent').innerHTML = previewHtml || '<div style="color:#999;">暂无内容</div>';
    }

    function generateSongFile() {
        const title = document.getElementById('importTitle').value.trim();
        const artist = document.getElementById('importArtist').value.trim();
        const lyricist = document.getElementById('importLyricist').value.trim();
        const composer = document.getElementById('importComposer').value.trim();

        if (!title || !artist) {
            alert('请填写歌曲名称和歌手');

        if (!importedLyricsData) {
            previewImport();
            if (!importedLyricsData) {
                alert('请输入歌词内容');
                return;
            }
        }

        // 生成歌曲ID（基于现有最大ID+1）
        const maxId = songs.reduce((max, s) => Math.max(max, s.id || 0), 0);
        const songId = maxId + 1;

        // 匹配标题、歌手、填词、作曲的粤拼
        const titleJyutping = matchJyutping(title).map(m => m.jp);
        const artistJyutping = matchJyutping(artist).map(m => m.jp);
        const lyricistJyutping = lyricist ? matchJyutping(lyricist).map(m => m.jp) : [];
        const composerJyutping = composer ? matchJyutping(composer).map(m => m.jp) : [];

        // 生成JS文件内容（格式与现有歌曲文件一致）
        const lyricsStr = importedLyricsData.map(line => {
            if (line.paragraphBreak) return '            { paragraphBreak: true }';
            return '            { chars: ' + JSON.stringify(line.chars) + ', jp: ' + JSON.stringify(line.jp) + ' }';
        }).join(',\n');

        const jsContent = `// 歌曲：${title}

(function() {
    const song = {
        id: ${songId},
        title: "${title}",
        titleJyutping: ${JSON.stringify(titleJyutping)},
        artist: "${artist}",
        artistJyutping: ${JSON.stringify(artistJyutping)},
        lyricist: "${lyricist}",
        lyricistJyutping: ${JSON.stringify(lyricistJyutping)},
        composer: "${composer}",
        composerJyutping: ${JSON.stringify(composerJyutping)},
        lyrics: [
${lyricsStr}
        ]
    };
    window.__songs.push(song);
}());

// ⚠️ 重要：请在 index.html 的 songFiles 数组中添加以下一行：
// 'lyrics/${title}.js',
`;

        // 直接添加到当前页面
        const song = {
            id: songId,
            title: title,
            titleJyutping: titleJyutping,
            artist: artist,
            artistJyutping: artistJyutping,
            lyricist: lyricist,
            lyricistJyutping: lyricistJyutping,
            composer: composer,
            composerJyutping: composerJyutping,
            lyrics: importedLyricsData
        };
        window.__songs.push(song);
        songs = window.__songs;

        // 更新歌手筛选
        const artistSet = new Set();
        songs.forEach(s => {
            s.artist.split(/[\/、,，&]/).forEach(a => {
                const trimmed = a.trim();
                if (trimmed) artistSet.add(trimmed);
            });
        });
        artists = [...artistSet];
        renderArtistFilter();
        renderSongList();

        // 保存到 localStorage 以便下次访问时恢复
        const importedSongs = JSON.parse(localStorage.getItem('jyutping_imported') || '[]');
        importedSongs.push(song);
        localStorage.setItem('jyutping_imported', JSON.stringify(importedSongs));

        // 同时生成代码供部署
        document.getElementById('generatedCode').value = jsContent;
        document.getElementById('codeModal').style.display = 'flex';

        // 关闭导入模态框
        hideImportModal();

        // 选中新导入的歌曲
        selectSong(songId);
    }

    function hideCodeModal() {
        document.getElementById('codeModal').style.display = 'none';
    }

    function copyGeneratedCode() {
        const code = document.getElementById('generatedCode').value;
        navigator.clipboard.writeText(code).then(() => {
            alert('代码已复制到剪贴板！\n\n请将代码保存为 lyrics/${document.getElementById("importTitle").value}.js 文件');
        }).catch(() => {
            // 备用方案
            const textarea = document.getElementById('generatedCode');
            textarea.select();
            document.execCommand('copy');
            alert('代码已复制！');
        });
    }
    </script>

    <!-- 导入歌词模态框 -->
    <div class="import-modal" id="importModal" style="display:none;">
        <div class="import-modal-content">
            <div class="import-modal-title">📥 导入新歌词</div>
            
            <div class="import-form-group">
                <label>歌曲名称 *</label>
                <input type="text" id="importTitle" placeholder="输入歌曲名称">
            </div>
            
            <div class="import-form-group">
                <label>歌手 *</label>
                <input type="text" id="importArtist" placeholder="输入歌手名称（合唱用 / 分隔）">
            </div>
            
            <div class="import-form-group">
                <label>填词</label>
                <input type="text" id="importLyricist" placeholder="填词人">
            </div>
            
            <div class="import-form-group">
                <label>作曲</label>
                <input type="text" id="importComposer" placeholder="作曲人">
            </div>
            
            <div class="import-form-group">
                <label>歌词内容 *</label>
                <textarea id="importLyrics" placeholder="粘贴歌词内容，换行表示新的一句，连续两个空行表示段落分隔" oninput="previewImport()"></textarea>
                <div class="import-tip">💡 单换行 = 新的一句歌词 &nbsp;|&nbsp; 双换行 = 段落分隔（更大间距）</div>
            </div>
            
            <div class="import-preview" id="importPreview" style="display:none;">
                <div class="import-preview-title">预览（粤拼自动匹配）</div>
                <div id="importPreviewContent"></div>
            </div>
            
            <div class="import-actions">
                <button class="import-btn cancel" onclick="hideImportModal()">取消</button>
                <button class="import-btn confirm" onclick="generateSongFile()">生成歌曲文件</button>
            </div>
        </div>
    </div>

    <!-- 生成的代码模态框 -->
    <div class="import-modal" id="codeModal" style="display:none;">
        <div class="import-modal-content" style="max-width: 700px;">
            <div class="import-modal-title">📄 生成的歌曲文件代码</div>
            <div class="import-form-group">
                <label>复制以下代码，保存为 .js 文件到 lyrics 文件夹</label>
                <textarea id="generatedCode" style="min-height: 300px; font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; font-size: 12px;" readonly></textarea>
            </div>
            <div class="import-actions">
                <button class="import-btn cancel" onclick="hideCodeModal()">关闭</button>
                <button class="import-btn confirm" onclick="copyGeneratedCode()">复制代码</button>
            </div>
        </div>
    </div>

    <!-- Init -->
    <script>
    init();
    </script>
</body>
</html>
