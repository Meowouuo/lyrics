            height: 8px;

        }

            color: #000;
        }
        .artist-count {

            color: #999;

        }
        .song-card {

            padding: 14px 16px;
            background: #fafafa;
            border-radius: 12px;
            margin-bottom: 8px;

        .song-card-title {

        }

            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
        }
        
        /* Character-Jyutping Pair Styling */
        .char-line {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 4px 8px;
            margin-bottom: 16px;
        }
        .char-pair {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .char-jyutping {

            height: 14px;

        .char-chinese {
            font-size: 28px;
            font-weight: 600;
            color: #000;

        .meta-line {

            color: #666;

        .lyric-line:nth-child(9) { animation-delay: 0.18s; }

            height: 32px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 8px;
            margin-top: 2px;
            color: #ddd;
            font-size: 16px;

        .lyric-content {

            flex-wrap: wrap;

            flex-direction: column;

            left: 50%;

            top: 60px;
            left: 50%;
            transform: translateX(-50%);

            color: #fff;

            border-radius: 20px;
            font-size: 14px;
            z-index: 9999;
            animation: fadeIn 0.3s ease;
            pointer-events: none;
        }
        ::-webkit-scrollbar { width: 0; }
    </style>
</head>

    function initFilterTabs() {
        const tabsContainer = document.getElementById('filterTabs');
        let tabsHTML = '<div class="filter-tab active" data-filter="all" onclick="setFilter(\'all\')">全部</div>';
        artists.forEach((artist) => {
            tabsHTML += `<div class="filter-tab" data-filter="${artist}" onclick="setFilter('${artist}')">${artist}</div>`;
        });
        tabsContainer.innerHTML = tabsHTML;
    }

    function setFilter(artist) {
        currentFilter = artist;
        document.querySelectorAll('.filter-tab').forEach(tab => {
            tab.classList.toggle('active', tab.dataset.filter === artist);
        });
        renderSongList();
    }

        let filtered = songs;
        if (currentFilter !== 'all') {
            filtered = filtered.filter(s => s.artist === currentFilter);
        }
        if (filter) {
            filtered = filtered.filter(s => s.title.includes(filter));
        }
        if (filtered.length === 0) {
            list.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><div class="text">没有找到匹配的歌曲</div></div>';
            return;
        }
        const grouped = {};
        filtered.forEach(song => {
            if (!grouped[song.artist]) grouped[song.artist] = [];
            grouped[song.artist].push(song);
        });
        let html = '';
        Object.entries(grouped).forEach(([artist, artistSongs]) => {
            const artistIndex = artists.indexOf(artist);
            const color = artistColors[artistIndex % artistColors.length];
            html += `<div class="artist-section"><div class="artist-header"><div class="artist-dot" style="background: ${color}"></div><div class="artist-name">${artist}</div><div class="artist-count">${artistSongs.length}首</div></div>`;
            html += artistSongs.map(song => `
                <div class="song-card" onclick="openSong(${song.id})">
                    <div class="song-card-info">
                        <div class="song-card-title">${song.title}</div>
                        <div class="song-card-artist">${song.lyricist} 作词 · ${song.composer} 作曲</div>
                    </div>
                    <div class="song-card-arrow">›</div>
                </div>
            `).join('');
            html += '</div>';
        });
        list.innerHTML = html;
    }

    function filterSongs() {
        renderSongList(document.getElementById('searchInput').value.trim());
    }

    // Render character-jyutping pairs
    function renderCharLine(chars, jps, isMeta = false) {
        const size = fontSizes[fontLevel];
        const pairClass = isMeta ? 'meta-pair' : '';
        let html = '<div class="char-line">';
        for (let i = 0; i < chars.length; i++) {
            const jp = jps[i] || '';
            html += `
                <div class="char-pair ${pairClass}">
                    <div class="char-jyutping" style="font-size:${isMeta ? 9 : size.jyutping}px">${jp}</div>
                    <div class="char-chinese" style="font-size:${isMeta ? 14 : size.chinese}px">${chars[i]}</div>
                </div>
            `;
        }
        html += '</div>';
        return html;
    }

    function openSong(id) {
        currentSong = songs.find(s => s.id === id);
        if (!currentSong) return;
        document.getElementById('songListPage').classList.add('hidden');
        document.getElementById('lyricsPage').classList.add('active');
        document.getElementById('backBtn').style.display = 'flex';
        document.getElementById('headerTitle').textContent = currentSong.title;
        updateFavIcon();

        // Render song info with char-by-char jyutping
        document.getElementById('songInfo').innerHTML = `
            <div class="song-title-block">
                ${renderCharLine(currentSong.title.split(''), currentSong.titleJyutping)}
            </div>
            <div class="song-meta-block">
                ${renderCharLine(['歌','手','：'].concat(currentSong.artist.split('')), ['go1','sau2','：'].concat(currentSong.artistJyutping), true)}
                ${renderCharLine(['填','词','：'].concat(currentSong.lyricist.split('')), ['tin4','ci4','：'].concat(currentSong.lyricistJyutping), true)}
                ${renderCharLine(['作','曲','：'].concat(currentSong.composer.split('')), ['zok3','kuk1','：'].concat(currentSong.composerJyutping), true)}
            </div>
        `;
        renderLyrics();
        window.scrollTo(0, 0);
    }

    function renderLyrics() {
        if (!currentSong) return;
        const size = fontSizes[fontLevel];
        let html = '';
        currentSong.lyrics.forEach((line, idx) => {
            html += '<div class="lyric-line">';
            html += '<div class="lyric-speaker">🔊</div>';
            html += '<div class="lyric-content">';
            for (let i = 0; i < line.chars.length; i++) {
                const jp = line.jp[i] || '';
                html += `
                    <div class="lyric-pair">
                        <div class="jp" style="font-size:${size.jyutping}px">${jp}</div>
                        <div class="ch" style="font-size:${size.chinese}px">${line.chars[i]}</div>
                    </div>
                `;
            }
            html += '</div></div>';
        });
        document.getElementById('lyricsBody').innerHTML = html;
    }

    function goBack() {
        document.getElementById('lyricsPage').classList.remove('active');
        document.getElementById('songListPage').classList.remove('hidden');
        document.getElementById('backBtn').style.display = 'none';
        document.getElementById('headerTitle').textContent = '粤拼歌词';
        currentSong = null;
        window.scrollTo(0, 0);
    }

    function toggleFavorite() {
        if (!currentSong) return;
        const idx = favorites.indexOf(currentSong.id);
        if (idx > -1) favorites.splice(idx, 1);
        else favorites.push(currentSong.id);
        localStorage.setItem('jyutping_favs', JSON.stringify(favorites));
        updateFavIcon();
        showToast(favorites.includes(currentSong.id) ? '已收藏 ⭐' : '已取消收藏');
    }

    function updateFavIcon() {
        if (!currentSong) return;
        const icon = document.getElementById('favIcon');
        const isFav = favorites.includes(currentSong.id);
        icon.textContent = isFav ? '★' : '☆';
        icon.style.color = isFav ? '#FFD700' : '';
    }

    function toggleFontSize() {
        fontLevel = (fontLevel + 1) % fontSizes.length;
        if (currentSong) {
            openSong(currentSong.id);
        }
        showToast('字号：' + ['标准', '大', '特大'][fontLevel]);
    }

    function shareSong() {
        if (!currentSong) return;
        const text = `🎵 ${currentSong.title} - ${currentSong.artist}\n\n` +
            currentSong.lyrics.map(l => l.jp.join(' ') + '\n' + l.chars.join('')).join('\n\n');
        if (navigator.clipboard) {
            navigator.clipboard.writeText(text).then(() => showToast('歌词已复制到剪贴板 📋'));
        } else {
            showToast('浏览器不支持复制');
        }
    }

    function showToast(msg) {
        const existing = document.querySelector('.toast');
        if (existing) existing.remove();
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    initFilterTabs();
    renderSongList();
    </script>
</body>
</html>
