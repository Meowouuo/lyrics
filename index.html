                    { jyutping: "ting1 dou3 nei5 syut3 wui5 gei3 nei5 han5 gau1 m4 hoi1 sam1", chinese: "听到你说会记你很久不开心" },
                    { jyutping: "giu3 bat1 giu3 nei5 dou1 dak1 hei2 nei5", chinese: "叫不叫你都得起你" },
                    { jyutping: "m4 wui5 cung4 si3 jau6 zoi6 nei5 min6 cin4", chinese: "唔会重试又在你面前" },
                    { jyutping: "cung4 fuk1 faan6 co3", chinese: "重复犯错" },
                    { jyutping: "ze5 ci3 ngo5 faan6 liu5 co3", chinese: "这次我犯了错" },
                    { jyutping: "cing2 nei5 jyun4 loeng6 ngo5", chinese: "请你原谅我" },
                    { jyutping: "bat1 zi1 nei5 naan4 gwo3 zik6 mok6", chinese: "不知你难过寂寞" },
                    { jyutping: "ting1 dou3 nei5 syut3 wui5 gei3 nei5 han5 gau1 m4 hoi1 sam1", chinese: "听到你说会记你很久不开心" },
                    { jyutping: "giu3 bat1 giu3 nei5 dou1 dak1 hei2 nei5", chinese: "叫不叫你都得起你" },
                    { jyutping: "m4 wui5 cung4 si3 jau6 zoi6 nei5 min6 cin4", chinese: "唔会重试又在你面前" },
                    { jyutping: "cung4 fuk1 faan6 co3", chinese: "重复犯错" }
                ]
            }]
        }
    ];

    const artists = [...new Set(songs.map(s => s.artist))];
    const artistColors = ['#f5576c', '#4facfe', '#43e97b', '#fa709a', '#a18cd1', '#fccb90', '#667eea', '#764ba2'];

    let currentSong = null;
    let currentFilter = 'all';
    let favorites = JSON.parse(localStorage.getItem('jyutping_favs') || '[]');
    let fontLevel = 0;
    const fontSizes = [
        { jyutping: 13, chinese: 20 },
        { jyutping: 15, chinese: 23 },
        { jyutping: 17, chinese: 26 }
    ];

    function initFilterTabs() {
        const tabsContainer = document.getElementById('filterTabs');
        let tabsHTML = '<div class="filter-tab active" data-filter="all" onclick="setFilter(\'all\')">全部</div>';
        artists.forEach((artist) => {
            tabsHTML += `<div class="filter-tab" data-filter="${artist}" onclick="setFilter('${artist}')">${artist}</div>`;
        });
        tabsContainer.innerHTML = tabsHTML;
    }

    function setFilter(artist) {
        currentFilter = artist;
        document.querySelectorAll('.filter-tab').forEach(tab => {
            tab.classList.toggle('active', tab.dataset.filter === artist);
        });
        renderSongList();
    }

    function renderSongList(filter = '') {
        const list = document.getElementById('songList');
        let filtered = songs;
        if (currentFilter !== 'all') {
            filtered = filtered.filter(s => s.artist === currentFilter);
        }
        if (filter) {
            filtered = filtered.filter(s => s.title.includes(filter));
        }
        if (filtered.length === 0) {
            list.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><div class="text">没有找到匹配的歌曲</div></div>';
            return;
        }
        const grouped = {};
        filtered.forEach(song => {
            if (!grouped[song.artist]) grouped[song.artist] = [];
            grouped[song.artist].push(song);
        });
        let html = '';
        Object.entries(grouped).forEach(([artist, artistSongs]) => {
            const artistIndex = artists.indexOf(artist);
            const color = artistColors[artistIndex % artistColors.length];
            html += `<div class="artist-section"><div class="artist-header"><div class="artist-dot" style="background: ${color}"></div><div class="artist-name">${artist}</div><div class="artist-count">${artistSongs.length}首</div></div>`;
            html += artistSongs.map(song => `
                <div class="song-card" onclick="openSong(${song.id})">
                    <div class="song-card-info">
                        <div class="song-card-title">${song.title}</div>
                        <div class="song-card-artist">${song.lyricist} 作词 · ${song.composer} 作曲</div>
                    </div>
                    <div class="song-card-arrow">›</div>
                </div>
            `).join('');
            html += '</div>';
        });
        list.innerHTML = html;
    }

    function filterSongs() {
        renderSongList(document.getElementById('searchInput').value.trim());
    }

    function openSong(id) {
        currentSong = songs.find(s => s.id === id);
        if (!currentSong) return;
        document.getElementById('songListPage').classList.add('hidden');
        document.getElementById('lyricsPage').classList.add('active');
        document.getElementById('backBtn').style.display = 'flex';
        document.getElementById('headerTitle').textContent = currentSong.title;
        updateFavIcon();
        document.getElementById('songInfo').innerHTML = `
            <div class="song-info-jyutping">${currentSong.titleJyutping}</div>
            <div class="song-info-title">${currentSong.title}</div>
            <div class="song-meta">
                <div class="song-meta-item">
                    <div class="song-meta-jyutping">${currentSong.artistJyutping}</div>
                    <div class="song-meta-text">歌手：${currentSong.artist}</div>
                </div>
                <div class="song-meta-item">
                    <div class="song-meta-jyutping">${currentSong.lyricistJyutping}</div>
                    <div class="song-meta-text">填词：${currentSong.lyricist}</div>
                </div>
                <div class="song-meta-item">
                    <div class="song-meta-jyutping">${currentSong.composerJyutping}</div>
                    <div class="song-meta-text">作曲：${currentSong.composer}</div>
                </div>
            </div>
        `;
        renderLyrics();
        window.scrollTo(0, 0);
    }

    function renderLyrics() {
        if (!currentSong) return;
        const size = fontSizes[fontLevel];
        document.getElementById('lyricsBody').innerHTML = currentSong.sections.map(section => `
            <div class="lyric-section">
                <div class="lyric-section-label">${section.label}</div>
                ${section.lines.map(line => `
                    <div class="lyric-line">
                        <div class="lyric-speaker">🔊</div>
                        <div class="lyric-content">
                            <div class="lyric-jyutping" style="font-size:${size.jyutping}px">${line.jyutping}</div>
                            <div class="lyric-chinese" style="font-size:${size.chinese}px">${line.chinese}</div>
                        </div>
                    </div>
                `).join('')}
            </div>
        `).join('');
    }

    function goBack() {
        document.getElementById('lyricsPage').classList.remove('active');
        document.getElementById('songListPage').classList.remove('hidden');
        document.getElementById('backBtn').style.display = 'none';
        document.getElementById('headerTitle').textContent = '粤拼歌词';
        currentSong = null;
        window.scrollTo(0, 0);
    }

    function toggleFavorite() {
        if (!currentSong) return;
        const idx = favorites.indexOf(currentSong.id);
        if (idx > -1) favorites.splice(idx, 1);
        else favorites.push(currentSong.id);
        localStorage.setItem('jyutping_favs', JSON.stringify(favorites));
        updateFavIcon();
        showToast(favorites.includes(currentSong.id) ? '已收藏 ⭐' : '已取消收藏');
    }

    function updateFavIcon() {
        if (!currentSong) return;
        const icon = document.getElementById('favIcon');
        const isFav = favorites.includes(currentSong.id);
        icon.textContent = isFav ? '★' : '☆';
        icon.style.color = isFav ? '#FFD700' : '';
    }

    function toggleFontSize() {
        fontLevel = (fontLevel + 1) % fontSizes.length;
        renderLyrics();
        showToast('字号：' + ['标准', '大', '特大'][fontLevel]);
    }

    function shareSong() {
        if (!currentSong) return;
        const text = `🎵 ${currentSong.title} - ${currentSong.artist}\n\n` +
            currentSong.sections.map(s => `【${s.label}】\n` + s.lines.map(l => `${l.jyutping}\n${l.chinese}`).join('\n')).join('\n\n');
        if (navigator.clipboard) {
            navigator.clipboard.writeText(text).then(() => showToast('歌词已复制到剪贴板 📋'));
        } else {
            showToast('浏览器不支持复制');
        }
    }

    function showToast(msg) {
        const existing = document.querySelector('.toast');
        if (existing) existing.remove();
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    initFilterTabs();
    renderSongList();
    </script>
</body>
</html>
