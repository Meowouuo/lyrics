<!DOCTYPE html>
<!-- ==================== HTML 文档声明 ==================== -->
<!-- 粤拼歌词投稿页面 - 用于用户提交新歌、粤拼纠错、歌词纠错和删除歌曲请求 -->
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 视口设置：确保在移动设备上正确显示 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>投稿 - 粤拼歌词</title>

    <!-- ==================== CSS 样式区域 ==================== -->
    <!-- 包含：全局重置、页面布局、标签页、表单、按钮、纠错行、面板切换等样式 -->
    <style>
        /* ===== 全局重置样式 ===== */
        /* 清除所有元素的默认margin和padding，使用border-box盒模型 */
        /* border-box确保元素的padding和border不会增加其总宽度 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ===== 页面基础样式 ===== */
        /* 设置全局字体、背景色、文字颜色和最小高度 */
        body {
            /* 使用系统字体栈，确保跨平台一致性 */
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;  /* 浅灰色背景，提升视觉层次 */
            color: #333;          /* 深灰色文字，保证可读性 */
            min-height: 100vh;    /* 最小高度占满视口 */
        }

        /* ===== 页面头部样式 ===== */
        /* 顶部固定区域，包含页面标题和返回链接 */
        .header {
            background: #fff;                    /* 白色背景，与页面主体区分 */
            padding: 16px 20px;                  /* 内边距，提供呼吸空间 */
            border-bottom: 1px solid #e8e8e8;    /* 底部细线分隔 */
            text-align: center;                  /* 文字居中 */
        }
        /* 头部标题样式 */
        .header h1 {
            font-size: 18px;     /* 主标题字号 */
            font-weight: 600;    /* 加粗强调 */
        }
        /* 头部链接样式（返回按钮） */
        .header a {
            color: #1890ff;      /* 链接使用主题蓝色 */
            text-decoration: none; /* 移除下划线 */
            font-size: 13px;     /* 较小字号作为辅助信息 */
        }

        /* ===== 主容器样式 ===== */
        /* 居中容器，限制最大宽度，适配不同屏幕 */
        .container {
            max-width: 600px;        /* 最大宽度600px，适配大屏 */
            margin: 20px auto;       /* 水平居中 */
            padding: 0 16px;         /* 左右内边距 */
        }

        /* ===== 标签页切换样式 ===== */
        /* 四个功能标签的水平排列布局 */
        /* 使用flex:1实现等宽分配，确保各标签大小一致 */
        .tabs {
            display: flex;               /* flexbox布局实现水平排列 */
            gap: 8px;                     /* 标签之间8px间距 */
            margin-bottom: 20px;         /* 与下方内容的间距 */
        }
        /* 单个标签按钮样式 */
        .tab {
            flex: 1;                     /* 每个标签等宽分配空间 */
            padding: 10px;               /* 内边距增加可点击区域 */
            border: 1px solid #d9d9d9;   /* 边框定义轮廓 */
            background: #fff;            /* 白色背景 */
            border-radius: 8px;          /* 圆角，现代化风格 */
            text-align: center;          /* 文字居中 */
            cursor: pointer;              /* 手型光标，提示可点击 */
            font-size: 14px;             /* 标签文字大小 */
            transition: all 0.2s;        /* 过渡动画，状态变化更平滑 */
        }
        /* 激活状态的标签页 - 高亮选中项 */
        .tab.active {
            border-color: #1890ff;       /* 蓝色边框强调 */
            color: #1890ff;              /* 蓝色文字 */
            background: #e6f7ff;         /* 淡蓝色背景 */
        }
        /* 悬停效果 - 提示用户可交互 */
        .tab:hover {
            border-color: #1890ff;       /* 悬停时显示蓝色边框 */
        }

        /* ===== 表单卡片样式 ===== */
        /* 白色圆角卡片，承载每个面板的表单内容 */
        /* 使用box-shadow营造轻微浮起效果，增强视觉层次感 */
        .form-card {
            background: #fff;                     /* 白色卡片背景 */
            border-radius: 12px;                  /* 较大圆角，柔和感 */
            padding: 24px;                         /* 内边距，内容不拥挤 */
            box-shadow: 0 1px 4px rgba(0,0,0,0.08); /* 细微阴影，增加层次 */
        }

        /* ===== 表单组样式 ===== */
        /* 每个表单输入项的容器，包含标签、输入框和提示文字 */
        /* 通过margin-bottom控制各表单项之间的垂直间距 */
        .form-group {
            margin-bottom: 16px;    /* 表单项之间的垂直间距 */
        }
        /* 表单标签样式 */
        .form-group label {
            display: block;                    /* 块级显示，独占一行 */
            font-size: 14px;                   /* 标签字号 */
            font-weight: 500;                 /* 中等粗细 */
            margin-bottom: 6px;                /* 与输入框的间距 */
            color: #555;                       /* 次要灰色 */
        }
        /* 必填项标记 - 红色星号提示 */
        .form-group label .required {
            color: #ff4d4f;   /* 红色，醒目提示 */
        }
        /* 输入框通用样式 - 统一样式 */
        .form-group input,
        .form-group textarea {
            width: 100%;                       /* 全宽适配 */
            padding: 10px 12px;               /* 内边距，增加可点击区域 */
            border: 1px solid #d9d9d9;         /* 边框定义轮廓 */
            border-radius: 6px;               /* 圆角，现代化 */
            font-size: 14px;                  /* 文字大小 */
            transition: border-color 0.2s;    /* 聚焦时边框颜色过渡 */
            font-family: inherit;              /* 继承页面字体 */
        }
        /* 输入框聚焦状态 - 高亮当前编辑项 */
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;                                        /* 移除默认轮廓 */
            border-color: #1890ff;                                /* 蓝色边框 */
            box-shadow: 0 0 0 2px rgba(24,144,255,0.1);          /* 蓝色光晕效果 */
        }
        /* 文本域特殊样式 - 多行输入 */
        .form-group textarea {
            min-height: 200px;   /* 最小高度，确保足够输入空间 */
            resize: vertical;    /* 仅允许垂直调整大小 */
        }
        /* 提示文字样式 - 灰色辅助说明 */
        .form-group .hint {
            font-size: 12px;     /* 较小字号 */
            color: #999;         /* 灰色，不喧宾夺主 */
            margin-top: 4px;     /* 与输入框的间距 */
        }

        /* ===== 提交按钮样式 ===== */
        /* 全宽蓝色按钮，用于各面板的提交操作 */
        .submit-btn {
            width: 100%;                    /* 全宽按钮 */
            padding: 12px;                   /* 内边距，增加点击区域 */
            background: #1890ff;             /* 蓝色背景 */
            color: #fff;                     /* 白色文字 */
            border: none;                     /* 无边框 */
            border-radius: 6px;               /* 圆角 */
            font-size: 16px;                 /* 较大字号，强调重要性 */
            cursor: pointer;                  /* 手型光标 */
            transition: background 0.2s;     /* 悬停效果过渡 */
        }
        /* 悬停效果 - 颜色变浅提示 */
        .submit-btn:hover {
            background: #40a9ff;
        }
        /* 禁用状态的按钮 - 灰色不可点击 */
        .submit-btn:disabled {
            background: #d9d9d9;     /* 灰色背景 */
            cursor: not-allowed;     /* 禁止光标 */
        }

        /* ===== 结果提示样式 ===== */
        /* 操作结果反馈区域，支持成功（绿色）和错误（红色）两种状态 */
        /* 默认隐藏，仅在表单提交完成后由JS动态显示 */
        .result {
            margin-top: 16px;          /* 与上方按钮的间距 */
            padding: 16px;            /* 内边距 */
            border-radius: 8px;        /* 圆角 */
            display: none;             /* 默认隐藏，由JS控制显示 */
        }
        /* 成功提示 - 绿色主题 */
        .result.success {
            display: block;                      /* 显示 */
            background: #f6ffed;                  /* 浅绿色背景 */
            border: 1px solid #b7eb8f;           /* 绿色边框 */
            color: #52c41a;                       /* 绿色文字 */
        }
        /* 错误提示 - 红色主题 */
        .result.error {
            display: block;                       /* 显示 */
            background: #fff2f0;                  /* 浅红色背景 */
            border: 1px solid #ffccc7;            /* 红色边框 */
            color: #ff4d4f;                       /* 红色文字 */
        }
        /* 结果中的链接样式 */
        .result a {
            color: #1890ff;       /* 蓝色链接 */
            text-decoration: none; /* 无下划线 */
        }

        /* ===== 纠错行样式（用于粤拼纠错和歌词纠错） ===== */
        /* 每行纠错数据的水平排列布局，包含多个输入框和删除按钮 */
        /* 采用flexbox布局实现各列等宽分配，最后一列为固定宽度的删除按钮 */
        .correction-row {
            display: flex;                      /* 水平布局 */
            gap: 8px;                            /* 子元素间距 */
            margin-bottom: 8px;                  /* 行之间间距 */
            align-items: center;                 /* 垂直居中对齐 */
        }
        /* 纠错行内的输入框样式 */
        .correction-row input {
            flex: 1;                             /* 等宽分配空间 */
            padding: 8px;                        /* 内边距 */
            border: 1px solid #d9d9d9;           /* 边框 */
            border-radius: 4px;                  /* 圆角 */
            font-size: 13px;                     /* 较小字号，紧凑布局 */
        }
        /* 聚焦状态 */
        .correction-row input:focus {
            outline: none;                    /* 移除默认轮廓 */
            border-color: #1890ff;            /* 蓝色边框 */
        }
        /* 删除按钮 - 红色警示色 */
        /* 使用flex-shrink:0确保按钮宽度不被压缩，始终保持可点击区域 */
        .correction-row .remove-btn {
            width: 28px;              /* 固定宽度 */
            height: 28px;             /* 固定高度 */
            border: none;              /* 无边框 */
            background: #ff4d4f;      /* 红色背景 */
            color: #fff;               /* 白色文字 */
            border-radius: 4px;        /* 圆角 */
            cursor: pointer;           /* 手型光标 */
            font-size: 16px;           /* 放大符号 */
            flex-shrink: 0;            /* 不允许压缩 */
        }

        /* ===== 添加行按钮样式 ===== */
        /* 虚线边框按钮，用于动态添加纠错行 */
        /* 使用dashed边框与实线输入框区分，提示用户此处可交互添加 */
        .add-row-btn {
            padding: 6px 16px;              /* 内边距 */
            border: 1px dashed #d9d9d9;      /* 虚线边框，提示可添加 */
            background: #fff;               /* 白色背景 */
            border-radius: 4px;             /* 圆角 */
            cursor: pointer;                 /* 手型光标 */
            font-size: 13px;                 /* 较小字号 */
            color: #666;                     /* 灰色文字 */
            width: 100%;                     /* 全宽 */
        }
        /* 悬停效果 - 变蓝色提示可点击 */
        .add-row-btn:hover {
            border-color: #1890ff;
            color: #1890ff;
        }

        /* ===== 面板切换样式 ===== */
        /* 控制四个功能面板的显示/隐藏 */
        /* 通过CSS类名.active控制display属性，JS负责切换类名 */
        .panel {
            display: none;      /* 默认隐藏所有面板 */
        }
        /* 激活的面板 - 显示当前选中的面板 */
        .panel.active {
            display: block;     /* 块级显示 */
        }
    </style>
</head>

<!-- ==================== HTML 主体内容 ==================== -->
<body>
    <!-- 页面头部：标题和返回链接 -->
    <div class="header">
        <h1>🎵 粤拼歌词投稿</h1>
        <a href="./">← 返回歌词列表</a>
    </div>

    <!-- 主容器：包含标签页导航和所有功能面板 -->
    <div class="container">
        <!-- ===== 标签页导航 ===== -->
        <!-- 四个功能标签：投稿新歌、粤拼纠错、歌词纠错、删除歌曲 -->
        <div class="tabs">
            <!-- 每个tab通过onclick调用switchTab切换对应面板 -->
            <div class="tab active" onclick="switchTab('new-song')">📝 投稿新歌</div>
            <div class="tab" onclick="switchTab('jyutping')">✏️ 粤拼纠错</div>
            <div class="tab" onclick="switchTab('lyrics')">📝 歌词纠错</div>
            <div class="tab" onclick="switchTab('delete')">🗑️ 删除歌曲</div>
        </div>

        <!-- ===== 面板1：投稿新歌 ===== -->
        <!-- 用户提交新歌的完整信息，包括歌曲名、歌手、歌词等 -->
        <div class="panel active" id="panel-new-song">
            <div class="form-card">
                <!-- 歌曲名称输入 - 必填 -->
                <div class="form-group">
                    <label>歌曲名称 <span class="required">*</span></label>
                    <input type="text" id="ns-title" placeholder="例如：喜欢你">
                </div>
                <!-- 歌手输入 - 必填，支持多人合唱用/分隔 -->
                <div class="form-group">
                    <label>歌手 <span class="required">*</span></label>
                    <input type="text" id="ns-artist" placeholder="例如：Beyond（合唱用 / 分隔）">
                </div>
                <!-- 填词人输入 - 选填 -->
                <div class="form-group">
                    <label>填词</label>
                    <input type="text" id="ns-lyricist" placeholder="填词人（选填）">
                </div>
                <!-- 作曲人输入 - 选填 -->
                <div class="form-group">
                    <label>作曲</label>
                    <input type="text" id="ns-composer" placeholder="作曲人（选填）">
                </div>
                <!-- 完整歌词输入 - 必填，支持格式说明 -->
                <div class="form-group">
                    <label>完整歌词 <span class="required">*</span></label>
                    <textarea id="ns-lyrics" placeholder="请粘贴完整歌词&#10;&#10;换行 = 新的一句歌词&#10;空一行 = 段落分隔"></textarea>
                    <div class="hint">换行表示新的一句歌词，空一行表示段落分隔</div>
                </div>
                <!-- 提交按钮 - 调用submitNewSong函数 -->
                <button class="submit-btn" onclick="submitNewSong()">提交投稿</button>
                <!-- 结果显示区域 - 动态更新 -->
                <div class="result" id="ns-result"></div>
            </div>
        </div>

        <!-- ===== 面板2：粤拼纠错 ===== -->
        <!-- 用户提交粤拼拼写错误的纠正 -->
        <div class="panel" id="panel-jyutping">
            <div class="form-card">
                <!-- 歌曲名称输入 - 必填，用于定位歌曲 -->
                <div class="form-group">
                    <label>歌曲名称 <span class="required">*</span></label>
                    <input type="text" id="jp-song" placeholder="例如：喜欢你">
                </div>
                <!-- 纠错内容输入区 - 动态表格 -->
                <div class="form-group">
                    <label>纠错内容 <span class="required">*</span></label>
                    <!-- 表头行 - 固定显示，提示用户各列含义 -->
                    <div class="correction-row" style="font-weight:500;font-size:12px;color:#999;">
                        <input placeholder="行号" style="flex:0.5;">
                        <input placeholder="字">
                        <input placeholder="原粤拼">
                        <input placeholder="正确粤拼">
                        <div style="width:28px;"></div>
                    </div>
                    <!-- 动态添加的纠错行容器 - JS动态填充 -->
                    <div id="jp-rows"></div>
                    <!-- 添加行按钮 - 调用addJpRow函数 -->
                    <button class="add-row-btn" onclick="addJpRow()">+ 添加一行</button>
                    <div class="hint">请先在歌词页面找到需要纠错的行号</div>
                </div>
                <!-- 提交按钮 - 调用submitJyutpingCorrection函数 -->
                <button class="submit-btn" onclick="submitJyutpingCorrection()">提交纠错</button>
                <!-- 结果显示区域 -->
                <div class="result" id="jp-result"></div>
            </div>
        </div>

        <!-- ===== 面板3：歌词纠错 ===== -->
        <!-- 用户提交歌词文字错误的纠正，支持三种模式：逐行修改、整首替换、插入行 -->
        <div class="panel" id="panel-lyrics">
            <div class="form-card">
                <!-- 歌曲名称输入 - 必填 -->
                <div class="form-group">
                    <label>歌曲名称 <span class="required">*</span></label>
                    <input type="text" id="lc-song" placeholder="例如：喜欢你">
                </div>

                <!-- 纠错类型选择 - 三选一 -->
                <div class="form-group">
                    <label>纠错类型 <span class="required">*</span></label>
                    <div class="correction-type" style="display:flex;gap:10px;margin-bottom:15px;flex-wrap:wrap;">
                        <!-- 逐行修改选项 - 默认选中 -->
                        <label class="type-label active" id="type-line-label" onclick="selectCorrectionType('line')" style="display:flex;align-items:center;gap:5px;cursor:pointer;padding:8px 16px;border:2px solid #1890ff;border-radius:6px;background:#e6f7ff;white-space:nowrap;">
                            <input type="radio" name="correctionType" value="line" checked onchange="switchCorrectionType('line')" style="margin:0;">
                            <span>逐行修改</span>
                        </label>
                        <!-- 整首替换选项 -->
                        <label class="type-label" id="type-full-label" onclick="selectCorrectionType('full')" style="display:flex;align-items:center;gap:5px;cursor:pointer;padding:8px 16px;border:2px solid #e0e0e0;border-radius:6px;white-space:nowrap;">
                            <input type="radio" name="correctionType" value="full" onchange="switchCorrectionType('full')" style="margin:0;">
                            <span>整首替换</span>
                        </label>
                        <!-- 插入行选项 -->
                        <label class="type-label" id="type-insert-label" onclick="selectCorrectionType('insert')" style="display:flex;align-items:center;gap:5px;cursor:pointer;padding:8px 16px;border:2px solid #e0e0e0;border-radius:6px;white-space:nowrap;">
                            <input type="radio" name="correctionType" value="insert" onchange="switchCorrectionType('insert')" style="margin:0;">
                            <span>插入行</span>
                        </label>
                    </div>
                </div>

                <!-- 逐行修改区域 - 默认显示 -->
                <div id="correction-line" class="correction-section">
                    <div class="form-group">
                        <label>纠错内容</label>
                        <!-- 表头行 - 提示用户输入行号、原歌词和正确歌词 -->
                        <div class="correction-row" style="font-weight:500;font-size:12px;color:#999;">
                            <input placeholder="行号" style="flex:0.5;">
                            <input placeholder="原歌词" style="flex:1;">
                            <input placeholder="正确歌词" style="flex:1;">
                            <div style="width:28px;"></div>
                        </div>
                        <!-- 动态添加的纠错行容器 -->
                        <div id="lc-rows"></div>
                        <!-- 添加行按钮 - 调用addLcRow函数 -->
                        <button class="add-row-btn" onclick="addLcRow()">+ 添加一行</button>
                        <div class="hint">请先在歌词页面找到需要纠错的行号</div>
                    </div>
                </div>

                <!-- 整首替换区域 - 默认隐藏 -->
                <div id="correction-full" class="correction-section" style="display:none;">
                    <div class="form-group">
                        <label>完整歌词 <span class="required">*</span></label>
                        <!-- 大文本域，用于粘贴完整替换歌词 -->
                        <textarea id="lc-full-lyrics" rows="15" placeholder="请粘贴完整的替换歌词&#10;&#10;格式说明：&#10;- 每句歌词单独一行&#10;- 段落之间空一行&#10;- 系统会自动匹配粤拼音标" style="width:100%;padding:12px;border:1px solid #d9d9d9;border-radius:6px;font-family:inherit;resize:vertical;"></textarea>
                        <div class="hint">此操作将完全替换原歌曲的所有歌词</div>
                    </div>
                </div>

                <!-- 插入行区域 - 默认隐藏 -->
                <div id="correction-insert" class="correction-section" style="display:none;">
                    <!-- 已添加的插入项列表 - 动态渲染 -->
                    <div id="lc-insert-list" style="margin-bottom:16px;"></div>
                    <!-- 手动添加区域 - 有预填充数据时隐藏 -->
                    <div id="lc-insert-manual">
                        <!-- 插入位置和行号选择 -->
                        <div class="form-group">
                            <label>添加新的插入</label>
                            <div style="display:flex;gap:10px;margin-bottom:10px;align-items:center;">
                                <!-- 插入位置选择 - 在某行前或后 -->
                                <select id="lc-insert-position" style="flex:1;padding:10px;border:1px solid #d9d9d9;border-radius:6px;background:#fff;">
                                    <option value="before">在第...行前插入</option>
                                    <option value="after">在第...行后插入</option>
                                </select>
                                <!-- 行号输入 - 指定插入位置 -->
                                <input type="number" id="lc-insert-line" placeholder="行号" min="1" style="flex:0.5;padding:10px;border:1px solid #d9d9d9;border-radius:6px;">
                            </div>
                        </div>
                        <!-- 插入歌词内容输入 -->
                        <div class="form-group">
                            <label>要插入的歌词 <span class="required">*</span></label>
                            <textarea id="lc-insert-lyrics" rows="4" placeholder="请粘贴要插入的歌词&#10;&#10;可以插入多行，每行一句" style="width:100%;padding:12px;border:1px solid #d9d9d9;border-radius:6px;font-family:inherit;resize:vertical;"></textarea>
                            <!-- 添加到列表按钮 - 调用addInsertItem函数 -->
                            <div style="margin-top:8px;">
                                <button type="button" onclick="addInsertItem()" style="padding:8px 16px;background:#28a745;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px;">+ 添加到列表</button>
                            </div>
                            <div class="hint">支持一次插入多行歌词，可多次添加不同位置的插入</div>
                        </div>
                    </div>
                </div>

                <!-- 提交按钮 - 调用submitLyricsCorrection函数 -->
                <button class="submit-btn" onclick="submitLyricsCorrection()">提交纠错</button>
                <!-- 结果显示区域 -->
                <div class="result" id="lc-result"></div>
            </div>
        </div>

        <!-- ===== 面板4：删除歌曲 ===== -->
        <!-- 用户申请删除歌曲（需管理员审核），歌曲列表从主页面传递 -->
        <div class="panel" id="panel-delete">
            <div class="form-card">
                <!-- 已选择的歌曲列表 -->
                <div class="form-group">
                    <label>要删除的歌曲列表</label>
                    <!-- 已选择的歌曲列表容器 - 动态渲染 -->
                    <div id="delete-list" style="min-height:100px;border:1px dashed #d9d9d9;border-radius:6px;padding:12px;margin-bottom:12px;">
                        <div style="color:#999;font-size:13px;">暂无选择的歌曲</div>
                    </div>
                    <div class="hint">请在主页面点击「管理」按钮选择要删除的歌曲</div>
                </div>
                <!-- 提交按钮 - 调用submitDeleteRequest函数 -->
                <button class="submit-btn" onclick="submitDeleteRequest()">提交删除请求</button>
                <!-- 结果显示区域 -->
                <div class="result" id="del-result"></div>
            </div>
        </div>
    </div>

    <!-- ==================== JavaScript 代码区域 ==================== -->
    <!-- 包含：标签页切换、表单提交、动态行管理、数据加载等功能 -->
    <!-- 所有异步提交函数均使用 async/await 模式，统一错误处理和按钮状态管理 -->
    <script>
        // ===== 全局配置 =====

        /**
         * Worker URL - Cloudflare Workers 后端接口地址
         * 负责接收表单数据并创建 GitHub Issue
         * 部署后替换为实际Workers域名
         * 所有表单提交均通过此URL统一转发，后端根据type字段区分请求类型
         */
        const WORKER_URL = 'https://lyrics-submit.floral-term-5139.workers.dev';

        // ===== 标签页切换功能 =====

        /**
         * 切换标签页显示
         * @description 根据传入的tab标识符切换对应的功能面板，同时更新标签按钮的激活状态
         * @param {string} tab - 要切换到的标签页标识
         *   - 'new-song': 投稿新歌
         *   - 'jyutping': 粤拼纠错
         *   - 'lyrics': 歌词纠错
         *   - 'delete': 删除歌曲
         */
        function switchTab(tab) {
            // 更新标签按钮的激活状态
            // 使用forEach遍历，通过索引匹配对应的tab名称
            const tabNames = ['new-song', 'jyutping', 'lyrics', 'delete']; // 标签页名称数组，与HTML中tab顺序一一对应
            document.querySelectorAll('.tab').forEach((t, i) => {
                // toggle方法：匹配时添加active类，不匹配时移除
                t.classList.toggle('active', tabNames[i] === tab);
            });

            // 隐藏所有面板 - 先统一移除active类
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));

            // 显示目标面板 - 通过ID查找并添加active类
            document.getElementById('panel-' + tab).classList.add('active');
        }

        // ===== 结果显示功能 =====

        /**
         * 显示操作结果提示
         * @description 根据操作结果显示成功或错误提示信息
         *   成功时显示绿色背景的提示框，失败时显示红色背景的提示框
         * @param {string} id - 结果容器的元素ID（如 'ns-result', 'jp-result'）
         * @param {boolean} success - 是否成功（true=成功, false=失败）
         * @param {string} message - 要显示的HTML消息内容（支持HTML标签，可包含链接）
         */
        function showResult(id, success, message) {
            const el = document.getElementById(id);
            // 动态设置class，success显示绿色，error显示红色
            el.className = 'result ' + (success ? 'success' : 'error');
            // 支持HTML格式，可包含链接等元素
            el.innerHTML = message;
        }

        // ===== 投稿新歌功能 =====

        /**
         * 提交新歌投稿
         * @description 收集表单数据，验证必填项，通过API提交到后端创建GitHub Issue
         * @returns {Promise<void>} 异步操作，完成后显示结果
         */
        async function submitNewSong() {
            // 获取表单数据 - 使用trim()去除首尾空格
            const title = document.getElementById('ns-title').value.trim();
            const artist = document.getElementById('ns-artist').value.trim();
            const lyricist = document.getElementById('ns-lyricist').value.trim();
            const composer = document.getElementById('ns-composer').value.trim();
            const lyrics = document.getElementById('ns-lyrics').value.trim();

            // 验证必填项 - title, artist, lyrics 为必须
            if (!title || !artist || !lyrics) {
                showResult('ns-result', false, '请填写歌曲名称、歌手和歌词');
                return;  // 终止提交，避免发送不完整数据
            }

            // 获取提交按钮并设置加载状态
            // 防止用户重复点击提交
            const btn = document.querySelector('#panel-new-song .submit-btn');
            btn.disabled = true;
            btn.textContent = '提交中...';

            try {
                // 发送POST请求到Worker后端
                // 使用JSON格式传输数据，后端解析后创建对应类型的GitHub Issue
                const res = await fetch(WORKER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    // 构造请求体，包含type标识请求类型
                    body: JSON.stringify({
                        type: 'new-song',
                        title,
                        artist,
                        lyricist,   // 选填字段，为空时传空字符串
                        composer,   // 选填字段，为空时传空字符串
                        lyrics
                    }),
                });

                // 解析JSON响应
                const data = await res.json();

                // 根据响应显示结果
                if (data.success) {
                    // 成功时显示Issue链接，供用户追踪处理进度
                    showResult('ns-result', true, `✅ 提交成功！已创建 <a href="${data.issueUrl}" target="_blank">Issue #${data.issueNumber}</a>，请等待管理员处理。`);
                } else {
                    // 失败时显示后端返回的错误原因
                    showResult('ns-result', false, `❌ 提交失败：${data.error}`);
                }
            } catch (e) {
                // 网络错误处理 - fetch失败或JSON解析失败
                console.error('提交新歌失败:', e);
                showResult('ns-result', false, '❌ 网络错误，请稍后重试');
            } finally {
                // 只有失败时才恢复按钮，成功时保持禁用并显示"已提交"
                if (!data || !data.success) {
                    btn.disabled = false;
                    btn.textContent = '提交投稿';
                } else {
                    btn.textContent = '✓ 已提交';
                }
            }
        }

        // ===== 粤拼纠错功能 =====

        /**
         * 添加一行粤拼纠错输入行
         * @description 动态创建包含行号、字、原粤拼、正确粤拼的输入行
         *   每次调用在容器末尾追加一行新的输入区域
         */
        function addJpRow() {
            // 获取纠错行容器
            const container = document.getElementById('jp-rows');
            // 创建新的div元素作为行容器
            const row = document.createElement('div');
            row.className = 'correction-row';

            // 创建输入行HTML，包含4个输入框和1个删除按钮
            // 每列通过class标识（jp-line/jp-char/jp-original/jp-new），方便后续数据收集
            // 删除按钮使用this.parentElement.remove()直接移除当前行
            row.innerHTML = `
                <input placeholder="行号" class="jp-line">
                <input placeholder="字" class="jp-char">
                <input placeholder="原粤拼" class="jp-original">
                <input placeholder="正确粤拼" class="jp-new">
                <button class="remove-btn" onclick="this.parentElement.remove()">×</button>
            `;
            // 将新行追加到容器末尾
            container.appendChild(row);
        }

        /**
         * 提交粤拼纠错请求
         * @description 收集所有纠错行数据，验证后提交到后端
         *   后端会将纠错数据整理成格式化的Issue提交到GitHub仓库
         * @returns {Promise<void>}
         */
        async function submitJyutpingCorrection() {
            // 获取歌曲名称 - 用于定位要纠错的歌曲
            const songName = document.getElementById('jp-song').value.trim();

            // 验证必填项 - 歌曲名称不能为空
            if (!songName) {
                showResult('jp-result', false, '请填写歌曲名称');
                return;
            }

            // 收集所有纠错行数据
            // 使用querySelectorAll获取所有纠错行DOM元素，逐行提取输入值
            const rows = document.querySelectorAll('#jp-rows .correction-row');
            const corrections = []; // 纠错数据数组，每个元素包含行号、字、原粤拼、正确粤拼

            // 遍历每一行，提取各列数据
            // 使用可选链操作符(?.)防止DOM元素不存在时报错
            rows.forEach(row => {
                // 使用class选择器获取各列的值
                const line = row.querySelector('.jp-line')?.value.trim();
                const char = row.querySelector('.jp-char')?.value.trim();
                const originalJp = row.querySelector('.jp-original')?.value.trim();
                const newJp = row.querySelector('.jp-new')?.value.trim();

                // 只添加有行号和正确粤拼的数据（行号和纠错结果是必填）
                if (line && newJp) {
                    corrections.push({ line, char, originalJp, newJp });
                }
            });

            // 验证至少有一行纠错数据
            if (corrections.length === 0) {
                showResult('jp-result', false, '请至少添加一行纠错');
                return;
            }

            // 设置按钮加载状态，防止重复提交
            const btn = document.querySelector('#panel-jyutping .submit-btn');
            btn.disabled = true;
            btn.textContent = '提交中...';

            try {
                // 发送POST请求，type标识为粤拼纠错
                const res = await fetch(WORKER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        type: 'jyutping-correction',
                        songName,
                        corrections  // 纠错数据数组
                    }),
                });
                const data = await res.json();

                // 根据响应结果显示成功或失败
                if (data.success) {
                    showResult('jp-result', true, `✅ 提交成功！已创建 <a href="${data.issueUrl}" target="_blank">Issue #${data.issueNumber}</a>，请等待管理员处理。`);
                } else {
                    showResult('jp-result', false, `❌ 提交失败：${data.error}`);
                }
            } catch (e) {
                // 网络错误处理
                console.error('提交粤拼纠错失败:', e);
                showResult('jp-result', false, '❌ 网络错误，请稍后重试');
            } finally {
                // 只有失败时才恢复按钮，成功时保持禁用并显示"已提交"
                if (!data || !data.success) {
                    btn.disabled = false;
                    btn.textContent = '提交纠错';
                } else {
                    btn.textContent = '✓ 已提交';
                    // 保持 disabled = true
                }
            }
        }

        // ===== 歌词纠错功能 =====

        /**
         * 选择纠错类型（更新样式）
         * @description 高亮选中项的视觉效果
         * @param {string} type - 纠错类型
         *   - 'line': 逐行修改
         *   - 'full': 整首替换
         *   - 'insert': 插入行
         */
        function selectCorrectionType(type) {
            // 重置所有选项的样式 - 移除蓝色高亮
            document.querySelectorAll('.type-label').forEach(label => {
                label.style.borderColor = '#e0e0e0';   // 恢复灰色边框
                label.style.background = '#fff';        // 恢复白色背景
                label.classList.remove('active');        // 移除激活状态
            });

            // 高亮选中的类型 - 设置蓝色边框和淡蓝色背景
            const selectedLabel = document.getElementById('type-' + type + '-label');
            selectedLabel.style.borderColor = '#1890ff';
            selectedLabel.style.background = '#e6f7ff';
            selectedLabel.classList.add('active');
        }

        /**
         * 切换纠错类型（显示对应输入区域）
         * @description 根据选择的类型显示/隐藏对应的输入面板
         * @param {string} type - 纠错类型
         */
        function switchCorrectionType(type) {
            // 隐藏所有纠错区域 - 先统一隐藏
            document.querySelectorAll('.correction-section').forEach(section => {
                section.style.display = 'none';
            });

            // 显示选中的区域 - 通过ID匹配显示对应面板
            document.getElementById('correction-' + type).style.display = 'block';

            // 同步更新选中样式（高亮当前选中的类型按钮）
            selectCorrectionType(type);
        }

        /**
         * 添加一行歌词纠错输入行
         * @description 用于逐行修改模式，与addJpRow类似但列名不同
         *   包含行号、原歌词、正确歌词三列输入框
         */
        function addLcRow() {
            // 获取歌词纠错行容器
            const container = document.getElementById('lc-rows');
            // 创建新的纠错行元素
            const row = document.createElement('div');
            row.className = 'correction-row';

            // 创建包含行号、原歌词、正确歌词的输入行
            // 与addJpRow类似但列名不同（lc-line/lc-original/lc-new）
            row.innerHTML = `
                <input placeholder="行号" class="lc-line">
                <input placeholder="原歌词" class="lc-original">
                <input placeholder="正确歌词" class="lc-new">
                <button class="remove-btn" onclick="this.parentElement.remove()">×</button>
            `;
            // 将新行追加到容器末尾
            container.appendChild(row);
        }

        /**
         * 提交歌词纠错请求
         * @description 根据选择的纠错类型收集数据并提交
         *   支持三种纠错模式：逐行修改(line)、整首替换(full)、插入行(insert)
         * @returns {Promise<void>}
         */
        async function submitLyricsCorrection() {
            // 获取歌曲名称
            const songName = document.getElementById('lc-song').value.trim();

            // 验证必填项 - 歌曲名称不能为空
            if (!songName) {
                showResult('lc-result', false, '请填写歌曲名称');
                return;
            }

            // 获取选中的纠错类型（通过radio按钮的checked状态）
            // correctionType的值决定了后续数据收集逻辑和数据结构
            const correctionType = document.querySelector('input[name="correctionType"]:checked').value;

            // 初始化payload基本结构 - 包含请求类型和歌曲名
            // payload对象会根据correctionType动态添加不同的数据字段
            let payload = {
                type: 'lyrics-correction',
                songName,
                correctionType
            };

            // 根据纠错类型收集不同的数据
            if (correctionType === 'line') {
                // 逐行修改模式：收集所有纠错行数据
                const rows = document.querySelectorAll('#lc-rows .correction-row');
                const corrections = [];

                rows.forEach(row => {
                    const line = row.querySelector('.lc-line')?.value.trim();
                    const originalText = row.querySelector('.lc-original')?.value.trim();
                    const newText = row.querySelector('.lc-new')?.value.trim();

                    // 至少需要行号和正确歌词
                    if (line && newText) {
                        corrections.push({ line, originalText, newText });
                    }
                });

                // 验证至少有一行纠错数据
                if (corrections.length === 0) {
                    showResult('lc-result', false, '请至少添加一行纠错');
                    return;
                }
                payload.corrections = corrections;

            } else if (correctionType === 'full') {
                // 整首替换模式：获取完整替换歌词
                const fullLyrics = document.getElementById('lc-full-lyrics').value.trim();
                if (!fullLyrics) {
                    showResult('lc-result', false, '请填写完整歌词');
                    return;
                }
                payload.fullLyrics = fullLyrics;

            } else if (correctionType === 'insert') {
                // 插入行模式：收集所有插入项
                if (insertItems.length === 0) {
                    showResult('lc-result', false, '请至少添加一个插入项');
                    return;
                }
                payload.insertions = insertItems;
            }

            // 设置按钮加载状态，防止重复提交
            const btn = document.querySelector('#panel-lyrics .submit-btn');
            btn.disabled = true;
            btn.textContent = '提交中...';

            try {
                // 发送POST请求，payload根据纠错类型包含不同数据
                const res = await fetch(WORKER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });
                const data = await res.json();

                // 根据响应结果显示成功或失败
                if (data.success) {
                    showResult('lc-result', true, `✅ 提交成功！已创建 <a href="${data.issueUrl}" target="_blank">Issue #${data.issueNumber}</a>，请等待管理员处理。`);
                } else {
                    showResult('lc-result', false, `❌ 提交失败：${data.error}`);
                }
            } catch (e) {
                // 网络错误处理
                console.error('提交歌词纠错失败:', e);
                showResult('lc-result', false, '❌ 网络错误，请稍后重试');
            } finally {
                // 只有失败时才恢复按钮，成功时保持禁用并显示"已提交"
                if (!data || !data.success) {
                    btn.disabled = false;
                    btn.textContent = '提交纠错';
                } else {
                    btn.textContent = '✓ 已提交';
                    // 保持 disabled = true
                }
            }
        }

        // ===== 插入行功能 =====

        /**
         * 存储所有插入项的数组
         * @description 用于收集用户添加的多个插入项
         *   每个元素包含 position（插入位置）、line（行号）、lyrics（歌词内容）
         */
        let insertItems = [];

        /**
         * 添加插入项到列表
         * @description 从输入框获取位置、行号和歌词，添加到insertItems数组
         *   添加后自动清空歌词输入框，保留位置和行号方便连续添加
         */
        function addInsertItem() {
            // 获取表单数据：插入位置（before/after）
            // position决定新歌词插入到目标行的前方还是后方
            const position = document.getElementById('lc-insert-position').value;
            // 解析行号为整数，默认为1（无效输入时回退到第1行）
            const line = parseInt(document.getElementById('lc-insert-line').value) || 1;
            // 获取要插入的歌词内容
            const lyrics = document.getElementById('lc-insert-lyrics').value;

            // 验证歌词不为空
            if (!lyrics) {
                alert('请填写要插入的歌词或空行');
                return;
            }

            // 添加到全局insertItems数组
            insertItems.push({ position, line, lyrics });

            // 重新渲染列表显示，反映最新添加的项
            renderInsertList();

            // 清空歌词输入框（保留位置和行号，方便连续添加多个插入项）
            document.getElementById('lc-insert-lyrics').value = '';
        }

        /**
         * 渲染插入项列表
         * @description 显示所有已添加的插入项，并提供删除功能
         *   当列表为空时显示手动输入区域，有数据时隐藏手动输入区域
         */
        function renderInsertList() {
            // 获取插入项列表容器和手动输入区域
            const container = document.getElementById('lc-insert-list');
            const manualArea = document.getElementById('lc-insert-manual');

            // 如果没有插入项，显示提示并显示手动输入区域
            if (insertItems.length === 0) {
                container.innerHTML = '<div style="color:#999;font-size:13px;">暂无插入项</div>';
                if (manualArea) manualArea.style.display = 'block';
                return;
            }

            // 有插入项时隐藏手动输入区域（简化界面，避免混淆）
            if (manualArea) manualArea.style.display = 'none';

            // 渲染插入项列表
            // 每个插入项显示位置信息（行号+前/后）和歌词预览（最多30字）
            // 超过30字的歌词截断并显示省略号
            // 使用Array.map()将数据数组转换为HTML字符串，再用join('')合并
            container.innerHTML = insertItems.map((item, i) => `
                <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;margin-bottom:8px;background:#f5f5f5;border-radius:6px;">
                    <div>
                        <span style="font-weight:500;">在第${item.line}行${item.position === 'before' ? '前' : '后'}插入：</span>
                        <span style="color:#666;">${item.lyrics.substring(0, 30)}${item.lyrics.length > 30 ? '...' : ''}</span>
                    </div>
                    <button onclick="removeInsertItem(${i})" style="border:none;background:#ff4d4f;color:#fff;padding:2px 8px;border-radius:4px;cursor:pointer;">移除</button>
                </div>
            `).join('');
        }

        /**
         * 移除指定索引的插入项
         * @param {number} index - 要移除的插入项索引
         */
        function removeInsertItem(index) {
            // 从数组中移除指定索引的项（splice会修改原数组）
            insertItems.splice(index, 1);
            // 重新渲染列表，更新显示
            renderInsertList();
            // renderInsertList会自动处理手动输入区域的显示/隐藏
        }

        // ===== 删除歌曲功能 =====

        /**
         * 存储要删除的歌曲列表
         * @description 接收从歌词列表页传递过来的待删除歌曲
         *   每个元素包含 title（歌曲名）和 artist（歌手名）属性
         */
        let deleteSongs = [];

        /**
         * 提交删除歌曲请求
         * @description 将deleteSongs数组提交到后端
         *   后端会创建删除请求的GitHub Issue，由管理员审核后执行删除
         * @returns {Promise<void>}
         */
        async function submitDeleteRequest() {
            // 验证至少选择了一首歌曲
            if (deleteSongs.length === 0) {
                showResult('del-result', false, '请选择要删除的歌曲');
                return;
            }

            // 设置按钮加载状态，防止重复提交
            const btn = document.querySelector('#panel-delete .submit-btn');
            btn.disabled = true;
            btn.textContent = '提交中...';

            try {
                // 发送POST请求，type标识为删除歌曲
                const res = await fetch(WORKER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        type: 'delete-song',
                        songs: deleteSongs  // 待删除歌曲数组
                    }),
                });
                const data = await res.json();

                // 根据响应结果显示成功或失败
                if (data.success) {
                    showResult('del-result', true, `✅ 提交成功！已创建 <a href="${data.issueUrl}" target="_blank">Issue #${data.issueNumber}</a>，请等待管理员处理。`);
                } else {
                    showResult('del-result', false, `❌ 提交失败：${data.error}`);
                }
            } catch (e) {
                // 网络错误处理
                console.error('提交删除请求失败:', e);
                showResult('del-result', false, '❌ 网络错误，请稍后重试');
            } finally {
                // 只有失败时才恢复按钮，成功时保持禁用并显示"已提交"
                if (!data || !data.success) {
                    btn.disabled = false;
                    btn.textContent = '提交删除请求';
                } else {
                    btn.textContent = '✓ 已提交';
                }
            }
        }

        /**
         * 渲染删除歌曲列表
         * @description 显示所有已选择的待删除歌曲
         *   每首歌曲显示序号、歌名和歌手，并提供红色移除按钮
         */
        function renderDeleteList() {
            // 获取删除列表容器
            const container = document.getElementById('delete-list');

            // 空列表时显示提示文字
            if (deleteSongs.length === 0) {
                container.innerHTML = '<div style="color:#999;font-size:13px;">暂无选择的歌曲</div>';
                return;
            }

            // 渲染歌曲列表，每项显示序号、歌名、歌手，并带红色移除按钮
            // 使用map遍历数组生成HTML，join合并为字符串
            // 序号使用 i+1（从1开始计数，符合用户阅读习惯）
            container.innerHTML = deleteSongs.map((s, i) => `
                <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #f0f0f0;">
                    <span>${i + 1}. ${s.title} - ${s.artist}</span>
                    <button onclick="removeDeleteSong(${i})" style="border:none;background:#ff4d4f;color:#fff;padding:2px 8px;border-radius:4px;cursor:pointer;">移除</button>
                </div>
            `).join('');
        }

        /**
         * 从删除列表中移除指定歌曲
         * @param {number} index - 要移除的歌曲索引
         */
        function removeDeleteSong(index) {
            // 从数组中移除指定索引的歌曲
            deleteSongs.splice(index, 1);
            // 重新渲染列表，更新显示
            renderDeleteList();
        }

        // ===== 页面初始化 =====

        // 初始化：各添加一行空行，避免空列表提示，让用户可以直接开始输入
        addJpRow();           // 添加一行粤拼纠错输入行（默认显示一行空行）
        addLcRow();           // 添加一行歌词纠错输入行（默认显示一行空行）
        renderInsertList();   // 初始化插入项列表显示（显示"暂无插入项"提示）

        // ===== LocalStorage 数据加载 =====

        /**
         * 从 localStorage 加载预填充数据
         * @description 用于从歌词详情页跳转到投稿页面时自动填充数据
         * 支持粤拼纠错、歌词纠错、删除歌曲三种类型
         * 数据来源：歌词详情页通过 localStorage.setItem('submitForm', ...) 写入
         * @returns {boolean} 是否成功加载并填充了数据
         */
        function loadFromStorage() {
            // 尝试读取localStorage中的submitForm数据
            const stored = localStorage.getItem('submitForm');
            if (!stored) return false;  // 没有数据

            // 读取后立即清除，防止重复使用
            localStorage.removeItem('submitForm');

            try {
                const data = JSON.parse(stored);

                // 处理粤拼纠错数据
                if (data.type === 'jyutping' && data.corrections) {
                    switchTab('jyutping');
                    document.getElementById('jp-song').value = data.song || '';

                    // 清空现有行，重新添加纠错行
                    document.getElementById('jp-rows').innerHTML = '';
                    data.corrections.forEach(c => {
                        addJpRow();
                        const rows = document.querySelectorAll('#jp-rows .correction-row');
                        const lastRow = rows[rows.length - 1];

                        // 填充每列数据
                        lastRow.querySelector('.jp-line').value = c.line || '';
                        lastRow.querySelector('.jp-char').value = c.char || '';
                        lastRow.querySelector('.jp-original').value = c.originalJp || '';
                        lastRow.querySelector('.jp-new').value = c.newJp || '';
                    });
                    return true;
                }

                // 处理歌词纠错数据
                else if (data.type === 'lyrics') {
                    switchTab('lyrics');
                    document.getElementById('lc-song').value = data.song || '';

                    // 根据纠错类型填充不同数据
                    if (data.correctionType === 'full' && data.fullLyrics) {
                        // 整首替换模式
                        document.querySelector('input[name="correctionType"][value="full"]').checked = true;
                        switchCorrectionType('full');
                        document.getElementById('lc-full-lyrics').value = data.fullLyrics;
                    } else if (data.correctionType === 'insert') {
                        // 插入行模式
                        document.querySelector('input[name="correctionType"][value="insert"]').checked = true;
                        switchCorrectionType('insert');

                        // 支持多个插入项(insertions)或单个(insert)格式
                        const insertions = data.insertions || (data.insert ? [data.insert] : []);
                        if (insertions.length > 0) {
                            // 显示第一个插入项
                            document.getElementById('lc-insert-position').value = insertions[0].position || 'after';
                            document.getElementById('lc-insert-line').value = insertions[0].line || 1;
                            document.getElementById('lc-insert-lyrics').value = insertions[0].lyrics || '';
                        }
                    } else if (data.corrections) {
                        // 逐行修改模式
                        document.getElementById('lc-rows').innerHTML = '';
                        data.corrections.forEach(c => {
                            addLcRow();
                            const rows = document.querySelectorAll('#lc-rows .correction-row');
                            const lastRow = rows[rows.length - 1];

                            lastRow.querySelector('.lc-line').value = c.line || '';
                            lastRow.querySelector('.lc-original').value = c.originalText || '';
                            lastRow.querySelector('.lc-new').value = c.newText || '';
                        });
                    }
                    return true;
                }

                // 处理删除歌曲数据
                else if (data.type === 'delete' && data.songs) {
                    switchTab('delete');
                    deleteSongs = data.songs;
                    renderDeleteList();
                    return true;
                }
            } catch (e) {
                console.error('解析submitForm数据失败:', e);
            }
            return false;
        }

        // ===== 页面加载时执行的数据恢复逻辑 =====
        // 该逻辑与loadFromStorage()函数功能重复，是历史遗留代码
        // 两段代码分别处理localStorage数据和URL参数两种数据来源

        // 页面加载时立即检查localStorage是否有预填充数据
        const stored = localStorage.getItem('submitForm');
        if (stored) {
            // 有数据则立即清除，防止刷新页面时重复加载
            localStorage.removeItem('submitForm');

            try {
                // 解析JSON数据
                const data = JSON.parse(stored);
                console.log('加载的submitForm数据:', data);

                // 处理歌词纠错数据 - 根据纠错类型分别填充
                if (data.type === 'lyrics') {
                    // 先切换到歌词纠错标签页
                    switchTab('lyrics');
                    // 填充歌曲名称
                    document.getElementById('lc-song').value = data.song || '';

                    // 根据纠错类型填充数据
                    if (data.correctionType === 'full' && data.fullLyrics) {
                        // 整首替换模式 - 选中radio并填充完整歌词
                        document.querySelector('input[name="correctionType"][value="full"]').checked = true;
                        switchCorrectionType('full');
                        document.getElementById('lc-full-lyrics').value = data.fullLyrics;
                    } else if (data.correctionType === 'insert') {
                        // 插入行模式 - 选中radio并填充插入项
                        document.querySelector('input[name="correctionType"][value="insert"]').checked = true;
                        switchCorrectionType('insert');

                        // 支持多个插入项(insertions)或单个(insert)格式
                        // 兼容旧版数据格式
                        const storedInsertions = data.insertions || (data.insert ? [data.insert] : []);
                        if (storedInsertions.length > 0) {
                            // 直接赋值给全局数组
                            insertItems = storedInsertions;
                            // 延迟执行renderInsertList，确保DOM已更新
                            setTimeout(() => renderInsertList(), 0);
                        }
                    } else if (data.corrections && data.corrections.length > 0) {
                        // 逐行修改模式 - 清空现有行并逐行填充
                        document.getElementById('lc-rows').innerHTML = '';
                        data.corrections.forEach(c => {
                            addLcRow();
                            const rows = document.querySelectorAll('#lc-rows .correction-row');
                            const lastRow = rows[rows.length - 1];

                            // 填充行号、原歌词、正确歌词
                            lastRow.querySelector('.lc-line').value = c.line || '';
                            lastRow.querySelector('.lc-original').value = c.originalText || '';
                            lastRow.querySelector('.lc-new').value = c.newText || '';
                        });
                    }
                }

                // 处理粤拼纠错数据
                else if (data.type === 'jyutping' && data.corrections) {
                    // 切换到粤拼纠错标签页
                    switchTab('jyutping');
                    // 填充歌曲名称
                    document.getElementById('jp-song').value = data.song || '';
                    // 清空现有行并逐行填充纠错数据
                    document.getElementById('jp-rows').innerHTML = '';

                    data.corrections.forEach(c => {
                        addJpRow();
                        const rows = document.querySelectorAll('#jp-rows .correction-row');
                        const lastRow = rows[rows.length - 1];

                        // 填充行号、字、原粤拼、正确粤拼
                        lastRow.querySelector('.jp-line').value = c.line || '';
                        lastRow.querySelector('.jp-char').value = c.char || '';
                        lastRow.querySelector('.jp-original').value = c.originalJp || '';
                        lastRow.querySelector('.jp-new').value = c.newJp || '';
                    });
                }

                // 处理删除歌曲数据
                else if (data.type === 'delete' && data.songs) {
                    // 切换到删除歌曲标签页
                    switchTab('delete');
                    // 将歌曲列表赋值给全局数组
                    deleteSongs = data.songs;
                    // 渲染删除列表
                    renderDeleteList();
                }
            } catch (e) {
                // JSON解析失败时输出错误日志
                console.error('解析submitForm数据失败:', e);
            }
        } else {
            // 没有localStorage数据，检查URL参数
            // 支持通过URL直接跳转到指定面板并填充歌曲名
            // 例如：submit.html?type=jyutping&song=喜欢你
            // 此功能便于从外部链接直接进入纠错流程
            const params = new URLSearchParams(window.location.search);
            const type = params.get('type');     // 纠错类型参数：jyutping 或 lyrics
            const song = params.get('song');     // 歌曲名称参数：用于自动填充歌曲名输入框

            if (song) {
                if (type === 'jyutping') {
                    // URL参数指定粤拼纠错 - 切换标签并填充歌曲名
                    switchTab('jyutping');
                    document.getElementById('jp-song').value = song;
                } else if (type === 'lyrics') {
                    // URL参数指定歌词纠错 - 切换标签并填充歌曲名
                    switchTab('lyrics');
                    document.getElementById('lc-song').value = song;
                }
            }
        }
    </script>
</body>
</html>
